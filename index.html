<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION TACTICAL C2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-glow { box-shadow: 0 0 15px rgba(255, 159, 10, 0.4); border-color: #ff9f0a !important; }
        #viewport { position: relative; width: 100%; height: 100vh; overflow: hidden; touch-action: none; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        input[type="range"] { accent-color: #ff9f0a; }
        .marker-label { text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body class="fixed inset-0 select-none">

    <div id="auth-screen" class="fixed inset-0 z-[5000] flex items-center justify-center bg-slate-950 p-6">
        <div class="glass w-full max-w-md rounded-2xl p-8 space-y-6">
            <div class="text-center">
                <h1 class="text-2xl font-bold tracking-tighter text-orange-500">SCORPION <span class="text-white">C2</span></h1>
                <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Tactical Management System</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-slate-400 ml-1">Оперативный канал (ID)</label>
                    <input id="roomID" type="text" placeholder="ROOM_ALPHA" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 outline-none focus:border-orange-500 transition-all">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-400 ml-1">Код доступа</label>
                    <input id="password" type="password" placeholder="••••" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 outline-none focus:border-orange-500 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase text-slate-400 ml-1">Позывной</label>
                        <input id="callsign" type="text" placeholder="ХАН" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 outline-none focus:border-orange-500 transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-slate-400 ml-1">Группа</label>
                        <select id="team" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 outline-none focus:border-orange-500 transition-all appearance-none">
                            <option value="ALPHA">ALPHA</option>
                            <option value="BRAVO">BRAVO</option>
                            <option value="DELTA">DELTA</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="attemptLogin()" class="w-full bg-orange-500 hover:bg-orange-600 text-black font-bold py-4 rounded-xl transition-all uppercase tracking-widest text-sm">Вступить в бой</button>
        </div>
    </div>

    <div id="main-ui" class="hidden flex flex-col h-full">
        
        <header class="glass m-2 rounded-xl p-2 flex items-center justify-between z-50">
            <div class="flex items-center gap-3">
                <div class="h-8 w-1 bg-orange-500 rounded-full"></div>
                <div>
                    <div id="display-room" class="text-xs font-bold uppercase">OFFLINE</div>
                    <div id="display-user" class="text-[9px] text-slate-500">NO CONNECTION</div>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="undo()" class="p-2 glass rounded-lg hover:text-orange-500">↩</button>
                <button onclick="toggleSettings()" class="p-2 glass rounded-lg hover:text-orange-500">⚙</button>
            </div>
        </header>

        <main id="viewport">
            <canvas id="bgCanvas"></canvas>
            <canvas id="drawCanvas"></canvas>
            <canvas id="tempCanvas"></canvas>
        </main>

        <footer class="glass m-2 mb-6 rounded-2xl p-3 z-50">
            <div class="flex justify-around items-center gap-2">
                <button id="moveBtn" onclick="setTool('move')" class="p-3 rounded-xl flex-1 active-glow">✥</button>
                <button id="drawBtn" onclick="setTool('draw')" class="p-3 rounded-xl flex-1 glass">↗</button>
                <button id="tacticsBtn" onclick="setTool('tactics')" class="p-3 rounded-xl flex-1 glass">🚩</button>
                
                <div class="h-8 w-[1px] bg-slate-700"></div>
                
                <input type="color" id="colorPicker" value="#ff9f0a" class="w-10 h-10 rounded-lg bg-transparent border-none">
                
                <div class="flex flex-col flex-1 max-w-[80px]">
                    <span class="text-[8px] text-center mb-1 uppercase">Size</span>
                    <input type="range" id="sizeSlider" min="20" max="300" value="60" class="w-full">
                </div>
            </div>
        </footer>

        <div class="fixed bottom-1 left-1/2 -translate-x-1/2 flex items-center gap-2 px-3 py-1 glass rounded-full z-50">
            <div id="net-led" class="h-1.5 w-1.5 rounded-full bg-red-500 animate-pulse"></div>
            <span id="net-status" class="text-[8px] uppercase tracking-tighter text-slate-400">GPS SEARCHING...</span>
        </div>
    </div>

    <div id="tacticModal" class="fixed inset-0 z-[6000] hidden flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
        <div class="glass w-full max-w-xs rounded-3xl p-6 grid grid-cols-3 gap-4">
            <button onclick="selectShape('scorpion')" class="p-4 glass rounded-2xl text-2xl">🦂</button>
            <button onclick="selectShape('flag')" class="p-4 glass rounded-2xl text-2xl">🚩</button>
            <button onclick="selectShape('target')" class="p-4 glass rounded-2xl text-2xl">🎯</button>
            <button onclick="selectShape('skull')" class="p-4 glass rounded-2xl text-2xl">💀</button>
            <button onclick="selectShape('medic')" class="p-4 glass rounded-2xl text-2xl">✚</button>
            <button onclick="selectShape('fire')" class="p-4 glass rounded-2xl text-2xl">🔥</button>
            <button onclick="closeTacticModal()" class="col-span-3 py-3 text-xs text-slate-400 uppercase">Закрыть</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myProfile = { roomID: '', callsign: '', team: '', coords: null };
        let remoteUsers = {};
        let objects = [];
        let currentTool = 'move';
        
        // --- СЕРВЕРНАЯ ЧАСТЬ ---
        function attemptLogin() {
            myProfile.roomID = document.getElementById('roomID').value.toUpperCase();
            myProfile.callsign = document.getElementById('callsign').value;
            myProfile.team = document.getElementById('team').value;
            const pass = document.getElementById('password').value;

            if(!myProfile.roomID || !myProfile.callsign) return alert("Введите данные!");

            socket.emit('join_room', { ...myProfile, password: pass });
        }

        socket.on('init_data', (data) => {
            objects = data.objects;
            remoteUsers = data.users;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('display-room').innerText = "Channel: " + myProfile.roomID;
            document.getElementById('display-user').innerText = `${myProfile.team} | ${myProfile.callsign}`;
            initMap(); 
            startGps();
        });

        socket.on('presence_update', (data) => {
            if(!remoteUsers[data.id]) remoteUsers[data.id] = {};
            remoteUsers[data.id].coords = data.coords;
            render();
        });

        socket.on('object_added', (obj) => {
            objects.push(obj);
            render();
        });

        // --- GPS ---
        function startGps() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    myProfile.coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    socket.emit('update_gps', myProfile.coords);
                    document.getElementById('net-led').classList.replace('bg-red-500', 'bg-green-500');
                    document.getElementById('net-status').innerText = `GPS ACTIVE | ACC: ±${Math.round(pos.coords.accuracy)}m`;
                }, null, { enableHighAccuracy: true });
            }
        }

        // --- ГРАФИЧЕСКИЙ ДВИЖОК ---
        const vp = document.getElementById('viewport'),
              bgCan = document.getElementById('bgCanvas'),
              drCan = document.getElementById('drawCanvas'),
              tmCan = document.getElementById('tempCanvas');
        const ctx = drCan.getContext('2d'), bgCtx = bgCan.getContext('2d');

        let scale = 1, posX = 0, posY = 0;
        let mapImg = new Image();

        function initMap() {
            mapImg.src = 'logo1.png'; // По умолчанию
            mapImg.onload = () => {
                bgCan.width = drCan.width = tmCan.width = mapImg.width;
                bgCan.height = drCan.height = tmCan.height = mapImg.height;
                scale = Math.min(vp.clientWidth/mapImg.width, vp.clientHeight/mapImg.height);
                render();
            };
        }

        function render() {
            bgCtx.clearRect(0,0,bgCan.width, bgCan.height);
            bgCtx.drawImage(mapImg, 0, 0);
            
            ctx.clearRect(0,0,drCan.width, drCan.height);
            
            // Отрисовка объектов
            objects.forEach(obj => {
                ctx.fillStyle = obj.color;
                ctx.strokeStyle = obj.color;
                if(obj.type === 'tactic') drawMarker(ctx, obj);
                if(obj.type === 'arrow') drawArrow(ctx, obj);
            });

            // Отрисовка бойцов (GPS)
            Object.values(remoteUsers).forEach(u => {
                if(u.coords) {
                    // Здесь будет функция проекции GPS -> Пиксели
                    // Пока рисуем тестовую точку
                }
            });

            const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
            [bgCan, drCan, tmCan].forEach(c => c.style.transform = tr);
        }

        function drawMarker(ctx, o) {
            ctx.font = `${o.size}px serif`;
            ctx.textAlign = "center";
            ctx.fillText(getEmoji(o.shape), o.x, o.y);
        }

        function getEmoji(s) {
            const m = { scorpion:'🦂', flag:'🚩', target:'🎯', skull:'💀', medic:'✚', fire:'🔥' };
            return m[s] || '📍';
        }

        // --- УПРАВЛЕНИЕ ---
        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('footer button').forEach(b => b.classList.remove('active-glow', 'glass'));
            document.getElementById(t + 'Btn').classList.add('active-glow');
            if(t === 'tactics') document.getElementById('tacticModal').classList.remove('hidden');
        }

        function selectShape(s) {
            currentTacticShape = s;
            document.getElementById('tacticModal').classList.add('hidden');
        }

        // (Здесь добавь свой Hammer.js код для перемещения и зума из v17.1)
        // ...
    </script>
</body>
</html>
