<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION PRO V19</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin:0; padding:0; height:100vh; background:#000; overflow:hidden; font-family: sans-serif; }
        #map { position: absolute; inset: 0; z-index: 1; display: none; background: #000; }
        
        /* Экран входа */
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-form { display: flex; flex-direction: column; gap: 10px; width: 280px; }
        .auth-input { background: #111; border: 2px solid #16a34a; color: #fff; padding: 15px; text-align: center; font-weight: bold; border-radius: 4px; outline: none; }
        .auth-btn { background: #16a34a; color: #fff; padding: 15px; font-weight: 900; border-radius: 4px; cursor: pointer; }

        /* Панель инструментов (как на скринах) */
        .side-panel { position:fixed; left:0; top:0; bottom:0; width:85px; background:rgba(15,15,15,0.98); border-right:2px solid #16a34a; z-index:5000; display:none; flex-direction:column; overflow-y: auto; }
        .tool-btn { width:100%; min-height:65px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-bottom:1px solid #222; color:#16a34a; cursor: pointer; }
        .tool-btn.active { background:#14532d; color:#fff; }
        .tool-btn b { font-size: 20px; margin-bottom: 2px; }
        .tool-btn span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
        
        /* Сетка (как на твоем скрине) */
        #grid-cont { position:fixed; inset:0; pointer-events:none; z-index:1000; display: none; }
        .g-t { position:absolute; color:#000; font-size:14px; font-weight:900; text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff; transform: translate(-50%, -50%); }

        /* Чат */
        #chat-win { position:fixed; bottom:10px; left:95px; right:10px; height:150px; background:rgba(0,0,0,0.95); border:1px solid #16a34a; z-index:6000; display:none; flex-direction:column; }
        
        /* Метки */
        .dist-tag { color:#fff; font-weight:900; background:rgba(0,0,0,0.8); padding:2px 4px; border-radius:4px; font-size:11px; border: 1px solid #16a34a; }
        .p-label { text-align:center; font-weight:900; font-size:13px; color:#fff; text-shadow: 1px 1px 2px #000; white-space: nowrap; }
        .p-dot { width:12px; height:12px; border-radius:50%; border:2px solid #fff; margin:0 auto; box-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-form">
        <h1 class="text-green-500 text-center font-black text-3xl mb-6 italic">SCORPION</h1>
        <input id="roomIn" type="text" placeholder="КОМНАТА" class="auth-input" value="SIR">
        <input id="nameIn" type="text" placeholder="ПОЗЫВНОЙ" class="auth-input">
        <input id="passIn" type="password" placeholder="ПАРОЛЬ" class="auth-input">
        <button onclick="login()" class="auth-btn">ВХОД</button>
    </div>
</div>

<div id="grid-cont"></div>

<div class="side-panel" id="ui-panel">
    <div onclick="setT('move')" id="b-move" class="tool-btn active"><b>🖐️</b><span>Рука</span></div>
    <div onclick="setT('iam')" id="b-iam" class="tool-btn"><b>🎯</b><span>Я тут</span></div>
    <div onclick="setT('enemy')" id="b-enemy" class="tool-btn"><b>💀</b><span>Враг</span></div>
    <div onclick="setT('target')" id="b-target" class="tool-btn"><b>🚩</b><span>Цель</span></div>
    <div onclick="setT('arrow')" id="b-arrow" class="tool-btn"><b>➡️</b><span>Удар</span></div>
    <div onclick="setT('ruler')" id="b-ruler" class="tool-btn"><b>📏</b><span>Мерка</span></div>
    <div onclick="setT('eraser')" id="b-eraser" class="tool-btn"><b>🧼</b><span>Стерка</span></div>
    <div onclick="toggleC()" class="tool-btn"><b>💬</b><span>Связь</span></div>
    <div onclick="setM('sat')" class="tool-btn"><b>🛰️</b><span>Sat</span></div>
    <div onclick="setM('map')" class="tool-btn"><b>🗺️</b><span>Карта</span></div>
    <div onclick="location.reload()" class="tool-btn text-red-500"><b>🚪</b><span>Выход</span></div>
</div>

<div id="map"></div>

<div id="chat-win">
    <div id="chat-m" class="flex-1 overflow-y-auto p-2 text-green-400 text-xs font-mono"></div>
    <div class="flex p-1 bg-zinc-900 border-t border-green-900">
        <input id="chatI" class="flex-1 bg-black text-white p-2 text-xs outline-none">
        <button onclick="sendM()" class="bg-green-700 px-4 ml-1 text-white">📡</button>
    </div>
</div>

<script>
    const socket = io();
    let map, myName, myColor, tool = 'move', userPos = {lat:0, lng:0};
    let tacticalItems = {}, players = {}, rulerPoints = [];

    function login() {
        const room = document.getElementById('roomIn').value.trim().toUpperCase();
        myName = document.getElementById('nameIn').value.trim().toUpperCase();
        if(!room || !myName) return alert("Введите данные!");
        socket.emit('join_room', { room, name: myName, pass: document.getElementById('passIn').value });
    }

    socket.on('login_success', d => {
        myColor = d.color;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        document.getElementById('ui-panel').style.display = 'flex';
        document.getElementById('grid-cont').style.display = 'block';
        initMap();
    });

    function initMap() {
        if (map) return;
        map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 22 }).setView([43.402, 39.956], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);

        map.on('click', e => {
            if (tool === 'enemy' || tool === 'target') {
                socket.emit('new_obj', { id: 'obj_'+Date.now(), type: tool, lat: e.latlng.lat, lng: e.latlng.lng });
            } else if (tool === 'iam') {
                socket.emit('new_obj', { id: 'obj_'+Date.now(), type: 'iam', lat: userPos.lat || e.latlng.lat, lng: userPos.lng || e.latlng.lng, name: myName });
            } else if (tool === 'ruler' || tool === 'arrow') {
                rulerPoints.push(e.latlng);
                if (rulerPoints.length === 2) {
                    socket.emit('new_obj', { id: 'obj_'+Date.now(), type: tool, start: rulerPoints[0], end: rulerPoints[1] });
                    rulerPoints = [];
                }
            }
        });

        map.on('move zoom', updateGrid);
        updateGrid();

        navigator.geolocation.watchPosition(p => {
            userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
            socket.emit('gps_sync', { ...userPos, name: myName });
            drawP(myName, userPos, myColor || '#16a34a');
        }, null, { enableHighAccuracy: true });
    }

    function updateGrid() {
        const c = document.getElementById('grid-cont'); c.innerHTML = '';
        if (!map || map.getZoom() < 16) return;
        const b = map.getBounds(); const step = 0.00020;
        const alph = "АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЩЭЮЯ";

        for (let x = Math.floor(b.getWest()/step)*step; x <= b.getEast(); x += step) {
            let p = map.latLngToContainerPoint([b.getNorth(), x]);
            if (p.x < 85) continue;
            let d = document.createElement('div'); d.className='g-t'; d.style.left=p.x+'px'; d.style.top='25px';
            d.innerText = alph[Math.abs(Math.round(x/step)) % alph.length]; c.appendChild(d);
        }
        for (let y = Math.floor(b.getSouth()/step)*step; y <= b.getNorth(); y += step) {
            let p = map.latLngToContainerPoint([y, b.getWest()]);
            let d = document.createElement('div'); d.className='g-t'; d.style.right='20px'; d.style.top=p.y+'px';
            d.innerText = Math.abs(Math.round(y/step)) % 100; c.appendChild(d);
        }
    }

    socket.on('draw', m => {
        let layers = [];
        if (m.type === 'ruler' || m.type === 'arrow') {
            let col = m.type === 'arrow' ? 'red' : 'yellow';
            let l = L.polyline([m.start, m.end], { color: col, weight: 4 }).addTo(map);
            layers.push(l);
            if (m.type === 'ruler') {
                let d = Math.round(map.distance(m.start, m.end));
                let tag = L.marker(m.end, { icon: L.divIcon({ html: `<div class="dist-tag">${d}м</div>`, iconAnchor:[-5, 20] }) }).addTo(map);
                layers.push(tag);
            }
        } else {
            let html = m.type === 'enemy' ? '💀' : (m.type === 'target' ? '🚩' : '🎯');
            let icon = L.divIcon({ html: `<div style="font-size:24px;">${html}</div>`, iconAnchor:[12,12] });
            let it = L.marker([m.lat, m.lng], { icon }).addTo(map);
            it.on('click', () => { if(tool === 'eraser') socket.emit('delete_obj', m.id); });
            layers.push(it);
        }
        tacticalItems[m.id] = layers;
    });

    function drawP(name, pos, col) {
        let icon = L.divIcon({ html: `<div class="p-label" style="color:${col}">${name}</div><div class="p-dot" style="background:${col}"></div>`, iconSize:[100,40], iconAnchor:[50,30] });
        if (!players[name]) players[name] = L.marker([pos.lat, pos.lng], { icon }).addTo(map);
        else players[name].setLatLng([pos.lat, pos.lng]);
    }

    function toggleC() { const w = document.getElementById('chat-win'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; }
    function sendM() { const i = document.getElementById('chatI'); if(i.value) { socket.emit('chat_msg', `[${myName}]: ${i.value}`); i.value = ''; } }
    socket.on('receive_msg', m => { const d = document.getElementById('chat-m'); d.innerHTML += `<div>${m}</div>`; d.scrollTop = d.scrollHeight; });
    socket.on('player_move', d => drawP(d.name, d, d.color));
    socket.on('remove_obj', id => { if(tacticalItems[id]) { tacticalItems[id].forEach(l => map.removeLayer(l)); delete tacticalItems[id]; } });
    
    function setT(t) { 
        tool = t; 
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); 
        document.getElementById('b-'+t).classList.add('active'); 
        rulerPoints = [];
    }
    
    function setM(t) { 
        map.eachLayer(l => { if(l._url) map.removeLayer(l); });
        let url = t === 'sat' ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        L.tileLayer(url, { maxZoom: 22 }).addTo(map);
    }
</script>
</body>
</html>
