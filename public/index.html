<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORP GEO | TACTICAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@700&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #22c55e; font-family: 'Roboto Condensed', sans-serif; overflow: hidden; }

        /* ЭКРАН ВХОДА */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle, #0a0f1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .compass-anim {
            width: 150px; height: 150px; border: 2px solid #22c55e; border-radius: 50%;
            position: relative; margin-bottom: 30px; animation: rotate 10s linear infinite;
        }
        .compass-anim::after {
            content: 'N'; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron';
        }
        .compass-line {
            position: absolute; top: 50%; left: 50%; width: 2px; height: 140px; background: rgba(34, 197, 94, 0.3);
            transform: translate(-50%, -50%);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* КАРТА И ОСИ */
        #map { height: 100vh; width: 100%; z-index: 1; position: absolute; }
        .grid-axis-x { position: fixed; top: 0; left: 60px; right: 0; height: 25px; background: rgba(0,0,0,0.8); z-index: 1000; pointer-events: none; border-bottom: 1px solid #22c55e; }
        .grid-axis-y { position: fixed; top: 25px; right: 0; bottom: 0; width: 30px; background: rgba(0,0,0,0.8); z-index: 1000; pointer-events: none; border-left: 1px solid #22c55e; }
        .axis-label { color: #22c55e; font-family: 'Orbitron'; font-size: 12px; position: absolute; text-align: center; }

        /* ТАКТИЧЕСКИЕ МЕТКИ */
        .dist-label-new { 
            background: #ffffff !important; border: 2px solid #000 !important;
            padding: 2px 5px !important; border-radius: 2px; display: flex;
        }
        .dist-text { color: #ff0000; font-weight: 900; font-size: 14px; -webkit-text-stroke: 0.5px black; }

        /* ПАНЕЛЬ */
        .side-panel { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 60px; 
            background: rgba(10, 15, 25, 0.9); border-right: 1px solid #1e293b; z-index: 5000; 
            display: flex; flex-direction: column; 
        }
        .tool-btn { width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; font-size: 20px; cursor: pointer; }
        .tool-btn.active { background: #2563eb; color: white; }

        /* РАДИОСТАНЦИЯ */
        #chat-box { 
            position: fixed; left: 70px; bottom: 80px; width: 280px; height: 300px; 
            background: rgba(5, 10, 20, 0.95); border: 2px solid #2563eb; z-index: 6000; 
            display: none; flex-direction: column; border-radius: 4px;
        }
        .close-chat { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #ef4444; color: white; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="compass-anim">
            <div class="compass-line" style="transform: translate(-50%, -50%) rotate(45deg)"></div>
            <div class="compass-line" style="transform: translate(-50%, -50%) rotate(90deg)"></div>
        </div>
        <h1 class="text-2xl font-bold mb-6 tracking-widest font-['Orbitron']">SCORPION SYSTEM v3.0</h1>
        <input id="userName" type="text" placeholder="CALLSIGN..." class="bg-black border-2 border-green-500 p-3 text-green-500 mb-4 w-64 outline-none text-center">
        <button onclick="enterSystem()" class="bg-green-600 hover:bg-green-500 text-black font-black px-10 py-3 rounded tracking-tighter">INITIALIZE</button>
    </div>

    <div id="main-ui" style="display:none">
        <div id="axis-x" class="grid-axis-x"></div>
        <div id="axis-y" class="grid-axis-y"></div>

        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️</div>
            <div onclick="centerMe()" class="tool-btn text-green-500">🎯</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️</div>
            <div onclick="toggleChat()" class="tool-btn">💬</div>
            <div onclick="undo()" class="tool-btn text-yellow-500">↩️</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>
            <div class="mt-auto">
                <div onclick="changeMap('sat')" class="tool-btn text-[10px] font-bold">SAT</div>
                <div onclick="changeMap('map')" class="tool-btn text-[10px] font-bold text-blue-400">MAP</div>
                <div onclick="location.reload()" class="tool-btn text-red-600">🚪</div>
            </div>
        </div>

        <div id="chat-box">
            <div class="flex justify-between items-center bg-blue-900 px-2 h-10">
                <span class="text-[10px] font-bold">RADIO [SECURED]</span>
                <div onclick="toggleChat()" class="close-chat">×</div>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-2 text-sm"></div>
            <div class="p-2 border-t border-blue-900 flex">
                <input id="msgInput" type="text" class="bg-black text-green-400 flex-1 outline-none text-xs" placeholder="...">
                <button onclick="sendMsg()" class="text-blue-400 ml-2 font-bold text-xs">SEND</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, userCallsign = 'GHOST';
        let tactical = {}, tool = 'move', arrowFrom = null;
        let layers = {}, gridLayer = null;

        const STEP = 20 * 0.000009;

        function enterSystem() {
            const name = document.getElementById('userName').value;
            if(name) {
                userCallsign = name.toUpperCase();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                initMap();
            }
        }

        function initMap() {
            layers.map = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21 });
            layers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21 });
            
            map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 21 }).setView([43.40, 39.95], 18);
            layers.sat.addTo(map);
            
            gridLayer = L.layerGroup().addTo(map);
            map.on('move zoom', updateGrid);
            map.on('click', onMapClick);
            updateGrid();
            startGps();
        }

        function updateGrid() {
            gridLayer.clearLayers();
            const b = map.getBounds();
            const axX = document.getElementById('axis-x'), axY = document.getElementById('axis-y');
            axX.innerHTML = ''; axY.innerHTML = '';

            for (let x = Math.floor(b.getWest()/STEP)*STEP; x <= b.getEast(); x += STEP) {
                L.polyline([[b.getSouth(), x], [b.getNorth(), x]], {color:'#22c55e', weight:1, opacity:0.2}).addTo(gridLayer);
                const p = map.latLngToContainerPoint([b.getNorth(), x + STEP/2]);
                if(p.x > 60) {
                    const el = document.createElement('div'); el.className = 'axis-label';
                    el.style.left = (p.x - 75) + 'px'; el.innerText = String.fromCharCode(65 + (Math.abs(Math.round(x/STEP))%26));
                    axX.appendChild(el);
                }
            }
            for (let y = Math.floor(b.getSouth()/STEP)*STEP; y <= b.getNorth(); y += STEP) {
                L.polyline([[y, b.getWest()], [y, b.getEast()]], {color:'#22c55e', weight:1, opacity:0.2}).addTo(gridLayer);
                const p = map.latLngToContainerPoint([y + STEP/2, b.getEast()]);
                const el = document.createElement('div'); el.className = 'axis-label';
                el.style.top = (p.y - 40) + 'px'; el.style.right = '5px';
                el.innerText = Math.abs(Math.round(y/STEP)) % 100;
                axY.appendChild(el);
            }
        }

        function onMapClick(e) {
            if(tool === 'move') return;
            const id = 'id' + Date.now();
            if(tool === 'arrow') {
                if(!arrowFrom) { arrowFrom = e.latlng; } 
                else { socket.emit('new_obj', { id, type: 'arrow', start: arrowFrom, end: e.latlng }); arrowFrom = null; }
            } else {
                socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng });
            }
        }

        socket.on('draw', m => {
            if(m.type === 'arrow') {
                const line = L.polyline([m.start, m.end], { color: '#2563eb', weight: 4, dashArray: '5, 10' }).addTo(map);
                const dist = Math.round(map.distance(m.start, m.end));
                const label = L.marker(m.end, { icon: L.divIcon({ className: 'dist-label-new', html: `<span class="dist-text">${dist}м</span>`, iconAnchor: [20, -10] }) }).addTo(map);
                tactical[m.id] = { layers: [line, label] };
            } else {
                const ico = m.type === 'enemy' ? '💀' : '🚩';
                tactical[m.id] = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:25px">${ico}</div>`, className: 'dummy', iconAnchor:[12,12] }) }).addTo(map);
            }
        });

        function toggleChat() { const c = document.getElementById('chat-box'); c.style.display = (c.style.display === 'flex') ? 'none' : 'flex'; }
        function sendMsg() { const i = document.getElementById('msgInput'); if(i.value) { socket.emit('chat_msg', { name: userCallsign, text: i.value }); i.value = ''; } }
        socket.on('msg', m => { 
            const d = document.createElement('div'); d.innerHTML = `<b class="text-blue-400">${m.name}:</b> ${m.text}`; 
            document.getElementById('chat-messages').appendChild(d);
            document.getElementById('chat-messages').scrollTop = 9999;
        });

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                if(!myMarker) {
                    myMarker = L.circleMarker(pos, { color: '#2563eb', radius: 8, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip(userCallsign, { permanent: true, direction: 'top', className: 'bg-blue-600 text-white px-1 text-[10px]' });
                    map.setView(pos, 19);
                } else myMarker.setLatLng(pos);
            }, null, { enableHighAccuracy: true });
        }

        function setTool(t) { tool = t; arrowFrom = null; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); }
        function changeMap(t) { map.eachLayer(l => { if(l instanceof L.TileLayer) map.removeLayer(l); }); layers[t].addTo(map); }
        function centerMe() { if(myMarker) map.setView(myMarker.getLatLng(), 19); }
        function undo() { socket.emit('undo'); }
        function clearMap() { if(confirm("CLEAR ALL?")) socket.emit('clear'); }
        socket.on('del_obj', id => { if(tactical[id]) { if(tactical[id].layers) tactical[id].layers.forEach(l => map.removeLayer(l)); else map.removeLayer(tactical[id]); delete tactical[id]; } });
    </script>
</body>
</html>
