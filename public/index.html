<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.0 | ТАКТИКА</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Панель инструментов в стиле Геотактики */
        .gt-panel { background: rgba(255, 255, 255, 0.9); border-right: 2px solid #ccc; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .gt-btn { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eee; transition: 0.2s; background: white; font-size: 20px; }
        .gt-btn.active { background: #007bff; color: white; }

        /* Метки с дистанцией */
        .dist-label { background: rgba(0,0,0,0.7); color: white; padding: 1px 4px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap; border: 1px solid #fff; }
        .user-tag { background: #007bff; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .enemy-tag { background: #dc3545; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-100 p-6">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8 space-y-6 border-t-8 border-blue-600">
            <div class="text-center">
                <h1 class="text-2xl font-bold text-slate-800">scorpGeo <span class="text-blue-600">3.0</span></h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Тактическая система</p>
            </div>
            <div class="space-y-3">
                <input id="roomID" type="text" placeholder="ID КАНАЛА" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 text-center focus:ring-2 ring-blue-500 outline-none uppercase">
                <input id="password" type="password" placeholder="ПАРОЛЬ" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 text-center focus:ring-2 ring-blue-500 outline-none">
                <input id="callsign" type="text" placeholder="ПОЗЫВНОЙ" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 text-center focus:ring-2 ring-blue-500 outline-none uppercase">
            </div>
            <button onclick="saveAndConnect()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg shadow-lg hover:bg-blue-700 transition-all uppercase">Войти в сеть</button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed left-0 top-0 bottom-0 z-[5000] gt-panel flex flex-col w-[52px]">
            <button onclick="setMode('move')" id="btn-move" class="gt-btn active">🖐️</button>
            <button onclick="setMode('enemy')" id="btn-enemy" class="gt-btn">💀</button>
            <button onclick="setMode('point')" id="btn-point" class="gt-btn">🚩</button>
            <button onclick="setMode('caution')" id="btn-caution" class="gt-btn">⚠️</button>
            <button onclick="setMode('arrow')" id="btn-arrow" class="gt-btn">➡️</button>
            <div class="mt-auto">
                <button onclick="setLayer('sat')" class="gt-btn text-[10px] font-bold">СПУТ</button>
                <button onclick="setLayer('map')" class="gt-btn text-[10px] font-bold">СХЕМ</button>
                <button onclick="setLayer('topo')" class="gt-btn text-[10px] font-bold">РЕЛЬ</button>
                <button onclick="logout()" class="gt-btn text-red-500 text-xs">ВЫХ</button>
            </div>
        </div>

        <div class="fixed top-2 left-16 z-[4000] bg-white/90 px-4 py-2 rounded-lg shadow-md border border-slate-200">
            <div id="display-room" class="text-blue-600 font-bold text-[10px]">--</div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, markers = {}, tacticalMarkers = {};
        let navLines = {}, arrowStart = null, tempArrow = null;
        let layers = {};
        let myInfo = { roomID: '', callsign: '', password: '', lat: 0, lng: 0 };
        let currentMode = 'move';

        function saveAndConnect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            myInfo.password = document.getElementById('password').value;
            if(!myInfo.roomID || !myInfo.password || !myInfo.callsign) return alert("Заполните данные!");
            socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            localStorage.setItem('scorpGeo_Auth', JSON.stringify(myInfo));
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('display-room').innerText = "КАНАЛ: " + myInfo.roomID;
            initMap();
        });

        function initMap() {
            layers.sat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
            layers.map = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
            layers.topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

            map = L.map('map', { zoomControl: false, layers: [layers.map] }).setView([43.5855, 39.7231], 13);
            
            map.on('click', onMapClick);
            startGps();
        }

        function onMapClick(e) {
            if (currentMode === 'move') return;

            if (currentMode === 'arrow') {
                if (!arrowStart) {
                    arrowStart = e.latlng;
                    tempArrow = L.polyline([arrowStart, e.latlng], {color: 'blue', weight: 4}).addTo(map);
                } else {
                    socket.emit('new_map_marker', { 
                        type: 'arrow', start: arrowStart, end: e.latlng, owner: myInfo.callsign 
                    });
                    map.removeLayer(tempArrow);
                    arrowStart = null;
                    setMode('move');
                }
                return;
            }

            socket.emit('new_map_marker', { 
                id: Date.now(), type: currentMode, lat: e.latlng.lat, lng: e.latlng.lng, owner: myInfo.callsign 
            });
            setMode('move');
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.gt-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
        }

        function setLayer(t) {
            Object.values(layers).forEach(l => map.removeLayer(l));
            map.addLayer(layers[t]);
        }

        function startGps() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                myInfo.lat = latitude; myInfo.lng = longitude;
                if (!myMarker) {
                    myMarker = L.circleMarker([latitude, longitude], { color: '#007bff', radius: 6, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip("Я", { permanent: true, direction: 'top', className: 'user-tag' });
                    map.setView([latitude, longitude], 17);
                } else { myMarker.setLatLng([latitude, longitude]); }
                updateDistances();
                socket.emit('update_gps', { lat: latitude, lng: longitude });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('presence_update', (users) => {
            Object.keys(users).forEach(id => {
                if (id === socket.id) return;
                const u = users[id];
                if (!u.lat) return;
                if (!markers[id]) {
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#dc3545', radius: 6, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(`${u.callsign}`, { permanent: true, direction: 'top', className: 'enemy-tag' });
                } else { markers[id].setLatLng([u.lat, u.lng]); }
                updateDistances();
            });
        });

        function updateDistances() {
            Object.keys(markers).forEach(id => {
                const d = map.distance([myInfo.lat, myInfo.lng], markers[id].getLatLng());
                markers[id].setTooltipContent(`${usersData[id]?.callsign || 'БОЕЦ'} [${Math.round(d)}м]`);
            });
            // Обновление дистанции для меток (💀, 🚩 и т.д.)
            Object.values(tacticalMarkers).forEach(m => {
                if(m.getLatLng) {
                    const d = map.distance([myInfo.lat, myInfo.lng], m.getLatLng());
                    m.setTooltipContent(`${Math.round(d)}м`);
                }
            });
        }

        socket.on('draw_marker', (m) => {
            if (m.type === 'arrow') {
                const arrow = L.polyline([m.start, m.end], { color: '#007bff', weight: 5 }).addTo(map);
                // Добавим простую логику наконечника (можно улучшить)
                return;
            }

            const icons = { enemy: '💀', point: '🚩', caution: '⚠️' };
            const marker = L.marker([m.lat, m.lng], {
                icon: L.divIcon({ html: `<div style="font-size:20px;">${icons[m.type]}</div>`, className: 'dummy' })
            }).addTo(map);
            
            const dist = map.distance([myInfo.lat, myInfo.lng], [m.lat, m.lng]);
            marker.bindTooltip(`${Math.round(dist)}м`, { permanent: true, direction: 'bottom', className: 'dist-label' });
            tacticalMarkers[m.id] = marker;
        });

        function logout() { localStorage.removeItem('scorpGeo_Auth'); location.reload(); }
    </script>
</body>
</html>
