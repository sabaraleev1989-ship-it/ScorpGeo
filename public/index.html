<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ScorpGEO">
    <meta name="theme-color" content="#000000">
    <title>ScorpGEO v11.0</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-512.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --rus-white: #ffffff;
            --rus-blue: #0039a6;
            --rus-red: #d52b1e;
            --glass-bg: rgba(10, 10, 20, 0.75);
            --glass-border: rgba(255,255,255,0.15);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.4);
            --neon-blue: 0 0 15px rgba(0,57,166,0.6);
            --neon-red: 0 0 15px rgba(213,43,30,0.6);
            --text-color: rgba(255,255,255,0.9);
            --text-dim: rgba(255,255,255,0.6);
            --panel-bg: rgba(10, 10, 20, 0.85);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
        body,html { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }

        #particles { position: fixed; inset: 0; z-index: 0; background: transparent; pointer-events: none; }
        .particle { position: absolute; background: var(--rus-white); border-radius: 50%; animation: float linear infinite; opacity: 0; }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        #auth-screen {
            position:fixed; inset:0; z-index:10000;
            background: radial-gradient(circle at 30% 30%, rgba(0,57,166,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(213,43,30,0.1) 0%, transparent 50%),
                        linear-gradient(135deg, #0a0a1a 0%, #0d0d24 100%);
            display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden;
        }

        .radar-container { position: relative; width: 140px; height: 140px; flex-shrink: 0; margin-bottom: 15px; z-index: 2; }
        .radar-circle {
            position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,57,166,0.5), inset 0 0 40px rgba(0,57,166,0.2);
            background: radial-gradient(circle at center, rgba(0,57,166,0.2) 0%, rgba(0,0,0,0.8) 70%);
            animation: radarPulse 2s infinite;
        }
        @keyframes radarPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(0,57,166,0.5), inset 0 0 40px rgba(0,57,166,0.2); }
            50% { box-shadow: 0 0 60px rgba(213,43,30,0.6), inset 0 0 60px rgba(213,43,30,0.3); }
        }

        .radar-scan {
            position: absolute; inset: 0; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, transparent 25deg, rgba(0,57,166,0.6) 30deg, transparent 35deg, transparent 360deg);
            animation: scanSpin 3s linear infinite;
        }
        @keyframes scanSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .radar-grid {
            position: absolute; inset: 0; border-radius: 50%;
            background: radial-gradient(circle at center, transparent 30%, rgba(255,255,255,0.08) 31%, transparent 32%),
                        radial-gradient(circle at center, transparent 60%, rgba(255,255,255,0.08) 61%, transparent 62%),
                        linear-gradient(transparent 49%, rgba(255,255,255,0.15) 50%, transparent 51%),
                        linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.15) 50%, transparent 51%);
        }

        .scorpion-dot { position: absolute; width: 4px; height: 4px; background: var(--rus-red); border-radius: 50%; box-shadow: 0 0 8px var(--rus-red), 0 0 16px var(--rus-red); animation: dotBlink 1.2s infinite; z-index: 3; }
        @keyframes dotBlink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.8); } }

        .sdot1 { top: 35%; left: 50%; } .sdot2 { top: 30%; left: 45%; } .sdot3 { top: 30%; left: 55%; }
        .sdot4 { top: 45%; left: 50%; } .sdot5 { top: 52%; left: 42%; } .sdot6 { top: 52%; left: 58%; }
        .sdot7 { top: 58%; left: 48%; } .sdot8 { top: 65%; left: 55%; } .sdot9 { top: 72%; left: 60%; } .sdot10 { top: 78%; left: 58%; }

        .auth-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow), var(--neon-blue);
            padding: 28px 22px; width: 90%; max-width: 370px; text-align: center;
            z-index: 10001; border-radius: 16px; backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); animation: cardIn 0.6s ease-out; margin-top: 0;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .auth-title { font-size: 1.8rem; font-weight: 900; color: var(--rus-white); margin-bottom: 6px; text-shadow: 0 0 20px rgba(255,255,255,0.5); letter-spacing: 4px; }
        .auth-subtitle { font-size: 9px; color: var(--rus-blue); margin-bottom: 20px; letter-spacing: 6px; text-transform: uppercase; opacity: 0.8; }

        .auth-input {
            width: 100%; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
            color: var(--rus-white); padding: 15px 14px; margin-bottom: 10px;
            font-family: 'Courier New', monospace; font-size: 14px; text-align: center;
            outline: none; border-radius: 8px; transition: all 0.3s; line-height: 1.4;
        }
        .auth-input:focus { border-color: var(--rus-white); box-shadow: 0 0 20px rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
        .auth-input::placeholder { color: #555; letter-spacing: 2px; font-size: 11px; }

        .auth-btn {
            width: 100%; background: linear-gradient(135deg, var(--rus-blue), #001a4d);
            color: var(--rus-white); border: 1px solid rgba(255,255,255,0.3);
            padding: 14px; font-weight: bold; font-size: 16px; cursor: pointer;
            font-family: 'Courier New', monospace; letter-spacing: 3px; margin-top: 10px;
            border-radius: 8px; transition: all 0.3s; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,57,166,0.4);
        }
        .auth-btn:active { background: var(--rus-red); transform: scale(0.97); box-shadow: 0 2px 8px rgba(213,43,30,0.6); }

        .auth-info { color: #667; font-size: 8px; margin-top: 12px; letter-spacing: 1px; }
        .auth-info span { color: #aab; cursor: pointer; text-decoration: underline; }

        .code-wrapper { position:relative; width:100%; }
        .code-wrapper .auth-input { padding-right:42px; }
        .gear-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:20px; cursor:pointer; color:var(--rus-white); display:none; z-index:10; opacity: 0.7; }

        #map { position:absolute; top:0; left:0; right:0; bottom:0; z-index:1; background:#1a1e1a; }
        #drawing-layer { position:absolute; top:0; left:0; right:0; bottom:0; z-index:100; display:none; cursor:crosshair; touch-action:none; }

        .side-panel {
            position:fixed; left:0; top:44px; bottom:0; width:80px; background: var(--panel-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border); box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            z-index:5000; display:none; flex-direction:column; overflow-y:auto;
        }
        .tool-btn {
            width:100%; min-height:48px; display:flex; flex-direction:column; align-items:center; justify-content:center;
            border-bottom: 1px solid rgba(255,255,255,0.08); color: var(--text-dim);
            cursor:pointer; font-size:9px; font-weight:bold; padding:4px 2px; transition: all 0.25s ease;
        }
        .tool-btn b { font-size:18px; margin-bottom:2px; }
        .tool-btn:hover { color: var(--rus-white); background: rgba(255,255,255,0.05); }
        .tool-btn:active { transform: scale(0.95); }
        .tool-btn.active {
            background: rgba(213,43,30,0.8); color: #fff; border-left: 3px solid var(--rus-white);
            box-shadow: var(--neon-red), inset 0 0 20px rgba(213,43,30,0.3); text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        #grid-overlay { position:fixed; top:44px; left:0; right:0; bottom:0; pointer-events:none; z-index:900; }
        .grid-letter-top { position:absolute; font-weight:900; font-family:'Courier New',monospace; background:rgba(0,0,0,0.9); color:#ccc; border:1px solid #666; border-radius:3px; transform:translate(-50%,-50%); z-index:950; font-size:12px; padding:4px 8px; }
        .grid-number-right { position:absolute; font-weight:900; font-family:'Courier New',monospace; background:rgba(0,0,0,0.9); color:#ccc; border:1px solid #666; border-radius:3px; transform:translate(0,-50%); z-index:950; font-size:12px; padding:4px 8px; }

        /* ДВОЙНОЙ ЧАТ */
        #chat-container {
            position:fixed; bottom:10px; left:90px; right:10px; z-index:6000; display:none;
            flex-direction:column; gap:4px;
        }
        #system-chat {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius:12px;
            height: 80px; overflow-y: auto; padding: 6px 10px;
            font-size: 11px; color: #aaa; font-family: 'Courier New', monospace;
        }
        #system-chat .sys-line { margin-bottom:2px; }
        #main-chat {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius:12px;
            display:flex; flex-direction:column;
            height: 180px;
        }
        #chat-messages { flex:1; overflow-y:auto; padding:8px; font-size:13px; font-family:'Courier New',monospace; color: var(--text-color); }
        .msg-line { margin-bottom:5px; padding:6px 10px; border-radius:6px; background: rgba(255,255,255,0.03); border-left: 2px solid var(--rus-blue); animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
        .msg-name { font-weight:900; margin-right:6px; }
        .msg-text { color: #ddd; }

        .chat-input-area {
            display:flex; align-items:center; gap:4px; padding:4px; background:transparent;
            border-top:1px solid rgba(255,255,255,0.1);
        }
        #chat-input {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
            color: var(--rus-white); padding:10px 14px; outline:none;
            font-size:14px; font-family:'Courier New',monospace;
            flex:1; margin:4px; border-radius:20px; line-height: 1.4;
        }
        #chat-input:focus { border-color: var(--rus-white); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        #chat-input::placeholder { color: #666; font-size:13px; }

        #send-btn { background: linear-gradient(135deg, var(--rus-blue), #001a4d); color: var(--rus-white); border: 1px solid rgba(255,255,255,0.3); padding:10px 18px; margin:4px 4px 4px 0; border-radius:20px; font-size:13px; font-weight:bold; cursor:pointer; box-shadow: 0 2px 8px rgba(0,57,166,0.3); }
        #send-btn:active { background: var(--rus-red); }

        .player-marker { display:flex; flex-direction:column; align-items:center; cursor:pointer; }
        .player-name-tag { font-weight:900; font-size:11px; text-shadow:1px 1px 2px #000; white-space:nowrap; margin-bottom:2px; background:rgba(0,0,0,0.85); padding:3px 6px; border-radius:8px; }
        .player-dot { width:14px; height:14px; border-radius:50%; border:2px solid #fff; }

        #distance-bar { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--rus-red); box-shadow: 0 0 30px rgba(213,43,30,0.5); color: var(--rus-white); padding:14px 24px; border-radius:30px; z-index:8000; display:none; font-family:'Courier New',monospace; font-size:20px; font-weight:900; text-align:center; animation:slideUp 0.3s ease-out; pointer-events:none; }
        @keyframes slideUp { from{opacity:0;transform:translate(-50%,15px)} to{opacity:1;transform:translate(-50%,0)} }

        .creator-tooltip { background:rgba(0,0,0,0.9)!important; border:1px solid var(--rus-blue)!important; color:var(--rus-white)!important; font-family:'Courier New',monospace!important; font-size:12px!important; padding:5px 10px!important; border-radius:5px!important; }
        #connection-status { position:fixed; top:50px; right:8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); color: var(--rus-white); padding:4px 10px; border-radius:15px; font-size:9px; z-index:7000; display:none; font-family:monospace; border: 1px solid rgba(255,255,255,0.2); }
        .snap-tooltip { background:rgba(0,0,0,0.9)!important; border:1px solid var(--rus-red)!important; color:var(--rus-white)!important; font-family:'Courier New',monospace!important; font-size:10px!important; padding:3px 6px!important; border-radius:5px!important; }
    </style>
</head>
<body>

<div id="particles"></div>
<div id="connection-status">🟢 ОНЛАЙН</div>

<!-- КОМПАС -->
<div id="compass" style="position:fixed; top:90px; right:35px; z-index:8000; display:none;">
    <div id="compass-inner" onclick="requestCompassPermission()" style="background:rgba(0,0,0,0.95); border:2px solid #0039a6; border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 0 20px rgba(0,57,166,0.4);">
        <div style="position:absolute; inset:-4px; border:2px solid #fff; border-radius:50%; opacity:0.5;"></div>
        <div style="position:absolute; top:4px; left:50%; transform:translateX(-50%); color:#fff; font-size:11px; font-weight:bold;">С</div>
        <div style="position:absolute; bottom:4px; left:50%; transform:translateX(-50%); color:#fff; font-size:10px;">Ю</div>
        <div style="position:absolute; right:4px; top:50%; transform:translateY(-50%); color:#fff; font-size:10px;">В</div>
        <div style="position:absolute; left:4px; top:50%; transform:translateY(-50%); color:#fff; font-size:10px;">З</div>
        <svg id="compass-svg" width="20" height="28" viewBox="0 0 20 28" style="z-index:1; transition:transform 0.5s ease;">
            <polygon points="10,0 0,28 10,18 20,28" fill="#d52b1e" stroke="#fff" stroke-width="1.5"/>
        </svg>
    </div>
</div>

<div id="auth-screen">
    <div class="radar-container">
        <div class="radar-circle"></div><div class="radar-scan"></div><div class="radar-grid"></div>
        <div class="scorpion-dot sdot1"></div><div class="scorpion-dot sdot2"></div><div class="scorpion-dot sdot3"></div>
        <div class="scorpion-dot sdot4"></div><div class="scorpion-dot sdot5"></div><div class="scorpion-dot sdot6"></div>
        <div class="scorpion-dot sdot7"></div><div class="scorpion-dot sdot8"></div><div class="scorpion-dot sdot9"></div>
        <div class="scorpion-dot sdot10"></div>
    </div>

    <div class="auth-card">
        <div class="auth-title">ScorpGEO</div>
        <div class="auth-subtitle">TACTICAL MAP</div>
        <input type="text" id="teamName" class="auth-input" placeholder="КОМАНДА" maxlength="10" autocomplete="off">
        <input type="text" id="playerName" class="auth-input" placeholder="ПОЗЫВНОЙ" maxlength="10" autocomplete="off">
        <input type="password" id="password" class="auth-input" placeholder="ПАРОЛЬ" maxlength="20" autocomplete="off">
        <div class="code-wrapper">
            <input type="text" id="accessCode" class="auth-input" placeholder="УНИКАЛЬНЫЙ КОД" maxlength="10" autocomplete="off">
            <span class="gear-btn" id="settingsGear" onclick="changeAccessCode()">⚙️</span>
        </div>
        <button id="loginBtn" class="auth-btn">⚡ ВОЙТИ ⚡</button>
        <div class="auth-info">v11.0 • <span onclick="tryBecomeAdmin()">АДМИН</span></div>
        <div id="autoLoginMsg" style="color:#fff; font-size:12px; margin-top:10px; display:none;"></div>
    </div>
</div>

<div class="side-panel" id="ui-panel">
    <div onclick="setTool('move')" id="btn-move" class="tool-btn active"><b>🖐️</b><span>Рука</span></div>
    <div onclick="centerOnMe()" class="tool-btn"><b>📍</b><span>Я тут</span></div>
    <div onclick="setTool('enemy')" id="btn-enemy" class="tool-btn"><b>💀</b><span>Враг</span></div>
    <div onclick="setTool('target')" id="btn-target" class="tool-btn"><b>🎯</b><span>Цель</span></div>
    <div onclick="setTool('arrow')" id="btn-arrow" class="tool-btn"><b>➡️</b><span>Удар</span></div>
    <div onclick="setTool('ruler')" id="btn-ruler" class="tool-btn"><b>📏</b><span>Мерка</span></div>
    <div onclick="setTool('pencil')" id="btn-pencil" class="tool-btn" style="color:#ff8888;"><b>✏️</b><span>Карандаш</span></div>
    <div onclick="setTool('eraser')" id="btn-eraser" class="tool-btn"><b>🧹</b><span>Стерка</span></div>
    <div onclick="undoAction()" class="tool-btn" style="color:#ffaaaa;"><b>↩️</b><span>Отмена</span></div>
    <div onclick="redoAction()" class="tool-btn" style="color:#aaffaa;"><b>↪️</b><span>Повтор</span></div>
    <div onclick="deleteMyObjects()" class="tool-btn" style="color:#ffaa66;"><b>🗑️</b><span>Мои</span></div>
    <div onclick="toggleChat()" class="tool-btn"><b>💬</b><span>Чат</span></div>
    <div onclick="changeMap('sat')" class="tool-btn"><b>🛰️</b><span>Спут</span></div>
    <div onclick="changeMap('map')" class="tool-btn"><b>🗺️</b><span>Схема</span></div>
    <div onclick="zoomTo(18)" class="tool-btn" style="color:#fff;"><b>🔍</b><span>X1</span></div>
    <div onclick="zoomTo(20)" class="tool-btn" style="color:#ffaa00;"><b>🔍</b><span>X2</span></div>
    <div onclick="toggleCompass()" id="btn-compass" class="tool-btn" style="color:#88aaff;"><b>🧭</b><span>Компас</span></div>
    <div onclick="reconnectApp()" class="tool-btn" style="color:#88ccff;"><b>🔄</b><span>Обнов</span></div>
    <div onclick="exitApp()" class="tool-btn" style="color:#ff6666;"><b>🚪</b><span>Выход</span></div>
</div>

<div id="map"></div>
<canvas id="drawing-layer"></canvas>
<div id="grid-overlay"></div>
<div id="distance-bar"></div>

<!-- Двойной чат -->
<div id="chat-container">
    <div id="system-chat"></div>
    <div id="main-chat">
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input id="chat-input" placeholder="Сообщение...">
            <button id="sendChatBtn" class="auth-btn" style="width:auto; padding:10px 18px; margin:4px 4px 4px 0; border-radius:20px; font-size:13px;">📡</button>
        </div>
    </div>
</div>

<script>
// ==================== ЧАСТИЦЫ ====================
(function() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const s = Math.random() * 4 + 2;
        p.style.width = s + 'px';
        p.style.height = s + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = Math.random() * 10 + 10 + 's';
        p.style.animationDelay = Math.random() * 10 + 's';
        container.appendChild(p);
    }
})();

// ==================== DEVICE ID ====================
function getDeviceId(){ let id=localStorage.getItem('scorpgeo_device_id'); if(!id){ id='dev_'+Date.now()+'_'+Math.random().toString(36).substr(2,9); localStorage.setItem('scorpgeo_device_id',id); } return id; }
const DEVICE_ID=getDeviceId();

const socket=io({ transports:['websocket','polling'], reconnection:true, reconnectionDelay:500, reconnectionDelayMax:3000, reconnectionAttempts:20, timeout:10000, pingInterval:20000, pingTimeout:50000, autoConnect:true, query:{ deviceId:DEVICE_ID } });

let map, activeTool='move', currentUser={name:'',team:'',color:'#fff'};
let playersMarkers={}, playersStatus={}, tacticalObjects={}, myObjects=new Set(), rulerPoints=[], gridLayer=null, tileLayer=null, playerColors={}, watchId=null, keepAliveInterval=null, distanceTimer=null, rulerTimers={};
let isAdmin=false, currentAccessCode='', compassHeading=0, compassVisible=false;
let pencilCanvas, pencilCtx, isDrawing=false, pencilPoints=[];
let undoStack=[], redoStack=[];
let offlineTimer=null;

const METERS_PER_DEGREE=111320;
const RUSSIAN_LETTERS=['А','Б','В','Г','Д','Е','Ё','Ж','З','И','Й','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ц','Ч','Ш','Щ','Ъ','Ы','Ь','Э','Ю','Я'];
const STORAGE_KEY='scorpgeo_session';
const ADMIN_PASSWORD='Mpfp13zi';
const SNAP_RADIUS=30;

function saveSession(){ /* без изменений */ }
function loadSession(){ /* без изменений */ }
function clearSession(){ /* без изменений */ }

function tryBecomeAdmin(){ const pass=prompt('🔐 Админ-пароль:'); if(pass===ADMIN_PASSWORD){ isAdmin=true; document.getElementById('settingsGear').style.display='inline'; alert('✅ Доступ разрешен!'); } else{ alert('❌ Неверный пароль!'); } }
function changeAccessCode(){ /* без изменений */ }
socket.on('code_changed',(data)=>{ if(data.success){ currentAccessCode=data.newCode; document.getElementById('accessCode').value=''; alert('✅ Код изменен: '+data.newCode); } else{ alert('❌ '+data.error); } });

// ===== ОТМЕНА / ПОВТОР =====

// ===== ПОИСК БЛИЖАЙШЕГО ОБЪЕКТА =====
function findNearestObject(clickLatLng){
    let closest=null; let minDist=SNAP_RADIUS;
    for(const[id,obj] of Object.entries(tacticalObjects)){
        let objLat,objLng;
        if(obj.type==='enemy'||obj.type==='target'){ const layer=obj.layers[0]; if(layer&&layer.getLatLng){ const pos=layer.getLatLng(); objLat=pos.lat; objLng=pos.lng; } }
        else if(obj.type==='arrow'||obj.type==='ruler'){ const latlngs=obj.layers[0]?.getLatLngs?.(); if(latlngs&&latlngs.length>=2){ objLat=latlngs[1].lat; objLng=latlngs[1].lng; } }
        else if(obj.type==='pencil'){ const latlngs=obj.layers[0]?.getLatLngs?.(); if(latlngs&&latlngs.length>0){ const last=latlngs[latlngs.length-1]; objLat=last.lat; objLng=last.lng; } }
        if(objLat!==undefined&&objLng!==undefined){ const dist=map.distance(clickLatLng,[objLat,objLng]); if(dist<minDist){ minDist=dist; closest={lat:objLat,lng:objLng,type:obj.type}; } }
    }
    return closest;
}

document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        if (offlineTimer) { clearTimeout(offlineTimer); offlineTimer = null; }
        setPlayerOnline();
        forceReconnect();
    } else {
        // Задержка 8 секунд перед установкой офлайн-статуса
        if (offlineTimer) clearTimeout(offlineTimer);
        offlineTimer = setTimeout(() => {
            setPlayerOffline();
        }, 8000);
        if (socket.connected && currentUser.name) {
            socket.emit('keep_alive', { name: currentUser.name, room: currentUser.team, deviceId: DEVICE_ID });
        }
    }
});

// ===== ОБНОВЛЕНИЕ МАРКЕРА ИГРОКА С УЧЁТОМ СТАТУСА =====
function updatePlayerMarker(name, lat, lng, color){
    if(!map||!name||name===currentUser.name) return;
    let marker = playersMarkers[name];
    if(marker){
        if(lat!==undefined && lng!==undefined) marker.setLatLng([lat, lng]);
    }else{
        marker = L.marker([lat||0, lng||0], {icon: createPlayerIcon(name, color||'#fff'), zIndexOffset:900}).addTo(map);
        playersMarkers[name] = marker;
        marker.on('click',(e)=>{ /* показывать расстояние */ });
    }
    // Обновить иконку в зависимости от статуса
    const online = playersStatus[name] !== false;
    const icon = createPlayerIcon(name, color||'#fff', online);
    marker.setIcon(icon);
}

function createPlayerIcon(name, color, online = true){
    const statusMark = online ? '' : '<span style="color:#888; font-size:10px;">💤</span>';
    const dotColor = online ? color : '#888';
    const borderColor = online ? '#fff' : '#666';
    return L.divIcon({
        html: `<div class="player-marker">
                <div class="player-name-tag" style="color:${color}">${name} ${statusMark}</div>
                <div class="player-dot" style="background:${dotColor}; border-color:${borderColor};"></div>
               </div>`,
        iconSize: [70, 36],
        iconAnchor: [35, 28],
        className: ''
    });
}

function handleMapClick(e){
    if(activeTool==='pencil') return;
    let{lat,lng}=e.latlng;
    if(activeTool==='arrow'||activeTool==='ruler'){ const nearest=findNearestObject(e.latlng); if(nearest){ lat=nearest.lat; lng=nearest.lng; } }
    if(activeTool==='enemy'||activeTool==='target'){ const id=`${activeTool}_${Date.now()}_${Math.random().toString(36).substr(2,9)}`; const obj={id:id,type:activeTool,lat,lng,creator:currentUser.name}; socket.emit('new_obj',obj); addToHistory(obj); }
    else if(activeTool==='arrow'||activeTool==='ruler'){ rulerPoints.push({lat,lng}); if(rulerPoints.length===2){ const id=`${activeTool}_${Date.now()}_${Math.random().toString(36).substr(2,9)}`; const obj={id:id,type:activeTool,start:rulerPoints[0],end:rulerPoints[1],creator:currentUser.name}; socket.emit('new_obj',obj); addToHistory(obj); rulerPoints=[]; }else{ L.popup().setLatLng([lat,lng]).setContent('<b>'+(rulerPoints.length===1&&findNearestObject(e.latlng)?'✅ Привязано':'👆 Вторая точка')+'</b>').openOn(map); } }
}

function doLogin(){

    socket.emit('join_room',{room:team,name,team,pass,accessCode:code,deviceId:DEVICE_ID});
}

function tryAutoLogin(){
    const s=loadSession();
    if(s&&s.team&&s.name){ currentUser.name=s.name; currentUser.team=s.team; currentUser.color=s.color;
        document.getElementById('autoLoginMsg').textContent='↻ Автовход: '+s.name; document.getElementById('autoLoginMsg').style.display='block';
        setTimeout(()=>document.getElementById('autoLoginMsg').style.display='none',2500);
        socket.emit('join_room',{room:s.team,name:s.name,team:s.team,pass:'1234',accessCode:localStorage.getItem('scorpgeo_code')||'',deviceId:DEVICE_ID});
        return true;
    }
    return false;
}
