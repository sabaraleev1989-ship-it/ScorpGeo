<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORP GEO | TACTICAL TERMINAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Condensed:wght@700;900&display=swap');
        
        body { background: #020617; font-family: 'Roboto Condensed', sans-serif; margin: 0; overflow: hidden; color: #e2e8f0; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #000; position: absolute; top: 0; left: 0; }
        .leaflet-control-attribution { display: none !important; }

        /* ЗАСТАВКА */
        #auth-screen { background: radial-gradient(circle at center, #052e16 0%, #000000 100%); }
        .auth-card { background: rgba(0, 20, 0, 0.9); border: 2px solid #166534; backdrop-filter: blur(10px); }
        .compass-ui { width: 80px; height: 80px; border: 3px solid #22c55e; border-radius: 50%; position: relative; margin: 0 auto 15px; animation: compass-rot 10s linear infinite; }
        @keyframes compass-rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .side-panel { background: rgba(15, 23, 42, 0.9); border-right: 1px solid #334155; z-index: 5000; width: 60px; position: fixed; left: 0; top: 0; bottom: 0; display: flex; flex-direction: column; backdrop-filter: blur(5px); }
        .tool-btn { width: 60px; height: 55px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; cursor: pointer; font-size: 22px; color: #94a3b8; }
        .tool-btn.active { background: #2563eb; color: white; }
        
        .color-selector { display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 8px; border-bottom: 1px solid #1e293b; }
        .c-dot { width: 24px; height: 24px; border-radius: 4px; border: 2px solid #334155; }
        .c-dot.active { border-color: white; transform: scale(1.1); }

        /* ТАКТИЧЕСКАЯ МЕТКА */
        .dist-label { 
            background: #ffffff !important; color: #000 !important; padding: 2px 6px !important; 
            border: 2px solid #000 !important; font-weight: 900 !important; font-size: 14px !important; 
            white-space: nowrap; pointer-events: none; margin-top: 40px; text-align: center;
        }
        .user-label { background: #2563eb; color: white; padding: 1px 5px; border-radius: 3px; font-weight: bold; border: 1px solid white; font-size: 10px; text-transform: uppercase; }
        .grid-label { color: rgba(34, 197, 94, 0.7); font-family: monospace; font-size: 10px; font-weight: bold; pointer-events: none; }

        /* ЧАТ (АДАПТИВНЫЙ) */
        #chat-win { 
            position: fixed; bottom: 70px; left: 65px; right: 10px; max-width: 350px; height: 50vh; 
            background: #0f172a; border: 2px solid #334155; border-radius: 8px; z-index: 9000; 
            display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }
        .chat-hdr { padding: 10px; background: #1e293b; display: flex; justify-content: space-between; font-size: 11px; font-family: 'Orbitron'; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; background: #020617; font-family: monospace; font-size: 12px; color: #10b981; }
        .chat-ctrl { padding: 8px; background: #0f172a; border-top: 1px solid #334155; display: flex; gap: 5px; }
        
        /* ВХОД */
        .auth-input { background: #000; border: 1px solid #166534; color: #22c55e; padding: 12px; border-radius: 4px; text-align: center; width: 100%; outline: none; }
        .auth-btn { background: #166534; color: white; padding: 14px; border-radius: 4px; font-weight: bold; width: 100%; font-family: 'Orbitron'; }

        /* ЛИНИИ */
        .nav-line-b { stroke: #fff; stroke-dasharray: 8, 8; stroke-width: 5; }
        .nav-line-f { stroke: #ff0000; stroke-dasharray: 8, 8; stroke-width: 3; animation: dash 1s linear infinite; }
        @keyframes dash { from { stroke-dashoffset: 16; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center p-4">
        <div class="auth-card p-8 rounded-xl w-full max-w-xs text-center space-y-4">
            <div class="compass-ui"></div>
            <h1 style="font-family: 'Orbitron';" class="text-2xl text-white">SCORP <span class="text-green-500">GEO</span></h1>
            <div class="space-y-2">
                <input id="roomInput" type="text" placeholder="ID СЕТИ" class="auth-input">
                <input id="codeInput" type="password" placeholder="КОД" class="auth-input">
                <input id="nameInput" type="text" placeholder="ПОЗЫВНОЙ" class="auth-input">
            </div>
            <button onclick="startApp()" class="auth-btn uppercase">Вход в систему</button>
        </div>
    </div>

    <div id="ui" class="hidden">
        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️</div>
            <div class="color-selector">
                <div onclick="pickColor('#2563eb', this)" class="c-dot bg-blue-600 active"></div>
                <div onclick="pickColor('#ef4444', this)" class="c-dot bg-red-600"></div>
                <div onclick="pickColor('#22c55e', this)" class="c-dot bg-green-600"></div>
            </div>
            <div onclick="toggleChat()" class="tool-btn relative">💬<div id="badge" class="absolute top-1 right-1 bg-red-600 text-[10px] w-4 h-4 rounded-full hidden items-center justify-center">0</div></div>
            <div onclick="undo()" class="tool-btn">↩️</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>
            <div class="mt-auto">
                <div onclick="changeMap('sat')" class="tool-btn text-[10px] font-bold">SAT</div>
                <div onclick="changeMap('map')" class="tool-btn text-[10px] font-bold text-blue-400">MAP</div>
                <div onclick="logout()" class="tool-btn">🚪</div>
            </div>
        </div>

        <div id="chat-win">
            <div class="chat-hdr">
                <span class="text-green-500">RADIO [ON]</span>
                <button onclick="toggleChat()" class="text-red-500">[ЗАКРЫТЬ]</button>
            </div>
            <div id="chat-msgs"></div>
            <div class="chat-ctrl">
                <input id="chat-input" type="text" class="flex-1 bg-black p-2 rounded text-xs border border-slate-700 text-green-400 outline-none" placeholder="СООБЩЕНИЕ...">
                <button onclick="send()" class="bg-blue-700 px-3 py-1 rounded text-[10px] font-bold">ОТПРАВИТЬ</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, myInfo = { room: '', name: '', code: '', lat: 0, lng: 0 };
        let markers = {}, tactical = {}, dists = {}, navs = {};
        let tool = 'move', color = '#2563eb', arrowFrom = null, tempStart = null, unread = 0, chatOpen = false;
        let layers = {}, gridLayer = null;

        function startApp() {
            myInfo.room = document.getElementById('roomInput').value.toUpperCase().trim();
            myInfo.code = document.getElementById('codeInput').value.trim();
            myInfo.name = document.getElementById('nameInput').value.toUpperCase().trim();
            if(myInfo.room && myInfo.name && myInfo.code) socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('ui').classList.remove('hidden');
            initMap();
        });

        function initMap() {
            layers.map = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');
            layers.sat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3']});
            
            map = L.map('map', { zoomControl: false, attributionControl: false, layers: [layers.map] }).setView([43.58, 39.72], 15);
            
            updateGrid();
            map.on('zoomend', updateGrid);
            map.on('click', onMapClick);
            startGps();
        }

        function onMapClick(e) {
            if(tool === 'move') return;
            const id = 'id' + Date.now();
            if(tool === 'arrow') {
                if(!arrowFrom) {
                    arrowFrom = e.latlng;
                    tempStart = L.circleMarker(e.latlng, { radius: 4, color: color, fillOpacity: 1 }).addTo(map);
                } else {
                    if(tempStart) map.removeLayer(tempStart);
                    socket.emit('new_obj', { id, type: 'arrow', start: arrowFrom, end: e.latlng, color });
                    arrowFrom = null;
                }
            } else {
                socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng, color });
            }
        }

        function updateGrid() {
            if (gridLayer) map.removeLayer(gridLayer);
            gridLayer = L.layerGroup();
            const z = map.getZoom();
            let step = z >= 16 ? 0.001 : z >= 14 ? 0.01 : 0.1;
            const b = map.getBounds();
            
            for (let x = Math.floor(b.getWest() / step) * step; x <= b.getEast(); x += step) {
                L.polyline([[b.getSouth(), x], [b.getNorth(), x]], { color: 'rgba(34, 197, 94, 0.2)', weight: 1 }).addTo(gridLayer);
            }
            for (let y = Math.floor(b.getSouth() / step) * step; y <= b.getNorth(); y += step) {
                L.polyline([[y, b.getWest()], [y, b.getEast()]], { color: 'rgba(34, 197, 94, 0.2)', weight: 1 }).addTo(gridLayer);
            }
            gridLayer.addTo(map);
        }

        socket.on('draw', (m) => {
            let obj, pos;
            if(m.type === 'arrow') {
                const l = L.polyline([m.start, m.end], { color: m.color, weight: 3 }).addTo(map);
                const d = L.circleMarker(m.start, { radius: 3, color: m.color, fillOpacity: 1 }).addTo(map);
                obj = { layers: [l, d], latlng: m.end };
                pos = m.end;
            } else {
                const ico = m.type === 'enemy' ? '💀' : '🚩';
                obj = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:24px;">${ico}</div>`, className: 'dummy', iconAnchor: [12, 12] }) }).addTo(map);
                pos = { lat: m.lat, lng: m.lng };
            }
            dists[m.id] = L.marker(pos, { icon: L.divIcon({ className: 'dist-label', html: '---', iconAnchor: [25, -15] }) }).addTo(map);
            tactical[m.id] = obj;
            updateDist();
        });

        function updateDist() {
            Object.keys(dists).forEach(id => {
                const p = tactical[id].latlng || tactical[id].getLatLng();
                const d = Math.round(map.distance([myInfo.lat, myInfo.lng], p));
                dists[id].setIcon(L.divIcon({ className: 'dist-label', html: d + 'м', iconAnchor: [25, -15] }));
            });
        }

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                myInfo.lat = p.coords.latitude; myInfo.lng = p.coords.longitude;
                if(!myMarker) {
                    myMarker = L.circleMarker([myInfo.lat, myInfo.lng], { color: '#2563eb', radius: 8, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip(myInfo.name, { permanent: true, direction: 'top', className: 'user-label' });
                    map.setView([myInfo.lat, myInfo.lng], 17);
                } else myMarker.setLatLng([myInfo.lat, myInfo.lng]);
                updateDist();
                socket.emit('gps_sync', { lat: myInfo.lat, lng: myInfo.lng });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('users_sync', (us) => {
            Object.keys(us).forEach(id => {
                if(id === socket.id) return;
                if(!markers[id]) {
                    markers[id] = L.circleMarker([us[id].lat, us[id].lng], { color: '#ef4444', radius: 7 }).addTo(map);
                    markers[id].bindTooltip(us[id].name, { permanent: true, className: 'user-label' });
                } else markers[id].setLatLng([us[id].lat, us[id].lng]);
            });
        });

        function changeMap(t) { 
            if(t === 'sat') { map.removeLayer(layers.map); layers.sat.addTo(map); }
            else { map.removeLayer(layers.sat); layers.map.addTo(map); }
        }
        function setTool(t) { tool = t; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); }
        function pickColor(c, el) { color = c; document.querySelectorAll('.c-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function toggleChat() { chatOpen = !chatOpen; document.getElementById('chat-win').style.display = chatOpen ? 'flex' : 'none'; unread = 0; updateBadge(); }
        function send() { const i = document.getElementById('chat-input'); if(i.value) { socket.emit('msg_send', { user: myInfo.name, text: i.value }); i.value = ''; } }
        socket.on('msg_recv', (d) => { const box = document.getElementById('chat-msgs'); box.innerHTML += `<div><b>${d.user}:</b> ${d.text}</div>`; box.scrollTop = box.scrollHeight; if(!chatOpen) { unread++; updateBadge(); } });
        function updateBadge() { const b = document.getElementById('badge'); b.innerText = unread; b.style.display = unread > 0 ? 'flex' : 'none'; }
        function logout() { location.reload(); }
        function undo() { socket.emit('undo'); }
        function clearMap() { if(confirm("ОЧИСТИТЬ?")) socket.emit('clear'); }
        socket.on('del_obj', id => { if(tactical[id]) { if(tactical[id].layers) tactical[id].layers.forEach(l => map.removeLayer(l)); else map.removeLayer(tactical[id]); map.removeLayer(dists[id]); delete tactical[id]; } });
        socket.on('reset', () => { location.reload(); });
    </script>
</body>
</html>
