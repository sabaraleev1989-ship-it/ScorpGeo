<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORP GEO | ТЕРМИНАЛ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background: #020617; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; color: white; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #1a1a1a; }
        .leaflet-control-attribution { display: none !important; }

        /* Панель управления */
        .side-panel { background: #0f172a; border-right: 2px solid #1e293b; z-index: 5000; width: 64px; position: fixed; left: 0; top: 0; bottom: 0; display: flex; flex-direction: column; }
        .tool-btn { width: 64px; height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; cursor: pointer; position: relative; font-size: 24px; }
        .tool-btn.active { background: #2563eb; color: white; }
        
        /* Выбор цвета */
        .color-selector { display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 8px; border-bottom: 1px solid #1e293b; }
        .c-dot { width: 24px; height: 24px; border-radius: 4px; border: 2px solid #334155; cursor: pointer; }
        .c-dot.active { border-color: white; transform: scale(1.1); }

        /* Радиоканал */
        #chat-win { position: fixed; bottom: 80px; left: 75px; width: 300px; height: 400px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; z-index: 9000; display: none; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; background: #020617; font-family: monospace; font-size: 13px; }
        .msg-line { margin-bottom: 6px; border-bottom: 1px solid #1e293b; padding-bottom: 2px; }
        .msg-line b { color: #3b82f6; }

        /* Уведомления */
        #push-wrap { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; }
        .push { background: #2563eb; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 5px; animation: slideDown 3s forwards; }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-20px); } 10%, 90% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; } }

        /* Метки */
        .dist-label { background: #ffff00; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 14px; border: 2px solid #000; white-space: nowrap; margin-left: 20px; }
        .user-label { background: #2563eb; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; border: 1px solid white; font-size: 12px; }
        #badge { position: absolute; top: 5px; right: 5px; background: #ef4444; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: none; align-items: center; justify-content: center; }

        /* Пульсирующая линия */
        .nav-pulse { stroke: #ffff00; stroke-dasharray: 10, 10; animation: dash-move 1s linear infinite; }
        @keyframes dash-move { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div id="push-wrap"></div>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-950">
        <div class="bg-slate-900 border-2 border-slate-700 p-8 rounded-2xl w-80 space-y-4 text-center">
            <h1 class="text-3xl font-black italic text-blue-500">SCORP GEO</h1>
            <input id="roomInput" type="text" placeholder="ID СЕТИ" class="w-full p-3 bg-black border border-slate-700 rounded text-center outline-none">
            <input id="nameInput" type="text" placeholder="ПОЗЫВНОЙ" class="w-full p-3 bg-black border border-slate-700 rounded text-center outline-none">
            <button onclick="startApp()" class="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-500">ВОЙТИ</button>
        </div>
    </div>

    <div id="ui" class="hidden">
        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️</div>
            
            <div class="color-selector">
                <div onclick="pickColor('#2563eb', this)" class="c-dot bg-blue-600 active"></div>
                <div onclick="pickColor('#ef4444', this)" class="c-dot bg-red-600"></div>
                <div onclick="pickColor('#22c55e', this)" class="c-dot bg-green-600"></div>
            </div>

            <div onclick="openChat()" class="tool-btn">💬 <div id="badge">0</div></div>
            <div onclick="undo()" class="tool-btn">↩️</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>

            <div class="mt-auto">
                <div onclick="changeMap('sat')" class="tool-btn text-[10px] font-bold">СПУТ</div>
                <div onclick="changeMap('map')" class="tool-btn text-[10px] font-bold">КАРТА</div>
            </div>
        </div>

        <div id="chat-win">
            <div class="p-3 bg-slate-800 flex justify-between font-bold border-b border-slate-600">
                <span>РАДИОКАНАЛ</span>
                <button onclick="closeChat()">✖</button>
            </div>
            <div id="chat-msgs"></div>
            <div class="p-2 bg-slate-800 border-t border-slate-600 flex gap-2">
                <input id="chat-input" type="text" class="flex-1 bg-black p-2 rounded text-sm outline-none" placeholder="Сообщение...">
                <button onclick="send()" class="bg-blue-600 px-3 rounded">📡</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, myInfo = { room: '', name: '', lat: 0, lng: 0 };
        let markers = {}, tactical = {}, navs = {}, dists = {};
        let tool = 'move', color = '#2563eb', arrowFrom = null, unread = 0, chatOpen = false;
        let layers = {};

        function startApp() {
            myInfo.room = document.getElementById('roomInput').value.toUpperCase();
            myInfo.name = document.getElementById('nameInput').value.toUpperCase();
            if(myInfo.room && myInfo.name) socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('ui').classList.remove('hidden');
            init();
        });

        function init() {
            layers.map = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
            layers.sat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']});
            
            map = L.map('map', { zoomControl: false, attributionControl: false, layers: [layers.map] }).setView([43.58, 39.72], 15);
            
            map.on('click', (e) => {
                if(tool === 'move') return;
                const id = 'id' + Date.now();
                if(tool === 'arrow') {
                    if(!arrowFrom) { arrowFrom = e.latlng; return; }
                    socket.emit('new_obj', { id, type: 'arrow', start: arrowFrom, end: e.latlng, color, owner: myInfo.name });
                    arrowFrom = null;
                } else {
                    socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng, color, owner: myInfo.name });
                }
            });

            startGps();
        }

        function setTool(t) {
            tool = (tool === t) ? 'move' : t;
            arrowFrom = null;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + tool).classList.add('active');
        }

        function pickColor(c, el) {
            color = c;
            document.querySelectorAll('.c-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        socket.on('draw', (m) => {
            let obj, pos;
            if(m.type === 'arrow') {
                const l = L.polyline([m.start, m.end], { color: m.color, weight: 6 }).addTo(map);
                const d = L.circleMarker(m.start, { radius: 5, color: m.color, fillOpacity: 1 }).addTo(map);
                const h = L.polyline(getHead(m.start, m.end), { color: m.color, weight: 6 }).addTo(map);
                obj = { layers: [l, d, h], latlng: m.end };
                pos = m.end;
            } else {
                const ico = m.type === 'enemy' ? '💀' : '🚩';
                obj = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:30px;">${ico}</div>`, className: 'dummy' }) }).addTo(map);
                pos = { lat: m.lat, lng: m.lng };
                dists[m.id] = L.marker(pos, { icon: L.divIcon({ className: 'dist-label', html: '---' }) }).addTo(map);
            }
            tactical[m.id] = obj;
            const clickTarget = obj.on ? obj : obj.layers[0];
            clickTarget.on('click', () => togglePulse(m.id, pos));
            updateDist();
        });

        function getHead(s, e) {
            const d = Math.atan2(e.lng - s.lng, e.lat - s.lat);
            const h = 0.0006;
            return [[e.lat - h * Math.cos(d - 0.5), e.lng - h * Math.sin(d - 0.5)], [e.lat, e.lng], [e.lat - h * Math.cos(d + 0.5), e.lng - h * Math.sin(d + 0.5)]];
        }

        function togglePulse(id, pos) {
            if(navs[id]) { map.removeLayer(navs[id]); delete navs[id]; }
            else { navs[id] = L.polyline([[myInfo.lat, myInfo.lng], pos], { className: 'nav-pulse' }).addTo(map); }
        }

        function updateDist() {
            Object.keys(dists).forEach(id => {
                const p = tactical[id].getLatLng ? tactical[id].getLatLng() : tactical[id].latlng;
                const d = Math.round(map.distance([myInfo.lat, myInfo.lng], p));
                dists[id].setIcon(L.divIcon({ className: 'dist-label', html: d + 'м' }));
                if(navs[id]) navs[id].setLatLngs([[myInfo.lat, myInfo.lng], p]);
            });
        }

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                myInfo.lat = p.coords.latitude; myInfo.lng = p.coords.longitude;
                if(!myMarker) {
                    myMarker = L.circleMarker([myInfo.lat, myInfo.lng], { color: '#2563eb', radius: 9, fillOpacity: 1, weight: 3 }).addTo(map);
                    myMarker.bindTooltip(myInfo.name, { permanent: true, direction: 'top', className: 'user-label' });
                    map.setView([myInfo.lat, myInfo.lng], 17);
                } else myMarker.setLatLng([myInfo.lat, myInfo.lng]);
                updateDist();
                socket.emit('gps_sync', { lat: myInfo.lat, lng: myInfo.lng });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('users_sync', (us) => {
            Object.keys(us).forEach(id => {
                if(id === socket.id) return;
                const u = us[id];
                if(!markers[id]) {
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#ef4444', radius: 8, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(u.name, { permanent: true, direction: 'top', className: 'user-label' });
                } else markers[id].setLatLng([u.lat, u.lng]);
            });
        });

        // РАДИОКАНАЛ
        function openChat() { chatOpen = true; unread = 0; updateBadge(); document.getElementById('chat-win').style.display = 'flex'; }
        function closeChat() { chatOpen = false; document.getElementById('chat-win').style.display = 'none'; }
        
        function send() {
            const i = document.getElementById('chat-input');
            if(i.value) { socket.emit('msg_send', { user: myInfo.name, text: i.value }); i.value = ''; }
        }

        socket.on('msg_recv', (d) => {
            const box = document.getElementById('chat-msgs');
            const line = document.createElement('div');
            line.className = 'msg-line';
            line.innerHTML = `<b>${d.user}:</b> ${d.text}`;
            box.appendChild(line);
            box.scrollTop = box.scrollHeight;

            if(!chatOpen) {
                unread++;
                updateBadge();
                const wrap = document.getElementById('push-wrap');
                const p = document.createElement('div');
                p.className = 'push';
                p.innerText = `${d.user}: ${d.text}`;
                wrap.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        });

        function updateBadge() {
            const b = document.getElementById('badge');
            b.innerText = unread; b.style.display = unread > 0 ? 'flex' : 'none';
        }

        function changeMap(t) { map.removeLayer(layers.map); map.removeLayer(layers.sat); map.addLayer(layers[t]); }
        function undo() { socket.emit('undo'); }
        function clearMap() { if(confirm("Удалить всё?")) socket.emit('clear'); }

        socket.on('del_obj', (id) => {
            if(tactical[id]) {
                const o = tactical[id];
                if(o.layers) o.layers.forEach(l => map.removeLayer(l)); else map.removeLayer(o);
                if(dists[id]) map.removeLayer(dists[id]);
                if(navs[id]) map.removeLayer(navs[id]);
                delete tactical[id];
            }
        });
        socket.on('reset', () => location.reload());

        // Слушатель Enter
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
