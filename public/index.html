<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCORPION PRO — ФИНАЛЬНЫЙ ФИКС</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; color: #fff; }
        #map { position: absolute; inset: 0; z-index: 1; background: #000; }
        
        /* ЧИСТЫЙ ЧЕРНЫЙ ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .auth-input { width: 280px; background: #000; border: 2px solid #2ecc71; color: #fff; padding: 15px; margin-bottom: 10px; text-align: center; appearance: none; -webkit-appearance: none; }
        .auth-btn { width: 280px; background: #1f5f2f; color: white; padding: 18px; font-weight: bold; }

        /* БОКОВАЯ ПАНЕЛЬ */
        .side-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 80px; background: rgba(0,0,0,0.9); border-right: 2px solid #2ecc71; z-index: 5000; display: none; flex-direction: column; }
        .tool-btn { width: 100%; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #1a1a1a; color: #2ecc71; font-size: 9px; font-weight: 900; }
        .tool-btn.active { background: #14532d; color: #fff; }

        /* ТАКТИЧЕСКАЯ СЕТКА */
        .grid-label { position: absolute; font-size: 11px; font-weight: 900; background: rgba(0,0,0,0.7); color: #ffffaa; padding: 2px 5px; border-radius: 3px; pointer-events: none; z-index: 1000; text-shadow: 1px 1px 0 #000; }

        /* ОКНО СВЯЗИ (ЧАТ) */
        #chat-win { position: fixed; bottom: 10px; left: 90px; right: 10px; height: 160px; background: rgba(0,0,0,0.95); border: 1px solid #2ecc71; z-index: 6000; display: none; flex-direction: column; }
        #chat-m { flex: 1; overflow-y: auto; padding: 8px; font-size: 12px; }
        .chat-msg { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        #chatI { background: #000; color: #fff; border: 1px solid #2ecc71; padding: 10px; width: 100%; outline: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="text-center">
        <div class="text-2xl font-black text-green-500 mb-6">SCORPION TACTICAL</div>
        <input type="text" id="playerNameInput" class="auth-input" placeholder="ПОЗЫВНОЙ">
        <input type="password" id="passwordInput" class="auth-input" placeholder="ПАРОЛЬ">
        <button onclick="login()" class="auth-btn">ВХОД</button>
    </div>
</div>

<div class="side-panel" id="ui-panel">
    <div onclick="setTool('move')" id="b-move" class="tool-btn active"><b>🖐️</b><span>РУКА</span></div>
    <div onclick="centerMe()" id="b-iam" class="tool-btn"><b>🎯</b><span>Я ТУТ</span></div>
    <div onclick="setTool('enemy')" id="b-enemy" class="tool-btn"><b>💀</b><span>ВРАГ</span></div>
    <div onclick="setTool('target')" id="b-target" class="tool-btn"><b>🚩</b><span>ЦЕЛЬ</span></div>
    <div onclick="setTool('arrow')" id="b-arrow" class="tool-btn"><b>➡️</b><span>УДАР</span></div>
    <div onclick="setTool('ruler')" id="b-ruler" class="tool-btn"><b>📏</b><span>МЕРКА</span></div>
    <div onclick="setTool('eraser')" id="b-eraser" class="tool-btn"><b>🧼</b><span>СТЕРКА</span></div>
    <div onclick="toggleChat()" class="tool-btn"><b>💬</b><span>СВЯЗЬ</span></div>
    <div onclick="setMap('sat')" class="tool-btn"><b>🛰️</b><span>SAT</span></div>
    <div onclick="setMap('map')" class="tool-btn"><b>🗺️</b><span>КАРТА</span></div>
    <div onclick="location.reload()" class="tool-btn text-red-500"><b>🚪</b><span>ВЫХОД</span></div>
</div>

<div id="map"></div>
<div id="grid-labels"></div>

<div id="chat-win">
    <div id="chat-m"></div>
    <div class="flex p-1 bg-black border-t border-green-900">
        <input id="chatI" placeholder="Текст..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" class="bg-green-800 px-4 ml-1">📡</button>
    </div>
</div>

<script>
    const socket = io();
    let map, myName, myColor, activeTool = 'move';
    let players = {}, tacticalData = {}, rulerPoints = [];
    let myPos = { lat: 0, lng: 0 };
    const RUS = "АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЩЭЮЯ".split('');

    function login() {
        myName = document.getElementById('playerNameInput').value.trim().toUpperCase();
        const pass = document.getElementById('passwordInput').value;
        if(myName) socket.emit('join_room', { room: 'SIR', name: myName, pass: pass });
    }

    socket.on('login_success', data => {
        myColor = data.color || '#2ecc71';
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('ui-panel').style.display = 'flex';
        initMap();
    });

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 22 }).setView([43.402, 39.956], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);

        map.on('click', e => {
            if (activeTool === 'enemy' || activeTool === 'target') {
                socket.emit('new_obj', { id: 'id'+Date.now(), type: activeTool, lat: e.latlng.lat, lng: e.latlng.lng });
            } else if (activeTool === 'arrow' || activeTool === 'ruler') {
                rulerPoints.push(e.latlng);
                if (rulerPoints.length === 2) {
                    socket.emit('new_obj', { id: 'id'+Date.now(), type: activeTool, start: rulerPoints[0], end: rulerPoints[1] });
                    rulerPoints = [];
                }
            }
        });

        map.on('move zoom', updateGrid);
        updateGrid();
        
        navigator.geolocation.watchPosition(p => {
            myPos = { lat: p.coords.latitude, lng: p.coords.longitude };
            socket.emit('gps_sync', { ...myPos, name: myName, color: myColor });
            drawPlayer(myName, myPos, myColor);
        }, null, { enableHighAccuracy: true });
    }

    function updateGrid() {
        const container = document.getElementById('grid-labels');
        container.innerHTML = '';
        if (map.getZoom() < 16) return;
        const b = map.getBounds();
        const step = 0.00025; // ~25 метров

        // Буквы сверху
        for (let x = Math.floor(b.getWest()/step)*step; x <= b.getEast(); x += step) {
            let p = map.latLngToContainerPoint([b.getNorth(), x]);
            if (p.x < 80) continue;
            let d = document.createElement('div'); d.className = 'grid-label';
            d.style.left = p.x + 'px'; d.style.top = '10px';
            d.innerText = RUS[Math.abs(Math.round(x/step)) % RUS.length];
            container.appendChild(d);
        }
        // Цифры справа
        for (let y = Math.floor(b.getSouth()/step)*step; y <= b.getNorth(); y += step) {
            let p = map.latLngToContainerPoint([y, b.getEast()]);
            let d = document.createElement('div'); d.className = 'grid-label';
            d.style.right = '10px'; d.style.top = p.y + 'px';
            d.innerText = Math.abs(Math.round(y/step)) % 100;
            container.appendChild(d);
        }
    }

    socket.on('draw', obj => {
        if(tacticalData[obj.id]) tacticalData[obj.id].forEach(l => map.removeLayer(l));
        let layers = [];
        if (obj.type === 'ruler' || obj.type === 'arrow') {
            let color = obj.type === 'arrow' ? '#ff4444' : '#ffcc00';
            let line = L.polyline([obj.start, obj.end], { color: color, weight: 5 }).addTo(map);
            layers.push(line);
            if (obj.type === 'ruler') {
                let dist = Math.round(map.distance(obj.start, obj.end));
                let label = L.marker(obj.end, { icon: L.divIcon({ html: `<div style="background:#000; color:${color}; padding:2px 5px; font-weight:bold; border:1px solid ${color}; white-space:nowrap;">${dist}м</div>`, iconAnchor: [-10, 0] }) }).addTo(map);
                layers.push(label);
            }
        } else {
            let sym = obj.type === 'enemy' ? '💀' : '🚩';
            let icon = L.divIcon({ html: `<div style="font-size:30px; filter:drop-shadow(2px 2px 2px black);">${sym}</div>`, iconSize: [30, 30], iconAnchor: [15, 15] });
            let m = L.marker([obj.lat, obj.lng], { icon }).addTo(map);
            m.on('click', () => { if(activeTool === 'eraser') socket.emit('delete_obj', obj.id); });
            layers.push(m);
        }
        tacticalData[obj.id] = layers;
    });

    socket.on('remove_obj', id => { if(tacticalData[id]) { tacticalData[id].forEach(l => map.removeLayer(l)); delete tacticalData[id]; } });

    // ЧАТ С ЦВЕТНЫМИ ПОЗЫВНЫМИ
    function sendMsg() {
        const input = document.getElementById('chatI');
        if (input.value.trim()) {
            socket.emit('chat_msg', { name: myName, text: input.value, color: myColor });
            input.value = '';
        }
    }

    socket.on('receive_msg', data => {
        const chat = document.getElementById('chat-m');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-msg';
        // Если пришел объект с цветом — используем его, если строка — красим в дефолт
        const color = data.color || '#fff';
        const name = data.name || 'СИСТЕМА';
        const text = data.text || data;
        msgDiv.innerHTML = `<span style="color:${color}; font-weight:bold;">${name}:</span> <span>${text}</span>`;
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    });

    function drawPlayer(name, pos, col) {
        if (!players[name]) {
            players[name] = L.marker([pos.lat, pos.lng], { 
                icon: L.divIcon({ html: `<div style="color:${col}; font-weight:900; text-shadow:1px 1px 2px #000; white-space:nowrap;">${name}</div><div style="width:12px; height:12px; background:${col}; border:2px solid #fff; border-radius:50%; margin:0 auto;"></div>`, iconSize: [100, 40], iconAnchor: [50, 30] }) 
            }).addTo(map);
        } else {
            players[name].setLatLng([pos.lat, pos.lng]);
        }
    }

    socket.on('player_move', d => drawPlayer(d.name, d, d.color));

    function setTool(t) { 
        activeTool = t; rulerPoints = [];
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('b-'+t).classList.add('active');
    }
    function setMap(t) {
        map.eachLayer(l => { if(l._url) map.removeLayer(l); });
        let url = t === 'sat' ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        L.tileLayer(url, { maxZoom: 22 }).addTo(map);
    }
    function toggleChat() { const c = document.getElementById('chat-win'); c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; }
    function centerMe() { if(myPos.lat) map.setView([myPos.lat, myPos.lng], 18); }
</script>
</body>
</html>
