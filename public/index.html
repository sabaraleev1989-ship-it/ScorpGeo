<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION TACTICAL V15</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .dist-label { 
            color: #000 !important; font-weight: 900 !important; font-size: 18px !important; 
            text-shadow: -2px -2px 0 #ff0000, 2px -2px 0 #ff0000, -2px 2px 0 #ff0000, 2px 2px 0 #ff0000;
            white-space: nowrap; pointer-events: none; background: none !important; border: none !important;
        }

        .p-marker { display: flex; flex-direction: column; align-items: center; }
        .p-name { color: #000; font-weight: 900; font-size: 14px; text-shadow: -1px -1px 0 #ff0000, 1px -1px 0 #ff0000, -1px 1px 0 #ff0000, 1px 1px 0 #ff0000; text-transform: uppercase; }
        .p-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; }

        .side-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 65px; background: #0a0a0a; border-right: 2px solid #22c55e; z-index: 5000; display: flex; flex-direction: column; }
        .tool-btn { width: 65px; height: 48px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #222; color: #22c55e; font-size: 22px; cursor: pointer; }
        .tool-btn.active { background: #166534; color: #fff; }

        .pulse-line { stroke-dasharray: 10; animation: dash 1.5s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -20; } }

        #map { height: 100vh; width: 100%; background: #000; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[9999] bg-[#050505] flex flex-col items-center justify-center">
        <h1 class="text-white font-bold text-2xl mb-6" style="font-family:'Orbitron'">SCORPION <span class="text-green-500">V15</span></h1>
        <input id="roomInput" type="text" placeholder="КОД КОМНАТЫ" class="bg-black border-2 border-green-500 text-green-500 p-4 mb-3 w-72 text-center font-bold">
        <input id="nameInput" type="text" placeholder="ПОЗЫВНОЙ" class="bg-black border-2 border-green-500 text-green-500 p-4 mb-3 w-72 text-center font-bold">
        <button onclick="startApp()" class="bg-green-700 text-white p-4 w-72 font-bold border-2 border-green-500">ВХОД</button>
    </div>

    <div id="app-ui" style="display:none">
        <div class="side-panel">
            <div onclick="setTool('move')" id="btn-move" class="tool-btn active">🖐️</div>
            <div onclick="setTool('enemy')" id="btn-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="btn-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="btn-arrow" class="tool-btn">➡️</div>
            <div onclick="setTool('ruler')" id="btn-ruler" class="tool-btn">📏</div>
            <div onclick="setTool('eraser')" id="btn-eraser" class="tool-btn">🧼</div>
            
            <div class="mt-auto"></div>
            <div onclick="setMap('sat')" id="btn-sat" class="tool-btn text-xs">SAT</div>
            <div onclick="setMap('map')" id="btn-map" class="tool-btn text-xs active">MAP</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>
            <div onclick="location.reload()" class="tool-btn">🚪</div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myName = '', myRoom = '', tool = 'move', userPos = {lat:0, lng:0};
        let players = {}, playerDistanceLines = {}; 
        let tacticalItems = {}; // Теперь храним объекты по ID для точечного удаления
        let clickCount = 0, firstPoint = null;

        const layers = {
            map: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };

        function startApp() {
            myRoom = document.getElementById('roomInput').value.toUpperCase();
            myName = document.getElementById('nameInput').value.toUpperCase();
            if(myRoom && myName) socket.emit('join_room', { room: myRoom, name: myName });
        }

        socket.on('login_success', () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.40, 39.95], 18);
            layers.map.addTo(map);
            map.on('click', handleMapClick);

            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                socket.emit('gps_sync', { ...userPos, name: myName });
                drawPlayer(myName, userPos, '#22c55e');
            }, null, { enableHighAccuracy: true });
        }

        function handleMapClick(e) {
            if (tool === 'move' || tool === 'eraser') return;

            const id = Date.now() + Math.random().toString(36).substr(2, 9);

            if (tool === 'arrow' || tool === 'ruler') {
                if (clickCount === 0) {
                    firstPoint = e.latlng; clickCount = 1;
                } else {
                    socket.emit('new_obj', { 
                        id, type: tool, start: firstPoint, end: e.latlng, 
                        color: tool === 'arrow' ? '#ff0000' : '#ffff00' 
                    });
                    resetClicks();
                }
            } else {
                socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng, from: userPos });
            }
        }

        socket.on('draw', m => {
            let layerGroup = [];
            
            if (m.type === 'arrow' || m.type === 'ruler') {
                const line = L.polyline([m.start, m.end], { color: m.color, weight: 4 }).addTo(map);
                const dist = Math.round(map.distance(m.start, m.end));
                const label = L.marker(m.end, {
                    icon: L.divIcon({ html: `${dist}м`, className: 'dist-label', iconAnchor: [20, 20] })
                }).addTo(map);
                
                [line, label].forEach(l => l.on('click', (e) => handleEraser(m.id, e)));
                layerGroup = [line, label];
            } else if (m.type === 'dist_line') {
                if (playerDistanceLines[m.owner]) {
                    playerDistanceLines[m.owner].forEach(l => map.removeLayer(l));
                }
                const line = L.polyline([m.start, m.end], { color: '#ff0000', weight: 3, className: 'pulse-line' }).addTo(map);
                const dist = Math.round(map.distance(m.start, m.end));
                const label = L.marker([(m.start.lat + m.end.lat)/2, (m.start.lng + m.end.lng)/2], {
                    icon: L.divIcon({ html: `${dist}м`, className: 'dist-label', iconAnchor: [25, 0] })
                }).addTo(map);
                playerDistanceLines[m.owner] = [line, label];
                return; 
            } else {
                const icon = m.type === 'enemy' ? '💀' : '🚩';
                const item = L.marker([m.lat, m.lng], { 
                    icon: L.divIcon({ html: `<div style="font-size:30px; cursor:pointer">${icon}</div>`, className: '', iconAnchor:[15,15] }) 
                }).addTo(map);
                
                item.on('click', (e) => {
                    if (tool === 'eraser') {
                        handleEraser(m.id, e);
                    } else if (tool === 'move') {
                        socket.emit('new_obj', { type: 'dist_line', start: userPos, end: [m.lat, m.lng], owner: myName });
                        L.DomEvent.stopPropagation(e);
                    }
                });
                layerGroup = [item];
            }
            
            if (m.id) tacticalItems[m.id] = layerGroup;
        });

        function handleEraser(id, e) {
            if (tool === 'eraser') {
                socket.emit('delete_obj', id);
                L.DomEvent.stopPropagation(e);
            }
        }

        socket.on('remove_obj', id => {
            if (tacticalItems[id]) {
                tacticalItems[id].forEach(l => map.removeLayer(l));
                delete tacticalItems[id];
            }
        });

        function drawPlayer(name, pos, color) {
            if (!players[name]) {
                const icon = L.divIcon({
                    className: '',
                    html: `<div class="p-marker"><div class="p-name">${name}</div><div class="p-dot" style="background:${color}"></div></div>`,
                    iconSize: [100, 40], iconAnchor: [50, 35]
                });
                players[name] = L.marker([pos.lat, pos.lng], { icon, zIndexOffset: 1000 }).addTo(map);
            } else {
                players[name].setLatLng([pos.lat, pos.lng]);
            }
        }

        function setTool(t) {
            tool = t; resetClicks();
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+t).classList.add('active');
        }

        function setMap(type) {
            map.removeLayer(layers.map); map.removeLayer(layers.sat);
            layers[type].addTo(map);
            document.getElementById('btn-sat').classList.toggle('active', type === 'sat');
            document.getElementById('btn-map').classList.toggle('active', type === 'map');
        }

        function resetClicks() { clickCount = 0; firstPoint = null; }
        function clearMap() { 
            if(confirm("УДАЛИТЬ ВСЕ МЕТКИ?")) socket.emit('clear');
        }
        
        socket.on('clear_all', () => { 
            Object.values(tacticalItems).forEach(group => group.forEach(l => map.removeLayer(l)));
            tacticalItems = {}; 
            Object.values(playerDistanceLines).forEach(group => group.forEach(l => map.removeLayer(l)));
            playerDistanceLines = {};
        });
    </script>
</body>
</html>
