<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION TACTICAL V17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        /* РАДАР АНИМАЦИЯ */
        .radar { width: 100px; height: 100px; border: 2px solid #166534; border-radius: 50%; position: relative; background: repeating-radial-gradient(circle, #000 0%, #000 10%, #166534 11%, #000 12%); overflow: hidden; }
        .radar::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, rgba(34, 197, 94, 0.4)); transform-origin: top left; animation: scan 3s linear infinite; }
        .target { position: absolute; width: 4px; height: 4px; background: red; border-radius: 50%; box-shadow: 0 0 5px red; animation: blink 1s infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0; } }

        /* ВИЗУАЛ */
        .dist-label { color: #000 !important; font-weight: 900 !important; font-size: 14px !important; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; pointer-events: none; white-space: nowrap; }
        .p-name { background: #16a34a; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; border: 1px solid white; white-space: nowrap; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .p-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; background: #16a34a; box-shadow: 0 0 10px #16a34a; }
        
        .side-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 75px; background: rgba(5,5,5,0.98); border-right: 2px solid #166534; z-index: 5000; display: flex; flex-direction: column; }
        .tool-btn { width: 100%; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #111; cursor: pointer; color: #16a34a; transition: 0.2s; }
        .tool-btn span { font-size: 9px; font-weight: bold; margin-top: 3px; text-transform: uppercase; }
        .tool-btn.active { background: #166534; color: #fff; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        
        #map { height: 100vh; width: 100%; background: #050505; }
        .pulse-line { stroke-dasharray: 8; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }
    </style>
</head>
<body>

<div id="auth-screen" class="fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-6">
    <div class="radar mb-6">
        <div class="target" style="top:20%; left:30%"></div>
        <div class="target" style="top:60%; left:70%"></div>
    </div>
    <h1 class="text-white font-bold text-2xl mb-8 tracking-widest text-green-500">SCORPION <span class="text-white">TACTICAL</span></h1>
    <div class="w-full max-w-xs space-y-3">
        <input id="roomInput" type="text" placeholder="КОД КОМНАТЫ" class="w-full bg-black border-2 border-green-900 text-green-500 p-4 text-center focus:border-green-500 outline-none">
        <input id="nameInput" type="text" placeholder="ВАШ ПОЗЫВНОЙ" class="w-full bg-black border-2 border-green-900 text-green-500 p-4 text-center focus:border-green-500 outline-none">
        <input id="passInput" type="password" placeholder="ПАРОЛЬ" class="w-full bg-black border-2 border-green-900 text-green-500 p-4 text-center focus:border-green-500 outline-none">
        <button onclick="startApp()" class="w-full bg-green-700 hover:bg-green-600 text-white p-4 font-bold transition-all shadow-lg shadow-green-900/20">ВХОД В СИСТЕМУ</button>
    </div>
</div>

<div id="app-ui" style="display:none">
    <div class="side-panel">
        <div onclick="setTool('move')" id="btn-move" class="tool-btn active"><span>🖐️</span><span>Рука</span></div>
        <div onclick="centerMap()" class="tool-btn"><span>🎯</span><span>ГДЕ Я</span></div>
        <div onclick="setTool('enemy')" id="btn-enemy" class="tool-btn"><span>💀</span><span>ВРАГ</span></div>
        <div onclick="setTool('point')" id="btn-point" class="tool-btn"><span>🚩</span><span>ЦЕЛЬ</span></div>
        <div onclick="setTool('arrow')" id="btn-arrow" class="tool-btn"><span>➡️</span><span>УДАР</span></div>
        <div onclick="setTool('ruler')" id="btn-ruler" class="tool-btn"><span>📏</span><span>ЛИНЕЙКА</span></div>
        <div onclick="setTool('eraser')" id="btn-eraser" class="tool-btn"><span>🧼</span><span>ЛАСТИК</span></div>
        <div onclick="toggleChat()" class="tool-btn"><span>💬</span><span>РАДИО</span></div>
        <div class="mt-auto"></div>
        <div onclick="setMap('sat')" id="btn-sat" class="tool-btn"><span>🛰️</span><span>SAT</span></div>
        <div onclick="setMap('map')" id="btn-map" class="tool-btn active"><span>🗺️</span><span>MAP</span></div>
        <div onclick="clearMap()" class="tool-btn text-red-600"><span>🗑️</span><span>СБРОС</span></div>
    </div>

    <div id="map"></div>

    <div id="chat-window" class="fixed bottom-4 right-4 w-64 h-80 bg-black/95 border-2 border-green-600 z-[6000] hidden flex-col">
        <div class="bg-green-900 p-2 flex justify-between items-center text-white text-[10px]">
            <span>РАДИООБМЕН</span>
            <button onclick="toggleChat()" class="bg-red-600 px-2 rounded">X</button>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto p-2 text-green-500 text-xs"></div>
        <div class="p-2 border-t border-green-900 flex">
            <input id="chatInput" class="flex-1 bg-black text-white p-1 text-xs border border-green-600 outline-none">
            <button onclick="sendMsg()" class="ml-1 bg-green-700 px-2 text-white text-xs">📡</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let map, myName, myRoom, tool = 'move', userPos = {lat:0, lng:0}, tacticalItems = {}, distLines = {}, clickCount = 0, firstPoint = null;
    let players = {};

    const layers = {
        map: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
        sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    };

    function startApp() {
        myRoom = document.getElementById('roomInput').value.toUpperCase();
        myName = document.getElementById('nameInput').value.toUpperCase();
        const pass = document.getElementById('passInput').value;
        if(myRoom && myName) socket.emit('join_room', { room: myRoom, name: myName, pass: pass });
    }

    socket.on('auth_error', (err) => alert(err));
    socket.on('login_success', () => {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-ui').style.display = 'block';
        initMap();
    });

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.40, 39.95], 18);
        layers.map.addTo(map);
        map.on('click', handleMapClick);

        navigator.geolocation.watchPosition(p => {
            userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
            socket.emit('gps_sync', { ...userPos, name: myName });
            drawPlayer(myName, userPos);
        }, null, { enableHighAccuracy: true });
    }

    function handleMapClick(e) {
        if (tool === 'move' || tool === 'eraser') return;
        const id = 'obj_' + Date.now();

        if (tool === 'arrow' || tool === 'ruler') {
            if (clickCount === 0) { firstPoint = e.latlng; clickCount = 1; }
            else {
                socket.emit('new_obj', { id, type: tool, start: firstPoint, end: e.latlng });
                clickCount = 0;
            }
        } else {
            socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng });
        }
    }

    socket.on('draw', m => {
        let group = [];
        if (m.type === 'ruler') {
            // ЛИНЕЙКА: Черная с белой обводкой + точки
            const line = L.polyline([m.start, m.end], { color: '#000', weight: 8, opacity: 0.8 }).addTo(map);
            const lineInner = L.polyline([m.start, m.end], { color: '#fff', weight: 3 }).addTo(map);
            const p1 = L.circleMarker(m.start, { radius: 6, color: '#fff', fillColor: '#000', fillOpacity: 1 }).addTo(map);
            const p2 = L.circleMarker(m.end, { radius: 6, color: '#fff', fillColor: '#000', fillOpacity: 1 }).addTo(map);
            const dist = Math.round(map.distance(m.start, m.end));
            const lbl = L.marker(m.end, { icon: L.divIcon({ html: `${dist}м`, className: 'dist-label', iconAnchor: [-10, 20] }) }).addTo(map);
            group = [line, lineInner, p1, p2, lbl];
        } 
        else if (m.type === 'arrow') {
            // УДАР: Красная стрелка с острием и точкой начала
            const line = L.polyline([m.start, m.end], { color: '#ff0000', weight: 5 }).addTo(map);
            const pStart = L.circleMarker(m.start, { radius: 4, color: '#ff0000', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
            
            // Расчет острия стрелки
            const angle = Math.atan2(m.end.lat - m.start.lat, m.end.lng - m.start.lng);
            const head1 = [m.end.lat - 0.00005 * Math.sin(angle + Math.PI/4), m.end.lng - 0.00005 * Math.cos(angle + Math.PI/4)];
            const head2 = [m.end.lat - 0.00005 * Math.sin(angle - Math.PI/4), m.end.lng - 0.00005 * Math.cos(angle - Math.PI/4)];
            const arrowHead = L.polyline([head1, [m.end.lat, m.end.lng], head2], { color: '#ff0000', weight: 5 }).addTo(map);
            
            group = [line, pStart, arrowHead];
        }
        else if (m.type === 'dist_line') {
            if(distLines[m.owner]) distLines[m.owner].forEach(l => map.removeLayer(l));
            const line = L.polyline([m.start, m.end], { color: 'red', weight: 3, className: 'pulse-line' }).addTo(map);
            const d = Math.round(map.distance(m.start, m.end));
            const lbl = L.marker([(m.start.lat+m.end.lat)/2, (m.start.lng+m.end.lng)/2], { icon: L.divIcon({ html: `${d}м`, className: 'dist-label' }) }).addTo(map);
            distLines[m.owner] = [line, lbl];
            return;
        } 
        else {
            const icon = m.type === 'enemy' ? '💀' : '🚩';
            const item = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:30px">${icon}</div>`, iconAnchor: [15, 15] }) }).addTo(map);
            item.on('click', (e) => {
                if (tool === 'eraser') socket.emit('delete_obj', m.id);
                else if (tool === 'move') socket.emit('new_obj', { type: 'dist_line', start: userPos, end: [m.lat, m.lng], owner: myName });
                L.DomEvent.stopPropagation(e);
            });
            group = [item];
        }
        
        tacticalItems[m.id] = group;
        // Позволяем удалять линии ластиком по клику
        group.forEach(layer => layer.on('click', (e) => { if(tool === 'eraser') socket.emit('delete_obj', m.id); L.DomEvent.stopPropagation(e); }));
    });

    socket.on('remove_obj', id => { if(tacticalItems[id]) { tacticalItems[id].forEach(l => map.removeLayer(l)); delete tacticalItems[id]; } });
    socket.on('clear_all', () => location.reload());

    function drawPlayer(name, pos) {
        const icon = L.divIcon({ 
            html: `<div style="display:flex;flex-direction:column;align-items:center"><div class="p-name">${name}</div><div class="p-dot"></div></div>`, 
            iconSize: [100, 40], iconAnchor: [50, 35] 
        });
        if (!players[name]) players[name] = L.marker([pos.lat, pos.lng], { icon, zIndexOffset: 1000 }).addTo(map);
        else players[name].setLatLng([pos.lat, pos.lng]);
    }

    socket.on('player_move', d => drawPlayer(d.name, d));

    function setTool(t) { tool = t; clickCount = 0; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); }
    function centerMap() { if(userPos.lat) map.flyTo([userPos.lat, userPos.lng], 18); }
    function setMap(t) { map.removeLayer(layers.map); map.removeLayer(layers.sat); layers[t].addTo(map); document.getElementById('btn-map').classList.toggle('active', t==='map'); document.getElementById('btn-sat').classList.toggle('active', t==='sat'); }
    function clearMap() { if(confirm("ВНИМАНИЕ! УДАЛИТЬ ВСЕ ДЕТАЛИ У ВСЕХ?")) socket.emit('clear'); }
    function toggleChat() { const c = document.getElementById('chat-window'); c.classList.toggle('hidden'); c.classList.toggle('flex'); }
    function sendMsg() { const i = document.getElementById('chatInput'); if(i.value) { socket.emit('chat_msg', `${myName}: ${i.value}`); i.value = ''; } }
    socket.on('receive_msg', m => { const d = document.getElementById('chat-msgs'); d.innerHTML += `<div>${m}</div>`; d.scrollTop = d.scrollHeight; });
</script>
</body>
</html>
