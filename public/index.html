<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION TACTICAL V18</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family: sans-serif; }
        .side-panel { position:fixed; left:0; top:0; bottom:0; width:85px; background:rgba(5,5,5,0.98); border-right:3px solid #166534; z-index:5000; overflow-y:auto; }
        .tool-btn { width:100%; height:80px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-bottom:1px solid #222; cursor:pointer; color:#16a34a; }
        .tool-btn b { font-size:28px; }
        .tool-btn span { font-size:9px; font-weight:bold; margin-top:4px; text-transform:uppercase; }
        .tool-btn.active { background:#166534; color:#fff; }
        
        .player-label { text-align:center; font-weight:900; font-size:14px; text-shadow:2px 2px #000; }
        .player-dot { width:16px; height:16px; border-radius:50%; border:3px solid #fff; margin:0 auto; box-shadow:0 0 10px #000; }
        
        #grid-container { position:fixed; inset:0; pointer-events:none; z-index:1000; }
        .g-line { position:absolute; background:rgba(34,197,94,0.2); }
        .g-label { position:absolute; color:#22c55e; font-size:11px; font-weight:bold; background:rgba(0,0,0,0.5); padding:2px; }

        #chat-window { position:fixed; bottom:20px; right:20px; width:280px; height:350px; background:rgba(0,0,0,0.95); border:2px solid #16a34a; z-index:6000; display:none; flex-direction:column; }
        .dist-label { color:#fff !important; font-weight:bold; background:rgba(255,0,0,0.7); padding:2px 5px; border-radius:4px; font-size:12px; }
        .pulse-line { stroke-dasharray: 8; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }
        #map { height:100vh; width:100%; background:#050505; }
    </style>
</head>
<body>

<div id="auth-screen" class="fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-6">
    <h1 class="text-green-500 font-black text-3xl mb-8">SCORPION V18</h1>
    <div class="w-full max-w-xs space-y-3">
        <input id="roomInput" type="text" placeholder="КОМНАТА" class="w-full bg-zinc-900 border-2 border-green-900 text-white p-4 text-center outline-none">
        <input id="nameInput" type="text" placeholder="ПОЗЫВНОЙ" class="w-full bg-zinc-900 border-2 border-green-900 text-white p-4 text-center outline-none">
        <input id="passInput" type="password" placeholder="ПАРОЛЬ" class="w-full bg-zinc-900 border-2 border-green-900 text-white p-4 text-center outline-none">
        <button onclick="startApp()" class="w-full bg-green-700 text-white p-4 font-black">В БОЙ</button>
    </div>
</div>

<div id="app-ui" style="display:none">
    <div id="grid-container"></div>
    <div class="side-panel">
        <div onclick="setTool('move')" id="btn-move" class="tool-btn active"><b>🖐️</b><span>РУКА</span></div>
        <div onclick="centerMap()" class="tool-btn"><b>🎯</b><span>Я ТУТ</span></div>
        <div onclick="setTool('enemy')" id="btn-enemy" class="tool-btn"><b>💀</b><span>ВРАГ</span></div>
        <div onclick="setTool('point')" id="btn-point" class="tool-btn"><b>🚩</b><span>ЦЕЛЬ</span></div>
        <div onclick="setTool('arrow')" id="btn-arrow" class="tool-btn"><b>➡️</b><span>УДАР</span></div>
        <div onclick="setTool('ruler')" id="btn-ruler" class="tool-btn"><b>📏</b><span>МЕРКА</span></div>
        <div onclick="setTool('eraser')" id="btn-eraser" class="tool-btn"><b>🧼</b><span>СТЕРКА</span></div>
        <div onclick="toggleChat()" class="tool-btn"><b>💬</b><span>СВЯЗЬ</span></div>
        <div onclick="setMap('sat')" id="btn-sat" class="tool-btn"><b>🛰️</b><span>САТ</span></div>
        <div onclick="setMap('map')" id="btn-map" class="tool-btn"><b>🗺️</b><span>КАРТА</span></div>
        <div onclick="clearMy()" class="tool-btn text-yellow-500"><b>🗑️</b><span>СБРОС</span></div>
        <div onclick="location.reload()" class="tool-btn text-red-600"><b>🚪</b><span>ВЫЙТИ</span></div>
    </div>

    <div id="map"></div>

    <div id="chat-window">
        <div class="bg-green-900 p-2 flex justify-between text-white text-xs">
            <span>РАДИОКАНАЛ</span>
            <button onclick="toggleChat()">[X]</button>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto p-2 text-green-400 text-xs italic"></div>
        <div class="p-2 border-t border-green-900 flex">
            <input id="chatInput" class="flex-1 bg-black text-white p-1 text-xs border border-green-600 outline-none">
            <button onclick="sendMsg()" class="ml-1 bg-green-700 px-2 text-white text-xs">📡</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let map, myName, myRoom, myColor, tool = 'move', userPos = {lat:0, lng:0};
    let tacticalItems = {}, players = {}, distLineLayer = null, distLabelLayer = null;
    let dragLine = null, dragStart = null;

    const layers = {
        map: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
        sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    };

    function startApp() {
        myRoom = document.getElementById('roomInput').value.toUpperCase();
        myName = document.getElementById('nameInput').value.toUpperCase();
        const p = document.getElementById('passInput').value;
        if(myRoom && myName) socket.emit('join_room', { room: myRoom, name: myName, pass: p });
    }

    socket.on('auth_error', m => alert(m));
    socket.on('login_success', d => {
        myColor = d.color;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-ui').style.display = 'block';
        initMap();
    });

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.40, 39.95], 18);
        layers.map.addTo(map);
        
        map.on('mousedown touchstart', e => {
            if (tool === 'arrow' || tool === 'ruler') {
                dragStart = e.latlng;
                dragLine = L.polyline([e.latlng, e.latlng], { color: tool==='arrow'?'red':'white', weight:4, dashArray: '5, 10' }).addTo(map);
            }
        });

        map.on('mousemove touchmove', e => {
            if (dragLine) dragLine.setLatLngs([dragStart, e.latlng]);
        });

        map.on('mouseup touchend', e => {
            if (dragLine) {
                const id = 'obj_' + Date.now();
                socket.emit('new_obj', { id, type: tool, start: dragStart, end: e.latlng });
                map.removeLayer(dragLine);
                dragLine = null;
                dragStart = null;
            }
        });

        map.on('click', e => {
            if (['enemy','point'].includes(tool)) {
                const id = 'obj_' + Date.now();
                socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng });
            }
        });

        map.on('move zoom', updateGrid);
        updateGrid();

        navigator.geolocation.watchPosition(p => {
            userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
            socket.emit('gps_sync', { ...userPos, name: myName });
            drawPlayer(myName, userPos, myColor);
        }, null, { enableHighAccuracy: true });
    }

    function updateGrid() {
        const cont = document.getElementById('grid-container'); cont.innerHTML = '';
        if (map.getZoom() < 15) return;
        const b = map.getBounds(); const step = 0.00020; 
        const ru = "АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЩЭЮЯ";
        for (let x = Math.floor(b.getWest()/step)*step; x <= b.getEast(); x += step) {
            let p = map.latLngToContainerPoint([b.getNorth(), x]);
            let l = document.createElement('div'); l.className='g-line'; l.style.left=p.x+'px'; l.style.top='0'; l.style.bottom='0'; l.style.width='1px';
            cont.appendChild(l);
            let lbl = document.createElement('div'); lbl.className='g-label'; lbl.style.left=(p.x+2)+'px'; lbl.style.top='5px';
            lbl.innerText = ru[Math.abs(Math.round(x/step)) % ru.length]; cont.appendChild(lbl);
        }
    }

    socket.on('draw', m => {
        let items = [];
        if (m.type === 'ruler') {
            const line = L.polyline([m.start, m.end], { color: 'white', weight: 4, stroke: true }).addTo(map);
            const p1 = L.circleMarker(m.start, {radius:6, color:'white', fillColor:'black', fillOpacity:1}).addTo(map);
            const p2 = L.circleMarker(m.end, {radius:6, color:'white', fillColor:'black', fillOpacity:1}).addTo(map);
            const d = Math.round(map.distance(m.start, m.end));
            const lbl = L.marker(m.end, { icon: L.divIcon({ html: `<div class="dist-label">${d}м</div>`, iconAnchor:[-10,20] }) }).addTo(map);
            items = [line, p1, p2, lbl];
        } else if (m.type === 'arrow') {
            const line = L.polyline([m.start, m.end], { color: 'red', weight: 6 }).addTo(map);
            const p1 = L.circleMarker(m.start, {radius:4, color:'red', fillColor:'white', fillOpacity:1}).addTo(map);
            const head = L.circleMarker(m.end, {radius:8, color:'red', fillColor:'red', fillOpacity:1}).addTo(map);
            items = [line, p1, head];
        } else {
            const icon = m.type === 'enemy' ? '💀' : '🚩';
            const item = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:30px; cursor:pointer">${icon}</div>`, iconAnchor:[15,15] }) }).addTo(map);
            item.on('click', (e) => {
                if (tool === 'eraser') socket.emit('delete_obj', m.id);
                if (tool === 'move') showDist(m.lat, m.lng);
                L.DomEvent.stopPropagation(e);
            });
            items = [item];
        }
        tacticalItems[m.id] = items;
    });

    function showDist(lat, lng) {
        if(distLineLayer) map.removeLayer(distLineLayer);
        if(distLabelLayer) map.removeLayer(distLabelLayer);
        const target = [lat, lng];
        distLineLayer = L.polyline([userPos, target], { color: 'red', weight: 3, className: 'pulse-line' }).addTo(map);
        const d = Math.round(map.distance(userPos, target));
        distLabelLayer = L.marker([(userPos.lat+lat)/2, (userPos.lng+lng)/2], { icon: L.divIcon({ html: `<div class="dist-label">${d}м</div>` }) }).addTo(map);
    }

    socket.on('remove_obj', id => { if(tacticalItems[id]) { tacticalItems[id].forEach(l => map.removeLayer(l)); delete tacticalItems[id]; } });
    socket.on('clear_all', () => location.reload());

    function drawPlayer(name, pos, color) {
        const icon = L.divIcon({ html: `<div class="player-label" style="color:${color}">${name}</div><div class="player-dot" style="background:${color}"></div>`, iconSize:[100,40], iconAnchor:[50,30] });
        if (!players[name]) {
            players[name] = L.marker([pos.lat, pos.lng], { icon }).addTo(map).on('click', () => { if(tool==='move') showDist(pos.lat, pos.lng); });
        } else {
            players[name].setLatLng([pos.lat, pos.lng]).setIcon(icon);
        }
    }

    socket.on('player_move', d => drawPlayer(d.name, d, d.color));
    function setTool(t) { tool = t; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); }
    function centerMap() { if(userPos.lat) map.flyTo([userPos.lat, userPos.lng], 18); }
    function setMap(t) { map.removeLayer(layers.map); map.removeLayer(layers.sat); layers[t].addTo(map); }
    function clearMy() { if(confirm("УДАЛИТЬ ТОЛЬКО ВАШИ ОБЪЕКТЫ?")) socket.emit('clear_my'); }
    function toggleChat() { const c = document.getElementById('chat-window'); c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; }
    function sendMsg() { const i = document.getElementById('chatInput'); if(i.value) { socket.emit('chat_msg', `[${myName}]: ${i.value}`); i.value = ''; } }
    socket.on('receive_msg', m => { const d = document.getElementById('chat-msgs'); d.innerHTML += `<div>${m}</div>`; d.scrollTop = d.scrollHeight; });
</script>
</body>
</html>
