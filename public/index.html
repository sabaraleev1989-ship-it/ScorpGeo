<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION ELITE V11</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Roboto Condensed', sans-serif; }
        
        /* УВЕДОМЛЕНИЕ О НОВОМ БОЙЦЕ */
        #notify-box { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; }
        .alert-new { background: rgba(22, 101, 52, 0.9); color: #fff; padding: 10px 20px; border: 2px solid #22c55e; border-radius: 5px; font-family: 'Orbitron'; font-size: 14px; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* МАРКЕР ИГРОКА */
        .player-icon-container { display: flex; flex-direction: column; align-items: center; }
        .player-label { 
            color: #000; 
            font-weight: 900; 
            font-size: 14px; 
            text-transform: uppercase;
            text-shadow: -1px -1px 0 #ff0000, 1px -1px 0 #ff0000, -1px 1px 0 #ff0000, 1px 1px 0 #ff0000;
            white-space: nowrap;
            margin-bottom: 2px;
        }
        .player-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        /* ИНТЕРФЕЙС */
        #auth { position: fixed; inset: 0; z-index: 9999; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .side-bar { position: fixed; left: 0; top: 0; bottom: 0; width: 70px; background: #0a0a0a; border-right: 2px solid #22c55e; z-index: 5000; display: flex; flex-direction: column; }
        .btn { width: 70px; height: 55px; border-bottom: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #22c55e; cursor: pointer; }
        .btn.active { background: #166534; color: #fff; }

        #map { height: 100vh; width: 100%; background: #000; }
    </style>
</head>
<body>

    <div id="notify-box"></div>

    <div id="auth">
        <h1 style="color:white; font-family:'Orbitron'; font-size:22px; margin-bottom:20px;">SCORPION <span style="color:#22c55e">TACTICAL V11</span></h1>
        <input id="roomIn" type="text" placeholder="ID КОМНАТЫ" style="background:#000; border:2px solid #22c55e; color:#22c55e; padding:15px; margin-bottom:10px; width:280px; text-align:center;">
        <input id="nameIn" type="text" placeholder="ПОЗЫВНОЙ" style="background:#000; border:2px solid #22c55e; color:#22c55e; padding:15px; margin-bottom:10px; width:280px; text-align:center;">
        <button onclick="connect()" style="background:#166534; color:white; padding:15px; width:280px; font-weight:bold; border:1px solid #22c55e;">ВХОД</button>
    </div>

    <div id="main" style="display:none">
        <div class="side-bar">
            <div onclick="setTool('move')" id="t-move" class="btn active">🖐️</div>
            <div onclick="centerMe()" class="btn" style="color:#60a5fa">🎯</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="btn">➡️</div>
            <div onclick="toggleChat()" class="btn">💬</div>
            <div style="margin-top:auto"></div>
            <div onclick="clearAll()" class="btn" style="color:#ef4444">🗑️</div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myName = '', myRoom = '', tool = 'move', userPos = {lat:0, lng:0};
        let otherPlayers = {}; // Хранилище для маркеров других бойцов

        function connect() {
            myRoom = document.getElementById('roomIn').value.toUpperCase();
            myName = document.getElementById('nameIn').value.toUpperCase();
            if(myRoom && myName) socket.emit('join_room', { room: myRoom, name: myName });
        }

        socket.on('login_success', () => {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            initMap();
        });

        // УВЕДОМЛЕНИЕ О НОВОМ БОЙЦЕ
        socket.on('player_joined', (data) => {
            if(data.name !== myName) {
                const box = document.getElementById('notify-box');
                const el = document.createElement('div');
                el.className = 'alert-new';
                el.innerText = `ЗАХОДИТ: ${data.name}`;
                box.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.40, 39.95], 18);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                socket.emit('gps_sync', { ...userPos, name: myName });
                updatePlayerMarker(myName, userPos, '#2563eb'); // Твой цвет - синий
            }, null, { enableHighAccuracy: true });
        }

        // ОБНОВЛЕНИЕ МАРКЕРОВ ВСЕХ ИГРОКОВ
        socket.on('presence_update', (users) => {
            Object.keys(users).forEach(id => {
                const u = users[id];
                if(u.name) {
                    // Генерируем цвет на основе имени, чтобы он был постоянным для игрока
                    const hue = [...u.name].reduce((acc, char) => acc + char.charCodeAt(0), 0) % 360;
                    const color = `hsl(${hue}, 80%, 50%)`;
                    updatePlayerMarker(u.name, {lat: u.lat, lng: u.lng}, color);
                }
            });
        });

        function updatePlayerMarker(name, pos, color) {
            if (!otherPlayers[name]) {
                const icon = L.divIcon({
                    className: '',
                    html: `
                        <div class="player-icon-container">
                            <div class="player-label">${name}</div>
                            <div class="player-dot" style="background-color: ${color}"></div>
                        </div>`,
                    iconSize: [100, 40],
                    iconAnchor: [50, 35]
                });
                otherPlayers[name] = L.marker([pos.lat, pos.lng], { icon }).addTo(map);
            } else {
                otherPlayers[name].setLatLng([pos.lat, pos.lng]);
            }
        }

        function centerMe() { if(userPos.lat) map.flyTo([userPos.lat, userPos.lng], 19); }
        function setTool(t) { tool = t; }
        function clearAll() { if(confirm("СБРОС?")) socket.emit('clear'); }
    </script>
</body>
</html>
