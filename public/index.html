<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORP GEO | ELITE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Condensed:wght@900&display=swap');
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Roboto Condensed', sans-serif; }
        #map { height: 100vh; width: 100%; background: #000; position: absolute; z-index: 1; }

        /* ОСИ КООРДИНАТ - МАКСИМАЛЬНАЯ ВИДИМОСТЬ */
        .grid-axis-x { position: fixed; top: 0; left: 60px; right: 0; height: 30px; background: #000; z-index: 4000; pointer-events: none; border-bottom: 2px solid #22c55e; }
        .grid-axis-y { position: fixed; top: 30px; right: 0; bottom: 0; width: 35px; background: #000; z-index: 4000; pointer-events: none; border-left: 2px solid #22c55e; }
        
        .axis-label { color: #22c55e; font-family: 'Orbitron'; font-size: 14px; font-weight: 900; position: absolute; width: 35px; text-align: center; line-height: 30px; }

        /* НОВЫЙ СТИЛЬ РАССТОЯНИЯ: БЕЛЫЙ ФОН, ЧЕРНАЯ ОБВОДКА, КРАСНЫЕ ЦИФРЫ */
        .dist-label-new { 
            background: #ffffff !important; 
            border: 2px solid #000000 !important;
            border-radius: 2px;
            padding: 4px 8px !important;
            display: flex; align-items: center; justify-content: center;
        }
        .dist-text {
            color: #ff0000; 
            font-size: 16px; 
            font-weight: 900;
            -webkit-text-stroke: 0.5px black;
            white-space: nowrap;
        }

        .side-panel { background: rgba(10, 15, 30, 0.95); border-right: 1px solid #1e293b; z-index: 5000; width: 60px; position: fixed; left: 0; top: 0; bottom: 0; display: flex; flex-direction: column; }
        .tool-btn { width: 60px; height: 55px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; cursor: pointer; font-size: 22px; color: #64748b; }
        .tool-btn.active { background: #2563eb; color: white; }
        .user-label { background: #2563eb; color: white; padding: 2px 6px; border-radius: 3px; font-weight: bold; border: 1px solid white; font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="axis-x" class="grid-axis-x"></div>
        <div id="axis-y" class="grid-axis-y"></div>

        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️</div>
            <div onclick="centerMe()" class="tool-btn text-green-500">🎯</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️</div>
            <div onclick="undo()" class="tool-btn text-yellow-500">↩️</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>
            <div class="mt-auto">
                <div onclick="changeMap('sat')" id="btn-sat" class="tool-btn text-xs font-bold">SAT</div>
                <div onclick="changeMap('map')" id="btn-map" class="tool-btn text-xs font-bold text-blue-400">MAP</div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, myInfo = { name: 'ХАН', lat: 0, lng: 0 };
        let markers = {}, tactical = {}, distLabels = {};
        let tool = 'move', arrowFrom = null, tempMarker = null;
        let layers = {}, gridLayer = null;

        const STEP = 20 * 0.000009; // 20 метров

        function initMap() {
            layers.map = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 24, maxNativeZoom: 19 });
            layers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 24, maxNativeZoom: 19 });
            
            map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 24 }).setView([43.40, 39.95], 18);
            layers.sat.addTo(map);
            
            gridLayer = L.layerGroup().addTo(map);
            updateGrid();
            map.on('move zoom', updateGrid);
            map.on('mousedown', onMapClick);
            startGps();
        }

        function updateGrid() {
            gridLayer.clearLayers();
            const b = map.getBounds();
            const axX = document.getElementById('axis-x');
            const axY = document.getElementById('axis-y');
            axX.innerHTML = ''; axY.innerHTML = '';

            const startLng = Math.floor(b.getWest() / STEP) * STEP;
            const endLng = Math.ceil(b.getEast() / STEP) * STEP;
            const startLat = Math.floor(b.getSouth() / STEP) * STEP;
            const endLat = Math.ceil(b.getNorth() / STEP) * STEP;

            for (let x = startLng; x <= endLng; x += STEP) {
                L.polyline([[startLat, x], [endLat, x]], { color: '#22c55e', weight: 1, opacity: 0.2 }).addTo(gridLayer);
                const p = map.latLngToContainerPoint([b.getNorth(), x + STEP/2]);
                if (p.x > 60) {
                    const el = document.createElement('div');
                    el.className = 'axis-label';
                    el.style.left = (p.x - 77) + 'px';
                    el.innerText = String.fromCharCode(65 + (Math.abs(Math.round(x / STEP)) % 26));
                    axX.appendChild(el);
                }
            }

            for (let y = startLat; y <= endLat; y += STEP) {
                L.polyline([[y, startLng], [y, endLng]], { color: '#22c55e', weight: 1, opacity: 0.2 }).addTo(gridLayer);
                const p = map.latLngToContainerPoint([y + STEP/2, b.getEast()]);
                const el = document.createElement('div');
                el.className = 'axis-label';
                el.style.top = (p.y - 45) + 'px';
                el.style.right = '0px';
                el.innerText = Math.abs(Math.round(y / STEP)) % 100;
                axY.appendChild(el);
            }
        }

        function onMapClick(e) {
            if(tool === 'move') return;
            const id = 'id' + Date.now();
            if(tool === 'arrow') {
                if(!arrowFrom) {
                    arrowFrom = e.latlng;
                    tempMarker = L.circleMarker(e.latlng, { radius: 6, color: '#2563eb' }).addTo(map);
                } else {
                    if(tempMarker) map.removeLayer(tempMarker);
                    socket.emit('new_obj', { id, type: 'arrow', start: arrowFrom, end: e.latlng });
                    arrowFrom = null;
                }
            } else {
                socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng });
            }
        }

        socket.on('draw', (m) => {
            if(m.type === 'arrow') {
                const line = L.polyline([m.start, m.end], { color: '#2563eb', weight: 4, dashArray: '5, 10' }).addTo(map);
                const dist = Math.round(map.distance(m.start, m.end));
                
                // Метка только для стрелок
                const label = L.marker(m.end, {
                    icon: L.divIcon({
                        className: 'dist-label-new',
                        html: `<span class="dist-text">${dist}м</span>`,
                        iconAnchor: [25, -15]
                    })
                }).addTo(map);
                
                tactical[m.id] = { layers: [line, label] };
            } else {
                const ico = m.type === 'enemy' ? '💀' : '🚩';
                const marker = L.marker([m.lat, m.lng], { 
                    icon: L.divIcon({ html: `<div style="font-size:30px;">${ico}</div>`, className: 'dummy', iconAnchor: [15, 15] }) 
                }).addTo(map);
                tactical[m.id] = marker;
            }
        });

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                myInfo.lat = p.coords.latitude; myInfo.lng = p.coords.longitude;
                if(!myMarker) {
                    myMarker = L.circleMarker([myInfo.lat, myInfo.lng], { color: '#2563eb', radius: 10, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip(myInfo.name, { permanent: true, className: 'user-label', direction: 'top' });
                    map.setView([myInfo.lat, myInfo.lng], 20);
                } else myMarker.setLatLng([myInfo.lat, myInfo.lng]);
                socket.emit('gps_sync', { lat: myInfo.lat, lng: myInfo.lng });
            }, null, { enableHighAccuracy: true });
        }

        function changeMap(t) { 
            map.eachLayer(l => { if(l instanceof L.TileLayer) map.removeLayer(l); });
            layers[t].addTo(map);
        }
        function setTool(t) { tool = t; arrowFrom = null; if(tempMarker) map.removeLayer(tempMarker); document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); }
        function centerMe() { if(myInfo.lat) map.setView([myInfo.lat, myInfo.lng], 20); }
        function undo() { socket.emit('undo'); }
        function clearMap() { if(confirm("ОЧИСТИТЬ?")) socket.emit('clear'); }

        socket.on('del_obj', id => { 
            if(tactical[id]) { 
                if(tactical[id].layers) tactical[id].layers.forEach(l => map.removeLayer(l)); 
                else map.removeLayer(tactical[id]);
                delete tactical[id];
            } 
        });

        initMap();
    </script>
</body>
</html>
