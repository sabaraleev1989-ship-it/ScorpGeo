<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.0 | Tactical Interface</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #05070a; color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tool { border-color: #06b6d4 !important; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); background: rgba(6, 182, 212, 0.1); }
        #viewport { position: relative; width: 100%; height: 100vh; cursor: crosshair; background: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body class="fixed inset-0 select-none">

    <div id="auth-screen" class="fixed inset-0 z-[5000] flex items-center justify-center bg-[#05070a] p-6">
        <div class="glass w-full max-w-md rounded-3xl p-8 space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-bold tracking-tighter text-cyan-400">scorpGeo <span class="text-white">3.0</span></h1>
                <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-[0.3em]">Tactical Cell Interface</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-slate-400 ml-1">ID Канала</label>
                    <input id="roomID" type="text" placeholder="SCORP_MAIN" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 outline-none focus:border-cyan-500 transition-all">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-400 ml-1">Код доступа</label>
                    <input id="password" type="password" placeholder="••••" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 outline-none focus:border-cyan-500 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase text-slate-400 ml-1">Позывной</label>
                        <input id="callsign" type="text" placeholder="ХАН" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 outline-none focus:border-cyan-500 transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-slate-400 ml-1">Группа</label>
                        <select id="team" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 outline-none focus:border-cyan-500 appearance-none">
                            <option value="ALPHA">ALPHA</option>
                            <option value="BRAVO">BRAVO</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="attemptLogin()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold py-5 rounded-2xl transition-all uppercase tracking-widest text-sm shadow-lg shadow-cyan-500/20">Авторизация</button>
        </div>
    </div>

    <div id="main-ui" class="hidden flex flex-col h-full">
        
        <header class="glass m-3 rounded-2xl p-3 flex items-center justify-between z-50">
            <div class="flex items-center gap-4">
                <div class="status-dot bg-cyan-500 shadow-[0_0_10px_cyan]"></div>
                <div>
                    <div id="display-room" class="text-xs font-bold text-white uppercase tracking-wider">OFFLINE</div>
                    <div id="display-user" class="text-[9px] text-slate-500 font-bold uppercase">CONNECTING...</div>
                </div>
            </div>
            <button onclick="location.reload()" class="p-2 glass rounded-xl text-xs">ВЫХОД</button>
        </header>

        <main id="viewport">
            <canvas id="bgCanvas"></canvas>
            <canvas id="drawCanvas"></canvas>
            <canvas id="tempCanvas"></canvas>
        </main>

        <footer class="glass m-3 mb-8 rounded-3xl p-4 z-50 flex items-center gap-3">
            <button id="moveBtn" onclick="setTool('move')" class="p-4 rounded-2xl flex-1 glass active-tool">✥</button>
            <button id="drawBtn" onclick="setTool('draw')" class="p-4 rounded-2xl flex-1 glass text-xl">↗</button>
            <button id="tacticsBtn" onclick="setTool('tactics')" class="p-4 rounded-2xl flex-1 glass text-xl">🚩</button>
            
            <div class="w-[1px] h-10 bg-slate-800 mx-1"></div>
            
            <input type="color" id="colorPicker" value="#22d3ee" class="w-12 h-12 rounded-xl bg-transparent border-none cursor-pointer">
        </footer>
    </div>

    <script>
        const socket = io();
        let myProfile = { roomID: '', callsign: '', team: '', coords: null };
        let remoteUsers = {};
        let objects = [];
        let currentTool = 'move';
        
        const vp = document.getElementById('viewport'),
              bgCan = document.getElementById('bgCanvas'),
              drCan = document.getElementById('drawCanvas'),
              tmCan = document.getElementById('tempCanvas');
        const ctx = drCan.getContext('2d'), bgCtx = bgCan.getContext('2d'), tmCtx = tmCan.getContext('2d');

        let scale = 1, posX = 0, posY = 0, mapImg = new Image();

        // 1. ВХОД В КОМНАТУ
        function attemptLogin() {
            myProfile.roomID = document.getElementById('roomID').value.toUpperCase();
            myProfile.callsign = document.getElementById('callsign').value;
            myProfile.team = document.getElementById('team').value;
            const pass = document.getElementById('password').value;

            if(!myProfile.roomID || !myProfile.callsign) return alert("Заполните поля!");
            socket.emit('join_room', { ...myProfile, password: pass });
        }

        socket.on('init_data', (data) => {
            objects = data.objects;
            remoteUsers = data.users;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('display-room').innerText = "КАНАЛ: " + myProfile.roomID;
            document.getElementById('display-user').innerText = `${myProfile.team} | ${myProfile.callsign}`;
            
            mapImg.src = 'logo1.png'; // Твоя картинка scorpGEO
            mapImg.onload = () => {
                bgCan.width = drCan.width = tmCan.width = mapImg.width;
                bgCan.height = drCan.height = tmCan.height = mapImg.height;
                scale = Math.min(vp.clientWidth/mapImg.width, vp.clientHeight/mapImg.height);
                render();
            };
            startGps();
        });

        // 2. GPS И СЕТЬ
        function startGps() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    myProfile.coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    socket.emit('update_gps', myProfile.coords);
                }, null, { enableHighAccuracy: true });
            }
        }

        socket.on('presence_update', (data) => {
            if(!remoteUsers[data.id]) remoteUsers[data.id] = {};
            remoteUsers[data.id].coords = data.coords;
            render();
        });

        socket.on('object_added', (obj) => {
            objects.push(obj);
            render();
        });

        // 3. ОТРИСОВКА
        function render() {
            bgCtx.clearRect(0,0,bgCan.width, bgCan.height);
            bgCtx.drawImage(mapImg, 0, 0);
            ctx.clearRect(0,0,drCan.width, drCan.height);
            
            objects.forEach(obj => {
                ctx.strokeStyle = ctx.fillStyle = obj.color;
                if(obj.type === 'arrow') drawArrow(ctx, obj.x, obj.y, obj.x2, obj.y2);
                if(obj.type === 'tactic') {
                    ctx.font = "40px Arial";
                    ctx.fillText("🚩", obj.x, obj.y);
                }
            });

            const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
            [bgCan, drCan, tmCan].forEach(c => c.style.transform = tr);
        }

        function drawArrow(context, x1, y1, x2, y2) {
            const headlen = 20;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            context.beginPath();
            context.moveTo(x1, y1);
            context.lineTo(x2, y2);
            context.lineWidth = 5;
            context.stroke();
            context.beginPath();
            context.moveTo(x2, y2);
            context.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            context.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            context.closePath();
            context.fill();
        }

        // 4. ИНСТРУМЕНТЫ
        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('footer button').forEach(b => b.classList.remove('active-tool'));
            document.getElementById(t + 'Btn').classList.add('active-tool');
        }

        // Логика перемещения и рисования (упрощенная)
        let isDown = false, startP = {x:0, y:0};
        vp.onpointerdown = (e) => {
            isDown = true;
            const r = vp.getBoundingClientRect();
            startP = { x: (e.clientX - r.left - posX)/scale, y: (e.clientY - r.top - posY)/scale };
        };
        vp.onpointerup = (e) => {
            if(!isDown) return;
            isDown = false;
            if(currentTool === 'draw') {
                const r = vp.getBoundingClientRect();
                const endP = { x: (e.clientX - r.left - posX)/scale, y: (e.clientY - r.top - posY)/scale };
                const newObj = { type:'arrow', x:startP.x, y:startP.y, x2:endP.x, y2:endP.y, color:document.getElementById('colorPicker').value };
                objects.push(newObj);
                socket.emit('new_object', newObj);
                render();
            }
        };
        
        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
