<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.0 | HIGH-TECH</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon: #00f2ff; --warn: #f43f5e; --bg: #05070a; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Orbitron', monospace; margin: 0; overflow: hidden; }
        
        /* Кастомная карта в стиле High-Tech */
        #map { height: 100vh; width: 100%; z-index: 1; filter: brightness(0.8) contrast(1.2); }
        
        .high-tech-panel {
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 242, 255, 0.05);
        }

        .neo-btn {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neo-btn.active {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 15px var(--neon);
        }

        /* Метки игроков */
        .pulse-marker {
            width: 12px; height: 12px;
            background: var(--neon);
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 10px var(--neon);
        }

        .nav-line { stroke: var(--neon); stroke-dasharray: 10, 10; animation: dash 20s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -1000; } }

        #notif-box { position: fixed; top: 100px; width: 100%; display: flex; flex-col; align-items: center; z-index: 9999; pointer-events: none; }
        .notif-item { background: var(--neon); color: black; padding: 5px 15px; border-radius: 2px; font-weight: 900; font-size: 10px; margin-bottom: 5px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
    </style>
</head>
<body>

    <div id="notif-box"></div>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black p-6">
        <div class="high-tech-panel w-full max-w-sm rounded-tr-3xl rounded-bl-3xl p-8 space-y-6 border-t-4 border-cyan-500">
            <div class="text-center">
                <h1 class="text-4xl font-black italic tracking-tighter text-white">SCORP<span class="text-cyan-400">GEO</span></h1>
                <p class="text-[9px] tracking-[0.5em] text-cyan-500/50 uppercase mt-2">Tactical HUD v3.0</p>
            </div>
            <div class="space-y-3">
                <input id="roomID" type="text" placeholder="NET ID" class="w-full bg-black/50 border border-cyan-900 rounded-lg p-4 text-center focus:border-cyan-400 outline-none uppercase">
                <input id="password" type="password" placeholder="ACCESS CODE" class="w-full bg-black/50 border border-cyan-900 rounded-lg p-4 text-center focus:border-cyan-400 outline-none">
                <input id="callsign" type="text" placeholder="CALLSIGN" class="w-full bg-black/50 border border-cyan-900 rounded-lg p-4 text-center focus:border-cyan-400 outline-none uppercase">
            </div>
            <button onclick="saveAndConnect()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-lg hover:bg-cyan-400 transition-all uppercase italic">Initialize Link</button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed top-0 left-0 right-0 z-[5000] p-4 flex justify-between items-start pointer-events-none">
            <div class="high-tech-panel p-3 rounded-br-2xl pointer-events-auto">
                <div id="display-room" class="text-cyan-400 font-bold text-[10px] tracking-widest">--</div>
                <div id="target-info" class="text-white text-[11px] font-bold mt-1 uppercase">Scan: Idle</div>
            </div>
            <button onclick="logout()" class="high-tech-panel px-4 py-2 text-red-500 font-bold text-[10px] pointer-events-auto uppercase tracking-tighter">Abort</button>
        </div>

        <div class="fixed right-4 top-1/2 -translate-y-1/2 z-[5000] flex flex-col gap-4">
            <button onclick="setMode('enemy')" class="neo-btn w-14 h-14 rounded-xl flex items-center justify-center text-2xl" title="ВРАГ">💀</button>
            <button onclick="setMode('point')" class="neo-btn w-14 h-14 rounded-xl flex items-center justify-center text-2xl" title="ТОЧКА">🚩</button>
            <button onclick="setMode('caution')" class="neo-btn w-14 h-14 rounded-xl flex items-center justify-center text-2xl" title="ВНИМАНИЕ">⚠️</button>
            <div class="h-[1px] bg-cyan-900 my-2"></div>
            <button onclick="setMode('move')" id="move-btn" class="neo-btn active w-14 h-14 rounded-xl flex items-center justify-center text-2xl">🖐️</button>
        </div>

        <div class="fixed left-4 bottom-6 z-[5000] flex gap-2">
            <button onclick="setLayer('sat')" class="high-tech-panel px-3 py-2 text-[9px] font-bold text-white uppercase">Satellite</button>
            <button onclick="setLayer('map')" class="high-tech-panel px-3 py-2 text-[9px] font-bold text-white uppercase">Tactical</button>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, markers = {}, tacticalMarkers = [], navLine;
        let layers = {};
        let myInfo = { roomID: '', callsign: '', password: '', lat: 0, lng: 0 };
        let currentMode = 'move';

        window.onload = () => {
            const saved = localStorage.getItem('scorpGeo_Auth');
            if (saved) { myInfo = JSON.parse(saved); socket.emit('join_room', myInfo); }
        };

        function saveAndConnect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            myInfo.password = document.getElementById('password').value;
            if(!myInfo.roomID || !myInfo.password || !myInfo.callsign) return alert("REQUIRED DATA MISSING");
            socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            localStorage.setItem('scorpGeo_Auth', JSON.stringify(myInfo));
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('display-room').innerText = "NET: " + myInfo.roomID;
            initMap();
        });

        function initMap() {
            if (map) return;
            layers.sat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
            layers.map = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });

            map = L.map('map', { zoomControl: false, layers: [layers.sat] }).setView([43.5855, 39.7231], 13);
            
            map.on('click', (e) => {
                if (currentMode === 'move') return;
                socket.emit('new_map_marker', { type: currentMode, lat: e.latlng.lat, lng: e.latlng.lng, owner: myInfo.callsign });
                setMode('move');
            });
            startGps();
        }

        function setLayer(t) {
            if(t === 'sat') { map.addLayer(layers.sat); map.removeLayer(layers.map); }
            else { map.addLayer(layers.map); map.removeLayer(layers.sat); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.neo-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function startGps() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                myInfo.lat = latitude; myInfo.lng = longitude;
                if (!myMarker) {
                    myMarker = L.circleMarker([latitude, longitude], { className: 'pulse-marker', radius: 7 }).addTo(map);
                    myMarker.bindTooltip("ME", { permanent: true, direction: 'top', className: 'user-label' });
                    map.setView([latitude, longitude], 17);
                } else { myMarker.setLatLng([latitude, longitude]); }
                if(navLine) updateNavLine(); // Обновляем линию маршрута при движении
                socket.emit('update_gps', { lat: latitude, lng: longitude });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('presence_update', (users) => {
            Object.keys(users).forEach(id => {
                if (id === socket.id) return;
                const u = users[id];
                if (!u.lat) return;
                if (!markers[id]) {
                    showNotif(`LINK ESTABLISHED: ${u.callsign}`);
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#f43f5e', radius: 6, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(u.callsign, { permanent: true, direction: 'top' });
                    markers[id].on('click', () => setNavigation(u));
                } else { markers[id].setLatLng([u.lat, u.lng]); }
            });
        });

        function setNavigation(target) {
            if(navLine) map.removeLayer(navLine);
            navLine = L.polyline([[myInfo.lat, myInfo.lng], [target.lat, target.lng]], {
                color: '#00f2ff', weight: 3, opacity: 0.6, className: 'nav-line'
            }).addTo(map);
            
            const dist = map.distance([myInfo.lat, myInfo.lng], [target.lat, target.lng]);
            document.getElementById('target-info').innerHTML = `<span class="text-cyan-400">Target:</span> ${target.callsign} <br> <span class="text-cyan-400">Dist:</span> ${Math.round(dist)}m`;
        }

        function updateNavLine() {
            // Если есть активная линия, перерисовываем её от текущего положения
            if(navLine) {
                const targetLatLng = navLine.getLatLngs()[1];
                navLine.setLatLngs([[myInfo.lat, myInfo.lng], targetLatLng]);
                const dist = map.distance([myInfo.lat, myInfo.lng], targetLatLng);
                // Обновляем текст дистанции (находим позывной в инфо)
                const info = document.getElementById('target-info').innerHTML;
                if(info.includes('Dist')) {
                    const parts = info.split('<br>');
                    document.getElementById('target-info').innerHTML = `${parts[0]} <br> <span class="text-cyan-400">Dist:</span> ${Math.round(dist)}m`;
                }
            }
        }

        socket.on('draw_marker', (m) => {
            const icons = { enemy: '💀', point: '🚩', caution: '⚠️' };
            const marker = L.marker([m.lat, m.lng], {
                icon: L.divIcon({ html: `<div style="font-size:24px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));">${icons[m.type]}</div>`, className: 'dummy' })
            }).addTo(map);
            marker.on('click', () => setNavigation({callsign: m.type.toUpperCase(), lat: m.lat, lng: m.lng}));
            tacticalMarkers.push(marker);
        });

        function showNotif(txt) {
            const b = document.getElementById('notif-box');
            const n = document.createElement('div'); n.className = 'notif-item'; n.innerText = txt;
            b.appendChild(n); setTimeout(() => n.remove(), 3000);
        }

        function logout() { localStorage.removeItem('scorpGeo_Auth'); location.reload(); }
    </script>
</body>
</html>
