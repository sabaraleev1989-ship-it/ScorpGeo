<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.6 | СТАБИЛЬНЫЙ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap');
        body { background: #0f172a; font-family: 'Roboto Condensed', sans-serif; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #e5e7eb; }
        
        /* Панель управления */
        .gt-panel { background: #111827; border-right: 2px solid #374151; box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
        .gt-btn { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1f2937; position: relative; color: #94a3b8; }
        .gt-btn.active { background: #2563eb; color: white; }
        
        /* Счетчик сообщений */
        #chat-badge { position: absolute; top: 5px; right: 5px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: none; align-items: center; justify-content: center; border: 2px solid #111827; }

        /* Метки и линии */
        .user-tag { background: #2563eb; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; border: 1px solid white; font-weight: bold; }
        .dist-tag { background: black; color: #00f2ff; padding: 2px 6px; border-radius: 4px; font-size: 14px; font-weight: bold; border: 1px solid #00f2ff; white-space: nowrap; margin-left: 20px; }
        
        .nav-line { stroke: #2563eb; stroke-dasharray: 10, 10; animation: dash 15s linear infinite; opacity: 0.8; }
        @keyframes dash { to { stroke-dashoffset: -1000; } }

        /* Чат */
        #chat-ui { position: fixed; bottom: 80px; left: 70px; width: 280px; height: 350px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; z-index: 9000; display: none; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .msg { padding: 4px 10px; border-bottom: 1px solid #334155; font-size: 13px; color: #f1f5f9; }
        
        #pop-up { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; }
        .pop-msg { background: #2563eb; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 5px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="pop-up"></div>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-950 p-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-lg p-8 space-y-6 shadow-2xl">
            <h1 class="text-3xl font-bold text-center text-white italic">SCORP<span class="text-blue-500">GEO</span></h1>
            <input id="roomID" type="text" placeholder="ID СЕТИ" class="w-full bg-black/50 border border-slate-600 rounded p-4 text-center text-white uppercase outline-none">
            <input id="callsign" type="text" placeholder="ПОЗЫВНОЙ" class="w-full bg-black/50 border border-slate-600 rounded p-4 text-center text-white uppercase outline-none">
            <button onclick="connect()" class="w-full bg-blue-600 text-white font-bold py-4 rounded uppercase shadow-lg shadow-blue-900/50">Установить связь</button>
        </div>
    </div>

    <div id="chat-ui">
        <div class="p-3 bg-slate-800 rounded-t-12 border-b border-slate-600 flex justify-between font-bold">
            <span>РАДИОКАНАЛ</span>
            <button onclick="toggleChat()">✖</button>
        </div>
        <div id="chat-msgs" class="flex-1 overflow-y-auto p-2"></div>
        <div class="p-2 border-t border-slate-600 flex gap-2">
            <input id="chat-in" type="text" class="flex-1 bg-black p-2 rounded text-sm outline-none" placeholder="Текст...">
            <button onclick="send()" class="bg-blue-600 px-4 rounded text-white font-bold">></button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed left-0 top-0 bottom-0 z-[5000] gt-panel flex flex-col w-[56px]">
            <button onclick="setMode('move')" id="btn-move" class="gt-btn active">🖐️</button>
            <button onclick="setMode('enemy')" id="btn-enemy" class="gt-btn">💀</button>
            <button onclick="setMode('point')" id="btn-point" class="gt-btn">🚩</button>
            <button onclick="setMode('arrow')" id="btn-arrow" class="gt-btn">➡️</button>
            <button onclick="toggleChat()" class="gt-btn">
                💬 <div id="chat-badge">0</div>
            </button>
            <div class="mt-auto">
                <button onclick="switchMap('sat')" class="gt-btn text-[10px]">СПУТ</button>
                <button onclick="switchMap('map')" class="gt-btn text-[10px]">СХЕМ</button>
                <button onclick="clearMap()" class="gt-btn text-red-500">🗑️</button>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, markers = {}, tactical = {}, navs = {}, dists = {};
        let myInfo = { roomID: '', callsign: '', lat: 0, lng: 0 };
        let mode = 'move', arrowStart = null, unread = 0, isChatOpen = false;
        let layers = {};

        function connect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            if(myInfo.roomID && myInfo.callsign) socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            layers.map = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
            layers.sat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']});
            map = L.map('map', { zoomControl: false, layers: [layers.map] }).setView([43.58, 39.72], 15);
            map.on('click', (e) => {
                if (mode === 'move') return;
                const id = 'it_' + Date.now();
                if (mode === 'arrow') {
                    if (!arrowStart) { arrowStart = e.latlng; return; }
                    socket.emit('new_map_marker', { id, type: 'arrow', start: arrowStart, end: e.latlng, owner: myInfo.callsign });
                    arrowStart = null;
                } else {
                    socket.emit('new_map_marker', { id, type: mode, lat: e.latlng.lat, lng: e.latlng.lng, owner: myInfo.callsign });
                }
            });
            startGps();
        }

        function setMode(m) {
            mode = (mode === m) ? 'move' : m;
            document.querySelectorAll('.gt-btn').forEach(b => b.classList.remove('active'));
            if(mode !== 'move') document.getElementById('btn-'+mode).classList.add('active');
            else document.getElementById('btn-move').classList.add('active');
        }

        function switchMap(t) {
            map.removeLayer(layers.map); map.removeLayer(layers.sat);
            map.addLayer(layers[t]);
        }

        socket.on('draw_marker', (m) => {
            let obj, pos;
            if (m.type === 'arrow') {
                const line = L.polyline([m.start, m.end], { color: '#2563eb', weight: 5 }).addTo(map);
                const head = L.polyline(getHead(m.start, m.end), { color: '#2563eb', weight: 5 }).addTo(map);
                const d1 = L.circleMarker(m.start, {radius: 4, color: '#2563eb', fillOpacity:1}).addTo(map);
                const d2 = L.circleMarker(m.end, {radius: 4, color: '#2563eb', fillOpacity:1}).addTo(map);
                obj = { layers: [line, head, d1, d2], latlng: m.end };
                pos = m.end;
            } else {
                const icons = { enemy: '💀', point: '🚩' };
                obj = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div class="text-2xl">${icons[m.type] || '⚠️'}</div>`, className: 'dummy' }) }).addTo(map);
                pos = { lat: m.lat, lng: m.lng };
            }
            tactical[m.id] = obj;
            
            // Дистанция всегда рядом
            dists[m.id] = L.marker(pos, { icon: L.divIcon({ className: 'dist-tag', html: '---' }) }).addTo(map);
            
            const trigger = obj.on ? obj : obj.layers[0];
            trigger.on('click', () => toggleNav(m.id, pos));
            updateAllDist();
        });

        function toggleNav(id, pos) {
            if (navs[id]) { map.removeLayer(navs[id]); delete navs[id]; }
            else { navs[id] = L.polyline([[myInfo.lat, myInfo.lng], pos], { className: 'nav-line' }).addTo(map); }
        }

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                myInfo.lat = p.coords.latitude; myInfo.lng = p.coords.longitude;
                if (!myMarker) {
                    myMarker = L.circleMarker([myInfo.lat, myInfo.lng], { color: '#00f2ff', radius: 8, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip(myInfo.callsign, { permanent: true, direction: 'top', className: 'user-tag' });
                    map.setView([myInfo.lat, myInfo.lng], 17);
                } else myMarker.setLatLng([myInfo.lat, myInfo.lng]);
                updateAllDist();
                socket.emit('update_gps', { lat: myInfo.lat, lng: myInfo.lng });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('presence_update', (us) => {
            Object.keys(us).forEach(id => {
                if (id === socket.id) return;
                const u = us[id];
                if (!markers[id]) {
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#ef4444', radius: 7, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(u.callsign, { permanent: true, direction: 'top', className: 'user-tag' });
                } else markers[id].setLatLng([u.lat, u.lng]);
            });
        });

        function updateAllDist() {
            Object.keys(dists).forEach(id => {
                const pos = tactical[id].getLatLng ? tactical[id].getLatLng() : tactical[id].latlng;
                const d = map.distance([myInfo.lat, myInfo.lng], pos);
                dists[id].setIcon(L.divIcon({ className: 'dist-tag', html: Math.round(d) + 'м' }));
                if(navs[id]) navs[id].setLatLngs([[myInfo.lat, myInfo.lng], pos]);
            });
        }

        function getHead(s, e) {
            const d = Math.atan2(e.lng - s.lng, e.lat - s.lat);
            const h = 0.0004;
            return [[e.lat - h * Math.cos(d - 0.5), e.lng - h * Math.sin(d - 0.5)], [e.lat, e.lng], [e.lat - h * Math.cos(d + 0.5), e.lng - h * Math.sin(d + 0.5)]];
        }

        // ЧАТ
        function toggleChat() { 
            isChatOpen = !isChatOpen;
            document.getElementById('chat-ui').style.display = isChatOpen ? 'flex' : 'none';
            if(isChatOpen) { unread = 0; updateBadge(); }
        }
        function send() {
            const i = document.getElementById('chat-in');
            if(i.value) { socket.emit('chat_msg', { user: myInfo.callsign, text: i.value }); i.value = ''; }
        }
        socket.on('receive_msg', (d) => {
            const div = document.createElement('div'); div.className = 'msg';
            div.innerHTML = `<b>${d.user}:</b> ${d.text}`;
            document.getElementById('chat-msgs').appendChild(div);
            if(!isChatOpen) { unread++; updateBadge(); }
            // Поп-ап
            const pop = document.createElement('div'); pop.className = 'pop-msg';
            pop.innerText = `${d.user}: ${d.text}`;
            document.getElementById('pop-up').appendChild(pop);
            setTimeout(() => pop.remove(), 4000);
        });
        function updateBadge() {
            const b = document.getElementById('chat-badge');
            b.innerText = unread; b.style.display = unread > 0 ? 'flex' : 'none';
        }

        function clearMap() { if(confirm("Удалить всё?")) socket.emit('clear_all'); }
        socket.on('all_cleared', () => location.reload());
    </script>
</body>
</html>
