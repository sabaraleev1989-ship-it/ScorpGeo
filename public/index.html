<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCORPION TACTICAL V27 — ВСЕ ИСПРАВЛЕНО</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #0a0c0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #1a1e1a;
        }
        
        /* ЭКРАН ВХОДА */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: radial-gradient(circle at 20% 30%, #0b1f0b, #010101);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tactical-border {
            background: rgba(0,0,0,0.85);
            padding: 2rem;
            border: 1px solid #2ecc71;
            box-shadow: 0 0 25px rgba(46,204,113,0.3);
            width: 90%;
            max-width: 340px;
            text-align: center;
        }
        .team-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: #d4ff00;
            margin-bottom: 1.5rem;
        }
        .auth-input {
            width: 100%;
            background: #030803;
            border: 1.5px solid #2ecc71;
            color: #b3ffcf;
            padding: 12px;
            margin-bottom: 14px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }
        .auth-btn {
            width: 100%;
            background: #1f5f2f;
            color: white;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            transition: all 0.2s;
        }
        .auth-btn:hover {
            background: #2a7f3f;
        }
        .auth-btn:active {
            transform: scale(0.98);
        }
        
        /* БОКОВАЯ ПАНЕЛЬ */
        .side-panel {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 75px;
            background: rgba(0,0,0,0.96);
            border-right: 2px solid #2ecc71;
            z-index: 5000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }
        .tool-btn {
            width: 100%;
            min-height: 55px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1f3a1f;
            color: #2ecc71;
            cursor: pointer;
            font-size: 9px;
            font-weight: bold;
            padding: 5px 2px;
            transition: all 0.2s;
            user-select: none;
        }
        .tool-btn b {
            font-size: 20px;
            margin-bottom: 3px;
        }
        .tool-btn.active {
            background: #14532d;
            color: #fff;
            border-left: 3px solid #adff2f;
        }
        .tool-btn:active {
            transform: scale(0.95);
            background: #1a4a2e;
        }
        .tool-btn:hover {
            background: #0d2818;
        }
        
        /* СЕТКА */
        #grid-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 900;
        }
        .grid-letter-top {
            position: absolute;
            font-size: 14px;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.9);
            color: #ffff44;
            padding: 3px 8px;
            border: 2px solid #ffaa00;
            border-radius: 4px;
            transform: translate(-50%, -50%);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.8);
            z-index: 950;
            letter-spacing: 1px;
        }
        .grid-number-right {
            position: absolute;
            font-size: 14px;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.9);
            color: #ffff44;
            padding: 3px 8px;
            border: 2px solid #ffaa00;
            border-radius: 4px;
            transform: translate(0, -50%);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.8);
            z-index: 950;
            letter-spacing: 1px;
        }
        
        /* ЧАТ */
        #chat-win {
            position: fixed;
            bottom: 10px;
            left: 85px;
            right: 10px;
            height: 180px;
            background: rgba(0,0,0,0.95);
            border: 2px solid #2ecc71;
            z-index: 6000;
            display: none;
            flex-direction: column;
            border-radius: 5px;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        .msg-line {
            margin-bottom: 6px;
            padding: 4px 6px;
            border-bottom: 1px solid #1e3a1e;
            word-break: break-word;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-name {
            font-weight: 900;
            margin-right: 8px;
        }
        .msg-text {
            color: #ddd;
        }
        #chat-input {
            background: #0a0f0a;
            color: #c8ffb0;
            border: 1px solid #2e7d32;
            padding: 10px;
            outline: none;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            margin: 5px;
            border-radius: 3px;
            flex: 1;
        }
        #send-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border-radius: 3px;
        }
        #send-btn:active {
            background: #1a5a1f;
        }
        
        /* Маркеры игроков */
        .player-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .player-name-tag {
            font-weight: 900;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000, -1px -1px 2px #000;
            white-space: nowrap;
            margin-bottom: 2px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 10px;
        }
        .player-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(0,0,0,0.7);
        }
        
        /* Тактические иконки */
        .tactical-icon {
            filter: drop-shadow(2px 2px 3px black);
            cursor: pointer;
            font-size: 34px;
            transition: transform 0.2s;
        }
        .tactical-icon:hover {
            transform: scale(1.2);
        }
        
        @media (max-width: 640px) {
            .side-panel { width: 65px; }
            .tool-btn { min-height: 48px; font-size: 8px; }
            .tool-btn b { font-size: 18px; }
            #chat-win { left: 75px; height: 160px; }
            .grid-letter-top, .grid-number-right { font-size: 11px; padding: 2px 6px; }
        }
    </style>
</head>
<body>

<!-- ЭКРАН АВТОРИЗАЦИИ -->
<div id="auth-screen">
    <div class="tactical-border">
        <div class="team-name">⚡ SCORPION ⚡</div>
        <input type="text" id="teamName" class="auth-input" placeholder="КОМАНДА" maxlength="10" value="ALPHA">
        <input type="text" id="playerName" class="auth-input" placeholder="ПОЗЫВНОЙ" maxlength="10" value="WOLF">
        <input type="password" id="password" class="auth-input" placeholder="ПАРОЛЬ" value="1234">
        <button onclick="doLogin()" class="auth-btn">⚔️ ВОЙТИ В БОЙ ⚔️</button>
        <p style="color:#666; font-size:10px; margin-top:10px;">Подключение к серверу...</p>
    </div>
</div>

<!-- ПАНЕЛЬ ИНСТРУМЕНТОВ -->
<div class="side-panel" id="ui-panel">
    <div onclick="setTool('move')" id="btn-move" class="tool-btn active">
        <b>🖐️</b><span>Рука</span>
    </div>
    <div onclick="centerOnMe()" class="tool-btn">
        <b>📍</b><span>Я тут</span>
    </div>
    <div onclick="setTool('enemy')" id="btn-enemy" class="tool-btn">
        <b>💀</b><span>Враг</span>
    </div>
    <div onclick="setTool('target')" id="btn-target" class="tool-btn">
        <b>🎯</b><span>Цель</span>
    </div>
    <div onclick="setTool('arrow')" id="btn-arrow" class="tool-btn">
        <b>➡️</b><span>Удар</span>
    </div>
    <div onclick="setTool('ruler')" id="btn-ruler" class="tool-btn">
        <b>📏</b><span>Мерка</span>
    </div>
    <div onclick="setTool('eraser')" id="btn-eraser" class="tool-btn">
        <b>🧹</b><span>Стерка</span>
    </div>
    <div onclick="deleteMyObjects()" class="tool-btn" style="color:#ffaa66;">
        <b>🗑️</b><span>Уд. мои</span>
    </div>
    <div onclick="toggleChat()" class="tool-btn">
        <b>💬</b><span>Связь</span>
    </div>
    <div onclick="changeMap('sat')" class="tool-btn">
        <b>🛰️</b><span>Спутник</span>
    </div>
    <div onclick="changeMap('map')" class="tool-btn">
        <b>🗺️</b><span>Карта</span>
    </div>
    <div onclick="exitApp()" class="tool-btn" style="color:#ff5555;">
        <b>🚪</b><span>Выход</span>
    </div>
</div>

<!-- КАРТА -->
<div id="map"></div>

<!-- СЕТКА -->
<div id="grid-overlay"></div>

<!-- ЧАТ -->
<div id="chat-win">
    <div id="chat-messages"></div>
    <div style="display:flex; gap:5px; padding:5px; background:#000; border-top:1px solid #1f3a1f;">
        <input id="chat-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendChatMessage()">
        <button id="send-btn" onclick="sendChatMessage()">📡</button>
    </div>
</div>

<script>
// ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
const socket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionDelay: 1000,
    reconnectionAttempts: 10
});

let map;
let activeTool = 'move';
let currentUser = {
    name: '',
    team: '',
    color: '#2ecc71'
};

let playersMarkers = {};        // Маркеры игроков на карте { playerName: L.marker }
let tacticalObjects = {};       // Тактические объекты { objectId: { type, layers, creator } }
let myObjects = new Set();      // ID моих объектов
let rulerPoints = [];           // Временные точки для линейки/стрелки
let gridLayer = null;           // Слой сетки
let tileLayer = null;           // Слой карты
let playerColors = {};          // Цвета игроков { playerName: color }
let watchId = null;             // ID геолокации

// Настройки сетки
const GRID_SIZE = 20; // метров
const METERS_PER_DEGREE = 111320;
const GRID_STEP = (GRID_SIZE / METERS_PER_DEGREE);
const RUSSIAN_LETTERS = ['А','Б','В','Г','Д','Е','Ё','Ж','З','И','Й','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ц','Ч','Ш','Щ','Ъ','Ы','Ь','Э','Ю','Я'];

// ==================== ФУНКЦИИ ЦВЕТОВ ====================
function getRandomColor() {
    const colors = ['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff','#44ffff','#ff8844','#8844ff','#44ff88','#ff4488'];
    return colors[Math.floor(Math.random() * colors.length)];
}

function getColumnLetter(index) {
    return RUSSIAN_LETTERS[Math.abs(index) % RUSSIAN_LETTERS.length];
}

function getRowNumber(index) {
    return Math.abs(index) % 100;
}

// ==================== АВТОРИЗАЦИЯ ====================
function doLogin() {
    const team = document.getElementById('teamName').value.trim().toUpperCase() || 'TEAM';
    const name = document.getElementById('playerName').value.trim().toUpperCase() || 'PLAYER';
    const password = document.getElementById('password').value || '1234';
    
    if (!team || !name) {
        alert('Заполните все поля!');
        return;
    }
    
    currentUser.name = name;
    currentUser.team = team;
    
    // Отправляем на сервер
    socket.emit('join_room', {
        room: team,
        name: name,
        team: team,
        pass: password
    });
    
    console.log(`🔑 Отправлен запрос на вход: ${name} в комнату ${team}`);
}

// ===== ОТВЕТ ОТ СЕРВЕРА =====
socket.on('login_success', (data) => {
    console.log('✅ Авторизация успешна:', data);
    
    currentUser.color = data.color;
    playerColors[currentUser.name] = data.color;
    
    // Скрываем экран входа
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('ui-panel').style.display = 'flex';
    document.getElementById('chat-win').style.display = 'flex';
    
    // Инициализируем карту
    initMap();
    
    // Запускаем геолокацию
    startGeolocation();
    
    // Системное сообщение
    addChatMessage('⚡СИСТЕМА', `Вы вошли как ${currentUser.name}`, '#ffaa00');
});

socket.on('login_failed', (err) => {
    alert('Ошибка входа: ' + (err?.reason || 'Неизвестная ошибка'));
    console.error('❌ Ошибка входа:', err);
});

// ===== ПОЛУЧЕНИЕ СПИСКА ИГРОКОВ =====
socket.on('existing_players', (players) => {
    console.log('👥 Существующие игроки:', players);
    players.forEach(player => {
        if (player.name !== currentUser.name) {
            playerColors[player.name] = player.color;
            updatePlayerMarker(player.name, player.lat, player.lng, player.color);
            addChatMessage('⚡СИСТЕМА', `Игрок ${player.name} уже на карте`, '#88ff88');
        }
    });
});

// ===== НОВЫЙ ИГРОК ПРИСОЕДИНИЛСЯ =====
socket.on('player_joined', (data) => {
    console.log('👤 Новый игрок:', data);
    if (data.name !== currentUser.name) {
        playerColors[data.name] = data.color;
        updatePlayerMarker(data.name, data.lat, data.lng, data.color);
        addChatMessage('⚡СИСТЕМА', `Боец ${data.name} присоединился`, '#44ff44');
            }
        });

// ===== ИГРОК ВЫШЕЛ =====
socket.on('player_left', (data) => {
    console.log('👋 Игрок вышел:', data);
    if (playersMarkers[data.name]) {
        map.removeLayer(playersMarkers[data.name]);
        delete playersMarkers[data.name];
        delete playerColors[data.name];
        addChatMessage('⚡СИСТЕМА', `Боец ${data.name} покинул команду`, '#ff4444');
    }
});

// ===== ПЕРЕМЕЩЕНИЕ ИГРОКА =====
socket.on('player_move', (data) => {
    if (data.name !== currentUser.name) {
        updatePlayerMarker(data.name, data.lat, data.lng, data.color);
    }
});

// ===== ПОЛУЧЕНИЕ ОБЪЕКТА =====
socket.on('draw', (obj) => {
    console.log('📌 Получен объект:', obj);
    if (tacticalObjects[obj.id]) {
        // Удаляем старую версию объекта
        tacticalObjects[obj.id].layers.forEach(layer => map.removeLayer(layer));
        delete tacticalObjects[obj.id];
    }
    
    let layers = [];
    
    if (obj.type === 'enemy' || obj.type === 'target') {
        const iconHtml = obj.type === 'enemy' ? '💀' : '🎯';
        const icon = L.divIcon({
            html: `<div class="tactical-icon" data-object-id="${obj.id}">${iconHtml}</div>`,
            iconSize: [34, 34],
            iconAnchor: [17, 17],
            className: ''
        });
        
        const marker = L.marker([obj.lat, obj.lng], { icon, zIndexOffset: 500 }).addTo(map);
        
        // Обработчик клика для стирания
        marker.on('click', (e) => {
            if (activeTool === 'eraser') {
                console.log('🧹 Стирание объекта:', obj.id);
                socket.emit('delete_obj', obj.id);
            }
        });
        
        if (obj.type === 'enemy') {
            marker.bindTooltip('💀 ВРАГ', { permanent: false, direction: 'top' });
        } else {
            marker.bindTooltip('🎯 ЦЕЛЬ', { permanent: false, direction: 'top' });
        }
        
        layers.push(marker);
        
    } else if (obj.type === 'arrow') {
        const line = L.polyline([obj.start, obj.end], {
            color: '#ff4444',
            weight: 4,
            opacity: 0.8,
            interactive: true
        }).addTo(map);
        
        // Наконечник стрелки
        const angle = Math.atan2(obj.end.lat - obj.start.lat, obj.end.lng - obj.start.lng);
        const arrowSize = 0.00008;
        const arrowHead = [
            obj.end,
            {
                lat: obj.end.lat + Math.sin(angle + 2.5) * arrowSize,
                lng: obj.end.lng + Math.cos(angle + 2.5) * arrowSize
            },
            {
                lat: obj.end.lat + Math.sin(angle - 2.5) * arrowSize,
                lng: obj.end.lng + Math.cos(angle - 2.5) * arrowSize
            }
        ];
        
        const head = L.polygon(arrowHead, {
            color: '#ff4444',
            fillColor: '#ff4444',
            fillOpacity: 0.8,
            interactive: true
        }).addTo(map);
        
        // Обработчик клика для стирания
        const clickHandler = (e) => {
            if (activeTool === 'eraser') {
                console.log('🧹 Стирание стрелки:', obj.id);
                socket.emit('delete_obj', obj.id);
            }
        };
        line.on('click', clickHandler);
        head.on('click', clickHandler);
        
        layers.push(line, head);
        
    } else if (obj.type === 'ruler') {
        const line = L.polyline([obj.start, obj.end], {
            color: '#ffcc00',
            weight: 3,
            dashArray: '10, 10',
            interactive: true
        }).addTo(map);
        
        // Расстояние
        const dist = map.distance([obj.start.lat, obj.start.lng], [obj.end.lat, obj.end.lng]);
        const distText = dist < 1000 ? `${Math.round(dist)} м` : `${(dist/1000).toFixed(2)} км`;
        
        const midLat = (obj.start.lat + obj.end.lat) / 2;
        const midLng = (obj.start.lng + obj.end.lng) / 2;
        
        const labelIcon = L.divIcon({
            html: `<div style="background:black; color:#ffcc00; padding:4px 8px; border:1px solid #ffcc00; border-radius:12px; font-weight:bold; font-size:12px;">📏 ${distText}</div>`,
            iconSize: [80, 24],
            iconAnchor: [40, 12],
            className: ''
        });
        
        const label = L.marker([midLat, midLng], { icon: labelIcon, interactive: false }).addTo(map);
        
        // Обработчик клика для стирания
        line.on('click', (e) => {
            if (activeTool === 'eraser') {
                console.log('🧹 Стирание линейки:', obj.id);
                socket.emit('delete_obj', obj.id);
            }
        });
        
        layers.push(line, label);
    }
    
    // Сохраняем объект
    tacticalObjects[obj.id] = {
        type: obj.type,
        layers: layers,
        creator: obj.creator
    };
    
    if (obj.creator === currentUser.name) {
        myObjects.add(obj.id);
    }
    
    console.log(`✅ Объект отрисован: ${obj.type} (${obj.id})`);
});

// ===== УДАЛЕНИЕ ОБЪЕКТА =====
socket.on('remove_obj', (objectId) => {
    console.log('🗑️ Удаление объекта:', objectId);
    if (tacticalObjects[objectId]) {
        tacticalObjects[objectId].layers.forEach(layer => {
            if (map && map.hasLayer(layer)) {
                map.removeLayer(layer);
            }
        });
        delete tacticalObjects[objectId];
        myObjects.delete(objectId);
        console.log('✅ Объект удален');
    }
});

// ===== СООБЩЕНИЕ В ЧАТ =====
socket.on('receive_msg', (data) => {
    console.log('💬 Получено сообщение:', data);
    let name, text, color;
    
    if (typeof data === 'string') {
        // Пробуем распарсить строку
        const match = data.match(/^([^:]+):\s*(.+)$/);
        if (match) {
            name = match[1];
            text = match[2];
        } else {
            name = 'СИСТЕМА';
            text = data;
        }
        color = playerColors[name] || '#ffffff';
    } else if (typeof data === 'object') {
        name = data.name || 'Аноним';
        text = data.text || '';
        color = data.color || playerColors[name] || '#ffffff';
    }
    
    addChatMessage(name, text, color);
});

// ===== ПРИНУДИТЕЛЬНОЕ ОТКЛЮЧЕНИЕ =====
socket.on('force_disconnect', (data) => {
    alert('Вас отключили: ' + data.reason);
    location.reload();
});

// ==================== ИНИЦИАЛИЗАЦИЯ КАРТЫ ====================
function initMap() {
    if (map) return;
    
    const defaultLat = 55.7558;
    const defaultLng = 37.6176;
    
    map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        maxZoom: 21,
        minZoom: 10
    }).setView([defaultLat, defaultLng], 18);
    
    tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 21,
        attribution: '© OpenStreetMap'
    }).addTo(map);
    
    map.on('click', handleMapClick);
    map.on('moveend', drawGrid);
    map.on('zoomend', drawGrid);
    
    drawGrid();
    
    setTimeout(() => {
        map.invalidateSize();
        drawGrid();
    }, 500);
}

// ==================== ГЕОЛОКАЦИЯ ====================
function startGeolocation() {
    if (!navigator.geolocation) {
        console.warn('Геолокация не поддерживается');
        return;
    }
    
    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
    }
    
    watchId = navigator.geolocation.watchPosition(
        (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            
            updateMyPosition(lat, lng);
            
            socket.emit('gps_sync', {
                lat: lat,
                lng: lng,
                name: currentUser.name
            });
        },
        (err) => {
            console.warn('Ошибка геолокации:', err.message);
        },
        {
            enableHighAccuracy: true,
            maximumAge: 3000,
            timeout: 10000
        }
    );
}

function updateMyPosition(lat, lng) {
    if (!map) return;
    
    if (playersMarkers[currentUser.name]) {
        playersMarkers[currentUser.name].setLatLng([lat, lng]);
    } else {
        const icon = createPlayerIcon(currentUser.name, currentUser.color);
        playersMarkers[currentUser.name] = L.marker([lat, lng], {
            icon: icon,
            zIndexOffset: 1000
        }).addTo(map);
    }
}

function updatePlayerMarker(name, lat, lng, color) {
    if (!map || !name || name === currentUser.name) return;
    
    if (playersMarkers[name]) {
        playersMarkers[name].setLatLng([lat, lng]);
        // Обновляем иконку на случай смены цвета
        const icon = createPlayerIcon(name, color || playerColors[name] || '#ffffff');
        playersMarkers[name].setIcon(icon);
    } else {
        const icon = createPlayerIcon(name, color || playerColors[name] || '#ffffff');
        playersMarkers[name] = L.marker([lat, lng], {
            icon: icon,
            zIndexOffset: 900
        }).addTo(map);
        console.log(`👤 Маркер создан для ${name}`);
    }
}

function createPlayerIcon(name, color) {
    return L.divIcon({
        html: `<div class="player-marker">
                <div class="player-name-tag" style="color:${color}">${name}</div>
                <div class="player-dot" style="background:${color}"></div>
               </div>`,
        iconSize: [80, 40],
        iconAnchor: [40, 30],
        className: ''
    });
}

function centerOnMe() {
    if (playersMarkers[currentUser.name]) {
        const pos = playersMarkers[currentUser.name].getLatLng();
        map.setView(pos, map.getZoom());
    } else {
        alert('Ваша позиция не определена');
    }
}

// ==================== ОБРАБОТКА КЛИКОВ ПО КАРТЕ ====================
function handleMapClick(e) {
    const { lat, lng } = e.latlng;
    console.log(`🖱️ Клик: инструмент=${activeTool}, координаты=[${lat.toFixed(6)}, ${lng.toFixed(6)}]`);
    
    if (activeTool === 'enemy' || activeTool === 'target') {
        const id = `${activeTool}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        
        const objectData = {
            id: id,
            type: activeTool,
            lat: lat,
            lng: lng,
            creator: currentUser.name
        };
        
        console.log('📤 Отправка объекта:', objectData);
        socket.emit('new_obj', objectData);
        
    } else if (activeTool === 'arrow' || activeTool === 'ruler') {
        rulerPoints.push({ lat, lng });
        
        if (rulerPoints.length === 2) {
            const id = `${activeTool}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            
            const objectData = {
                id: id,
                type: activeTool,
                start: rulerPoints[0],
                end: rulerPoints[1],
                creator: currentUser.name
            };
            
            console.log('📤 Отправка линии:', objectData);
            socket.emit('new_obj', objectData);
            rulerPoints = [];
            
        } else {
            // Показываем подсказку для второй точки
            L.popup()
                .setLatLng([lat, lng])
                .setContent(`<b>👆 Выберите вторую точку для ${activeTool === 'arrow' ? 'стрелки' : 'линейки'}</b>`)
                .openOn(map);
        }
    }
}

// ==================== УДАЛЕНИЕ СВОИХ ОБЪЕКТОВ ====================
function deleteMyObjects() {
    const ids = Array.from(myObjects);
    console.log('🗑️ Удаление моих объектов:', ids);
    ids.forEach(id => {
        socket.emit('delete_obj', id);
    });
    myObjects.clear();
}

// ==================== СЕТКА ====================
function drawGrid() {
    if (!map) return;
    
    const overlay = document.getElementById('grid-overlay');
    overlay.innerHTML = '';
    
    const zoom = map.getZoom();
    if (zoom < 14) return;
    
    const bounds = map.getBounds();
    const south = bounds.getSouth();
    const north = bounds.getNorth();
    const west = bounds.getWest();
    const east = bounds.getEast();
    
    const startLat = Math.floor(south / GRID_STEP) * GRID_STEP;
    const endLat = Math.ceil(north / GRID_STEP) * GRID_STEP;
    const startLng = Math.floor(west / GRID_STEP) * GRID_STEP;
    const endLng = Math.ceil(east / GRID_STEP) * GRID_STEP;
    
    // Рисуем линии сетки
    if (gridLayer) {
        map.removeLayer(gridLayer);
    }
    gridLayer = L.layerGroup().addTo(map);
    
    for (let lng = startLng; lng <= endLng; lng += GRID_STEP) {
        L.polyline([[startLat, lng], [endLat, lng]], {
            color: '#40cc70',
            weight: 1.5,
            opacity: 0.3
        }).addTo(gridLayer);
    }
    
    for (let lat = startLat; lat <= endLat; lat += GRID_STEP) {
        L.polyline([[lat, startLng], [lat, endLng]], {
            color: '#40cc70',
            weight: 1.5,
            opacity: 0.3
        }).addTo(gridLayer);
    }
    
    // Буквы сверху
    let colIndex = 0;
    for (let lng = startLng; lng <= endLng; lng += GRID_STEP) {
        const centerLng = lng + GRID_STEP / 2;
        const point = map.latLngToContainerPoint([north, centerLng]);
        
        if (point.x > 0 && point.x < window.innerWidth) {
            const div = document.createElement('div');
            div.className = 'grid-letter-top';
            div.textContent = getColumnLetter(colIndex);
            div.style.left = point.x + 'px';
            div.style.top = Math.max(20, point.y - 15) + 'px';
            overlay.appendChild(div);
        }
        colIndex++;
    }
    
    // Цифры справа
    let rowIndex = 0;
    for (let lat = startLat; lat <= endLat; lat += GRID_STEP) {
        const centerLat = lat + GRID_STEP / 2;
        const point = map.latLngToContainerPoint([centerLat, endLng]);
        
        if (point.y > 0 && point.y < window.innerHeight) {
            const div = document.createElement('div');
            div.className = 'grid-number-right';
            div.textContent = getRowNumber(rowIndex);
            div.style.right = '10px';
            div.style.top = point.y + 'px';
            overlay.appendChild(div);
        }
        rowIndex++;
    }
}

// ==================== ЧАТ ====================
function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    
    if (!text) return;
    
    socket.emit('chat_msg', {
        name: currentUser.name,
        text: text,
        color: currentUser.color
    });
    
    input.value = '';
    input.focus();
}

function addChatMessage(name, text, color) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg-line';
    div.innerHTML = `<span class="msg-name" style="color:${color}">${escapeHtml(name)}:</span>
                     <span class="msg-text">${escapeHtml(text)}</span>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function toggleChat() {
    const chat = document.getElementById('chat-win');
    if (chat.style.display === 'flex') {
        chat.style.display = 'none';
    } else {
        chat.style.display = 'flex';
        document.getElementById('chat-input').focus();
    }
}

// ==================== ИНСТРУМЕНТЫ ====================
function setTool(tool) {
    activeTool = tool;
    rulerPoints = [];
    
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    const btn = document.getElementById(`btn-${tool}`);
    if (btn) btn.classList.add('active');
    
    if (map) map.closePopup();
    
    console.log(`🔧 Инструмент: ${tool}`);
}

function changeMap(type) {
    if (tileLayer) map.removeLayer(tileLayer);
    
    if (type === 'sat') {
        tileLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 21
        }).addTo(map);
    } else {
        tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 21
        }).addTo(map);
    }
    
    drawGrid();
}

function exitApp() {
    if (confirm('Выйти из приложения?')) {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        socket.disconnect();
        location.reload();
    }
}

// ==================== ОБРАБОТКА РЕСАЙЗА ====================
window.addEventListener('resize', () => {
    if (map) {
        setTimeout(() => {
            map.invalidateSize();
            drawGrid();
        }, 200);
    }
});
