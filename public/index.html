<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.0 | ТАКТИКА</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon: #00f2ff; --warn: #f43f5e; --bg: #05070a; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
        
        #map { height: 100vh; width: 100%; z-index: 1; background: #0a0a0a; }
        
        .high-tech-panel {
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .neo-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(0, 242, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .neo-btn.active {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 15px var(--neon);
        }

        .nav-line { stroke: var(--neon); stroke-dasharray: 8, 8; animation: dash 30s linear infinite; opacity: 0.7; }
        @keyframes dash { to { stroke-dashoffset: -1000; } }

        .user-label { background: var(--neon); color: black; padding: 2px 6px; border-radius: 2px; font-weight: 900; font-size: 10px; border: 1px solid white; }
        .team-label { background: var(--warn); color: white; padding: 2px 6px; border-radius: 2px; font-weight: 900; font-size: 10px; border: 1px solid white; }
        
        #notif-box { position: fixed; top: 100px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 9999; pointer-events: none; }
        .notif-item { background: var(--neon); color: black; padding: 4px 12px; border-radius: 2px; font-weight: bold; font-size: 10px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="notif-box"></div>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black p-6">
        <div class="high-tech-panel w-full max-w-sm rounded-xl p-8 space-y-6 border-b-4 border-cyan-500">
            <div class="text-center">
                <h1 class="text-3xl font-black tracking-tighter text-white">SCORP<span class="text-cyan-400">GEO</span></h1>
                <p class="text-[10px] tracking-[0.3em] text-cyan-500 uppercase mt-1">Тактическая Сеть v3.0</p>
            </div>
            <div class="space-y-3">
                <input id="roomID" type="text" placeholder="ID КАНАЛА" class="w-full bg-zinc-900 border border-cyan-900 rounded p-4 text-center focus:border-cyan-400 outline-none uppercase">
                <input id="password" type="password" placeholder="ПАРОЛЬ" class="w-full bg-zinc-900 border border-cyan-900 rounded p-4 text-center focus:border-cyan-400 outline-none">
                <input id="callsign" type="text" placeholder="ПОЗЫВНОЙ" class="w-full bg-zinc-900 border border-cyan-900 rounded p-4 text-center focus:border-cyan-400 outline-none uppercase">
            </div>
            <button onclick="saveAndConnect()" class="w-full bg-cyan-500 text-black font-black py-4 rounded uppercase hover:bg-cyan-400 transition-all">Установить связь</button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed top-0 left-0 right-0 z-[5000] p-3 flex justify-between items-start pointer-events-none">
            <div class="high-tech-panel p-2 rounded-lg pointer-events-auto">
                <div id="display-room" class="text-cyan-400 font-bold text-[10px]">СЕТЬ: --</div>
                <div id="target-info" class="text-white text-[10px] mt-1 font-mono">СКАНЕР: ГОТОВ</div>
            </div>
            <button onclick="logout()" class="high-tech-panel px-4 py-2 text-red-500 font-bold text-[10px] pointer-events-auto uppercase">Выход</button>
        </div>

        <div class="fixed right-3 top-1/2 -translate-y-1/2 z-[5000] flex flex-col gap-3">
            <button onclick="setMode('enemy')" class="neo-btn w-12 h-12 rounded-lg text-xl" title="Враг">💀</button>
            <button onclick="setMode('point')" class="neo-btn w-12 h-12 rounded-lg text-xl" title="Точка">🚩</button>
            <button onclick="setMode('caution')" class="neo-btn w-12 h-12 rounded-lg text-xl" title="Внимание">⚠️</button>
            <div class="h-[1px] bg-cyan-900/50 my-1"></div>
            <button onclick="setMode('move')" id="move-btn" class="neo-btn active w-12 h-12 rounded-lg text-xl">🖐️</button>
        </div>

        <div class="fixed left-3 bottom-6 z-[5000] flex flex-col gap-2">
            <button onclick="setLayer('sat')" class="high-tech-panel px-3 py-2 text-[9px] font-bold text-white uppercase border-l-2 border-cyan-500">Спутник</button>
            <button onclick="setLayer('map')" class="high-tech-panel px-3 py-2 text-[9px] font-bold text-white uppercase border-l-2 border-zinc-500">Схема</button>
            <button onclick="setLayer('topo')" class="high-tech-panel px-3 py-2 text-[9px] font-bold text-white uppercase border-l-2 border-zinc-500">Рельеф</button>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, markers = {}, tacticalMarkers = [];
        let navLines = {}; // Объект для хранения нескольких линий
        let layers = {};
        let myInfo = { roomID: '', callsign: '', password: '', lat: 0, lng: 0 };
        let currentMode = 'move';

        window.onload = () => {
            const saved = localStorage.getItem('scorpGeo_Auth');
            if (saved) { myInfo = JSON.parse(saved); socket.emit('join_room', myInfo); }
        };

        function saveAndConnect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            myInfo.password = document.getElementById('password').value;
            if(!myInfo.roomID || !myInfo.password || !myInfo.callsign) return alert("ЗАПОЛНИТЕ ВСЕ ПОЛЯ");
            socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            localStorage.setItem('scorpGeo_Auth', JSON.stringify(myInfo));
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('display-room').innerText = "СЕТЬ: " + myInfo.roomID;
            initMap();
        });

        function initMap() {
            if (map) return;
            // Слои карт
            layers.sat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
            layers.map = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
            layers.topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

            map = L.map('map', { zoomControl: false, layers: [layers.sat] }).setView([43.5855, 39.7231], 13);
            
            map.on('click', (e) => {
                if (currentMode === 'move') return;
                socket.emit('new_map_marker', { 
                    id: Date.now(), 
                    type: currentMode, 
                    lat: e.latlng.lat, 
                    lng: e.latlng.lng, 
                    owner: myInfo.callsign 
                });
                setMode('move');
            });
            startGps();
        }

        function setLayer(t) {
            Object.values(layers).forEach(l => map.removeLayer(l));
            map.addLayer(layers[t]);
            // Подсветка кнопок
            event.currentTarget.parentElement.querySelectorAll('button').forEach(b => b.style.borderColor = 'rgb(113 113 122)');
            event.currentTarget.style.borderColor = '#00f2ff';
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.neo-btn').forEach(b => b.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
        }

        function startGps() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                myInfo.lat = latitude; myInfo.lng = longitude;
                if (!myMarker) {
                    myMarker = L.circleMarker([latitude, longitude], { color: '#00f2ff', radius: 5, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip("Я", { permanent: true, direction: 'top', className: 'user-label' });
                    map.setView([latitude, longitude], 17);
                } else { myMarker.setLatLng([latitude, longitude]); }
                updateAllNavLines();
                socket.emit('update_gps', { lat: latitude, lng: longitude });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('presence_update', (users) => {
            Object.keys(users).forEach(id => {
                if (id === socket.id) return;
                const u = users[id];
                if (!u.lat) return;
                if (!markers[id]) {
                    showNotif(`КОНТАКТ: ${u.callsign}`);
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#f43f5e', radius: 6, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(u.callsign, { permanent: true, direction: 'top', className: 'team-label' });
                    markers[id].on('click', () => toggleNavigation(id, u));
                } else { 
                    markers[id].setLatLng([u.lat, u.lng]); 
                    if(navLines[id]) updateAllNavLines();
                }
            });
        });

        function toggleNavigation(targetID, targetData) {
            if (navLines[targetID]) {
                // Если линия уже есть — удаляем
                map.removeLayer(navLines[targetID]);
                delete navLines[targetID];
                showNotif(`ДИСТАНЦИЯ ДО ${targetData.callsign} СКРЫТА`);
            } else {
                // Если линии нет — создаем
                navLines[targetID] = L.polyline([[myInfo.lat, myInfo.lng], [targetData.lat, targetData.lng]], {
                    color: '#00f2ff', weight: 2, className: 'nav-line'
                }).addTo(map);
                showNotif(`ДИСТАНЦИЯ ДО ${targetData.callsign} АКТИВНА`);
            }
            updateDistanceDisplay();
        }

        function updateAllNavLines() {
            Object.keys(navLines).forEach(id => {
                let targetPos;
                if (markers[id]) targetPos = markers[id].getLatLng();
                else if (tacticalMarkers[id]) targetPos = tacticalMarkers[id].getLatLng();
                
                if (targetPos) {
                    navLines[id].setLatLngs([[myInfo.lat, myInfo.lng], targetPos]);
                }
            });
            updateDistanceDisplay();
        }

        function updateDistanceDisplay() {
            let info = "СКАНЕР: ";
            Object.keys(navLines).forEach(id => {
                const line = navLines[id];
                const points = line.getLatLngs();
                const d = map.distance(points[0], points[1]);
                info += `| ${Math.round(d)}м `;
            });
            document.getElementById('target-info').innerText = info === "СКАНЕР: " ? "СКАНЕР: ГОТОВ" : info;
        }

        socket.on('draw_marker', (m) => {
            const icons = { enemy: '💀', point: '🚩', caution: '⚠️' };
            const marker = L.marker([m.lat, m.lng], {
                icon: L.divIcon({ html: `<div style="font-size:20px;">${icons[m.type]}</div>`, className: 'dummy' })
            }).addTo(map);
            
            // Навигация к метке по клику
            marker.on('click', () => toggleNavigation(m.id, {callsign: 'МЕТКА', lat: m.lat, lng: m.lng}));
            tacticalMarkers[m.id] = marker;
        });

        function showNotif(txt) {
            const b = document.getElementById('notif-box');
            const n = document.createElement('div'); n.className = 'notif-item'; n.innerText = txt;
            b.appendChild(n); setTimeout(() => n.remove(), 2500);
        }

        function logout() { localStorage.removeItem('scorpGeo_Auth'); location.reload(); }
    </script>
</body>
</html>
