<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION V18.6</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
        #map { height:100vh; width:100%; background:#000; }
        .side-panel { position:fixed; left:0; top:0; bottom:0; width:85px; background:rgba(10,10,10,0.95); border-right:2px solid #16a34a; z-index:5000; display:flex; flex-direction:column; }
        .tool-btn { width:100%; height:60px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-bottom:1px solid #222; cursor:pointer; color:#16a34a; }
        .tool-btn.active { background:#166534; color:#fff; }
        
        .p-label { text-align:center; font-weight:900; font-size:15px; color:#fff; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000; }
        .p-dot { width:12px; height:12px; border-radius:50%; border:2px solid #fff; margin:0 auto; }
        
        #grid-cont { position:fixed; inset:0; pointer-events:none; z-index:1000; }
        .g-t { position:absolute; color:#000; font-size:14px; font-weight:900; text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff; transform: translate(-50%, -50%); }
        .dist-label { color:#fff; font-weight:900; background:rgba(0,0,0,0.6); padding:2px 4px; border-radius:4px; font-size:12px; }

        #chat-win { position:fixed; bottom:10px; left:95px; right:10px; height:150px; background:rgba(0,0,0,0.9); border:1px solid #16a34a; z-index:6000; display:none; flex-direction:column; }
    </style>
</head>
<body>

<div id="grid-cont"></div>
<div class="side-panel">
    <div onclick="setT('move')" id="b-move" class="tool-btn active"><b>🖐️</b><span class="text-[9px]">РУКА</span></div>
    <div onclick="setT('enemy')" id="b-enemy" class="tool-btn"><b>💀</b><span class="text-[9px]">ВРАГ</span></div>
    <div onclick="setT('arrow')" id="b-arrow" class="tool-btn"><b>➡️</b><span class="text-[9px]">УДАР</span></div>
    <div onclick="setT('ruler')" id="b-ruler" class="tool-btn"><b>📏</b><span class="text-[9px]">МЕРКА</span></div>
    <div onclick="setT('eraser')" id="b-eraser" class="tool-btn"><b>🧼</b><span class="text-[9px]">СТЕРКА</span></div>
    <div onclick="toggleC()" class="tool-btn"><b>💬</b><span class="text-[9px]">СВЯЗЬ</span></div>
    <div onclick="setM('sat')" class="tool-btn"><b>🛰️</b><span class="text-[9px]">САТ</span></div>
    <div onclick="setM('map')" class="tool-btn"><b>🗺️</b><span class="text-[9px]">КАРТА</span></div>
</div>

<div id="map"></div>

<div id="chat-win">
    <div id="chat-m" class="flex-1 overflow-y-auto p-2 text-green-400 text-[10px]"></div>
    <div class="p-1 flex bg-zinc-900">
        <input id="chatI" class="flex-1 bg-black text-white p-1 text-xs outline-none">
        <button onclick="sendM()" class="bg-green-700 px-2 text-white">📡</button>
    </div>
</div>

<script>
    const socket = io();
    let map, myName = "ХАН", tool = 'move', userPos = {lat:0, lng:0};
    let tacticalItems = {}, players = {}, rulerPoints = [], distanceLines = [];

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 22 }).setView([43.40, 39.95], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('click', e => {
            if (tool === 'enemy') socket.emit('new_obj', { id: 'obj_'+Date.now(), type: 'enemy', lat: e.latlng.lat, lng: e.latlng.lng });
            if (tool === 'ruler' || tool === 'arrow') {
                rulerPoints.push(e.latlng);
                if (rulerPoints.length === 2) {
                    socket.emit('new_obj', { id: 'obj_'+Date.now(), type: tool, start: rulerPoints[0], end: rulerPoints[1] });
                    rulerPoints = [];
                }
            }
        });

        map.on('move zoom', updateG);
        updateG();

        navigator.geolocation.watchPosition(p => {
            userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
            socket.emit('gps_sync', { ...userPos, name: myName });
            drawP(myName, userPos, '#16a34a');
        });
    }

    function updateG() {
        const c = document.getElementById('grid-cont'); c.innerHTML = '';
        if (map.getZoom() < 16) return;
        const b = map.getBounds(); const step = 0.00020;
        const ru = "АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЩЭЮЯ";
        for (let x = Math.floor(b.getWest()/step)*step; x <= b.getEast(); x += step) {
            let p = map.latLngToContainerPoint([b.getNorth(), x]);
            let t = document.createElement('div'); t.className='g-t'; t.style.left=p.x+'px'; t.style.top='20px';
            t.innerText = ru[Math.abs(Math.round(x/step)) % ru.length]; c.appendChild(t);
        }
        for (let y = Math.floor(b.getSouth()/step)*step; y <= b.getNorth(); y += step) {
            let p = map.latLngToContainerPoint([y, b.getWest()]);
            let t = document.createElement('div'); t.className='g-t'; t.style.right='10px'; t.style.top=p.y+'px';
            t.innerText = Math.abs(Math.round(y/step)) % 100; c.appendChild(t);
        }
    }

    socket.on('draw', m => {
        let items = [];
        if (m.type === 'ruler' || m.type === 'arrow') {
            let col = m.type === 'arrow' ? 'red' : 'yellow';
            let l = L.polyline([m.start, m.end], { color: col, weight: 4 }).addTo(map);
            items = [l];
            if(m.type === 'ruler') {
                let d = Math.round(map.distance(m.start, m.end));
                items.push(L.marker(m.end, { icon: L.divIcon({ html: `<div class="dist-label">${d}м</div>` }) }).addTo(map));
            }
        } else {
            let it = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:25px;">💀</div>` }) }).addTo(map);
            it.on('click', () => { if(tool==='eraser') socket.emit('delete_obj', m.id); });
            items = [it];
        }
        tacticalItems[m.id] = items;
    });

    function drawP(name, pos, col) {
        let icon = L.divIcon({ html: `<div class="p-label" style="color:${col}">${name}</div><div class="p-dot" style="background:${col}"></div>`, iconSize:[100,40] });
        if (!players[name]) players[name] = L.marker([pos.lat, pos.lng], { icon }).addTo(map);
        else players[name].setLatLng([pos.lat, pos.lng]);
    }

    function toggleC() { 
        const w = document.getElementById('chat-win');
        w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
    }
    
    function sendM() { 
        const i = document.getElementById('chatI'); 
        if(i.value) { socket.emit('chat_msg', i.value); i.value = ''; } 
    }
    
    socket.on('receive_msg', m => { 
        const d = document.getElementById('chat-m'); 
        d.innerHTML += `<div>> ${m}</div>`; 
        d.scrollTop = d.scrollHeight;
    });

    socket.on('player_move', d => drawP(d.name, d, d.color));
    socket.on('remove_obj', id => { if(tacticalItems[id]) { tacticalItems[id].forEach(i => map.removeLayer(i)); delete tacticalItems[id]; } });
    function setT(t) { tool = t; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('b-'+t).classList.add('active'); rulerPoints=[]; }
    function setM(t) { 
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const mapL = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        map.eachLayer(l => { if(l._url) map.removeLayer(l); });
        (t === 'sat' ? sat : mapL).addTo(map);
    }

    initMap();
</script>
</body>
</html>
