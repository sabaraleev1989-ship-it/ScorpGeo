<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION TACTICAL V6</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Condensed:wght@700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #22c55e; font-family: 'Roboto Condensed', sans-serif; overflow: hidden; }

        /* ЭКРАН ВХОДА С РАДАРОМ */
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .entry-radar { width: 280px; height: 120px; background: rgba(0,255,0,0.05); border: 2px solid #22c55e; position: relative; margin-bottom: 20px; overflow: hidden; }
        .radar-sweep { position: absolute; width: 100%; height: 2px; background: #22c55e; box-shadow: 0 0 15px #22c55e; animation: scan 2.5s ease-in-out infinite; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .auth-input { background: #000; border: 1px solid #22c55e; color: #22c55e; padding: 15px; margin-bottom: 12px; width: 300px; text-align: center; outline: none; font-size: 18px; font-family: 'Orbitron'; }
        .auth-btn { background: #166534; color: #fff; padding: 20px; width: 300px; font-weight: bold; border: 1px solid #22c55e; cursor: pointer; }

        /* ИСПРАВЛЕННАЯ СЕТКА (Крупные ячейки) */
        #grid-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
        .grid-v { position: absolute; width: 1px; background: rgba(34, 197, 94, 0.4); top: 0; bottom: 0; }
        .grid-h { position: absolute; height: 1px; background: rgba(34, 197, 94, 0.4); left: 0; right: 0; }
        .grid-label { position: absolute; background: #000; color: #22c55e; font-family: 'Orbitron'; font-size: 16px; padding: 2px 6px; border: 1px solid #22c55e; z-index: 1001; font-weight: bold; }

        #map { height: 100vh; width: 100%; z-index: 1; position: absolute; background: #000; }

        /* ЦИФРЫ - МАКСИМАЛЬНАЯ ЧИТАЕМОСТЬ */
        .tactical-label { 
            background: #fff !important; 
            border: 3px solid #000 !important; 
            color: #ff0000 !important; 
            font-weight: 900 !important; 
            font-size: 20px !important; 
            padding: 2px 8px !important;
            border-radius: 4px;
            white-space: nowrap;
            text-align: center;
        }

        /* ИНТЕРФЕЙС */
        .side-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 65px; background: #000; border-right: 2px solid #22c55e; z-index: 5000; display: flex; flex-direction: column; }
        .tool-btn { width: 65px; height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #111; font-size: 26px; cursor: pointer; }
        .tool-btn.active { background: #166534; color: white; }

        #arrow-colors { display: none; position: absolute; left: 70px; top: 240px; background: #000; border: 2px solid #22c55e; padding: 5px; z-index: 5500; }
        .color-dot { width: 40px; height: 40px; margin: 5px; border: 2px solid #fff; cursor: pointer; }

        /* СТРЕЛКА-ТРЕУГОЛЬНИК (Наконечник) */
        .arrow-head {
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid white;
            position: absolute;
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-family:'Orbitron'; color:white; font-size:28px; margin-bottom:10px;">SCORPION <span style="color:#22c55e">SYSTEM</span></h1>
        
        <div class="entry-radar">
            <div class="radar-sweep"></div>
            <div style="position:absolute; top:20px; left:30px; width:6px; height:6px; background:red; border-radius:50%; box-shadow:0 0 10px red;"></div>
            <div style="position:absolute; bottom:30px; right:50px; width:6px; height:6px; background:red; border-radius:50%; box-shadow:0 0 10px red;"></div>
            <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:10px; color:#22c55e; opacity:0.5;">SCANNING FOR TARGETS...</div>
        </div>

        <input id="roomIn" type="text" placeholder="КОМАНДА / ID" class="auth-input">
        <input id="nameIn" type="text" placeholder="ВАШ ПОЗЫВНОЙ" class="auth-input">
        <button onclick="connect()" class="auth-btn">АКТИВИРОВАТЬ ТЕРМИНАЛ</button>
    </div>

    <div id="ui" style="display:none">
        <div id="grid-layer"></div>

        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️</div>
            <div onclick="centerMe()" class="tool-btn text-blue-400">🎯</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>
            <div class="mt-auto">
                <div onclick="location.reload()" class="tool-btn text-red-600">🚪</div>
            </div>
        </div>

        <div id="arrow-colors">
            <div class="color-dot bg-blue-600" onclick="pickColor('#2563eb')"></div>
            <div class="color-dot bg-red-600" onclick="pickColor('#ef4444')"></div>
            <div class="color-dot bg-green-600" onclick="pickColor('#22c55e')"></div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, user = { lat:0, lng:0, name:'' }, tool = 'move', activeColor = '#2563eb', arrowStart = null;
        let tactical = {};
        // Увеличил шаг сетки, чтобы не было "каши"
        const STEP = 50 * 0.000009; 

        function connect() {
            user.name = document.getElementById('nameIn').value.toUpperCase();
            const room = document.getElementById('roomIn').value.toUpperCase();
            if(room && user.name) socket.emit('join_room', { room, name: user.name });
        }

        socket.on('login_success', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 21 }).setView([43.40, 39.95], 18);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21 }).addTo(map);
            
            map.on('move zoom', updateGrid);
            map.on('click', onMapClick);
            updateGrid();
            startGps();
        }

        function updateGrid() {
            const b = map.getBounds();
            const container = document.getElementById('grid-layer');
            container.innerHTML = '';

            // Рисуем только те линии, которые попадают в экран, с ограничением частоты
            for (let x = Math.floor(b.getWest()/STEP)*STEP; x <= b.getEast(); x += STEP) {
                const p = map.latLngToContainerPoint([b.getNorth(), x]);
                const line = document.createElement('div'); line.className = 'grid-v';
                line.style.left = p.x + 'px'; container.appendChild(line);
                
                const lbl = document.createElement('div'); lbl.className = 'grid-label';
                lbl.style.left = (p.x + 2) + 'px'; lbl.style.top = '10px';
                lbl.innerText = String.fromCharCode(65 + (Math.abs(Math.round(x/STEP))%26));
                container.appendChild(lbl);
            }
            for (let y = Math.floor(b.getSouth()/STEP)*STEP; y <= b.getNorth(); y += STEP) {
                const p = map.latLngToContainerPoint([y, b.getWest()]);
                const line = document.createElement('div'); line.className = 'grid-h';
                line.style.top = p.y + 'px'; container.appendChild(line);

                const lbl = document.createElement('div'); lbl.className = 'grid-label';
                lbl.style.right = '10px'; lbl.style.top = (p.y + 2) + 'px';
                lbl.innerText = Math.abs(Math.round(y/STEP)) % 100;
                container.appendChild(lbl);
            }
        }

        function onMapClick(e) {
            if(tool === 'move') return;
            const id = 'id' + Date.now();
            if(tool === 'arrow') {
                if(!arrowStart) { 
                    arrowStart = e.latlng;
                    L.circleMarker(e.latlng, {radius:5, color:activeColor}).addTo(map);
                } else {
                    socket.emit('new_obj', { id, type:'arrow', start:arrowStart, end:e.latlng, color:activeColor });
                    arrowStart = null;
                }
            } else {
                socket.emit('new_obj', { id, type:tool, lat:e.latlng.lat, lng:e.latlng.lng, from:[user.lat, user.lng] });
            }
        }

        socket.on('draw', m => {
            if(m.type === 'arrow') {
                const line = L.polyline([m.start, m.end], { color: m.color, weight: 8 }).addTo(map);
                
                // Наконечник - отдельный маркер с поворотом
                const angle = Math.atan2(m.end.lat - m.start.lat, m.end.lng - m.start.lng) * 180 / Math.PI;
                const head = L.marker(m.end, {
                    icon: L.divIcon({
                        className: '',
                        html: `<div class="arrow-head" style="transform: rotate(${90-angle}deg); border-bottom-color: ${m.color};"></div>`,
                        iconAnchor: [10, 10]
                    })
                }).addTo(map);

                tactical[m.id] = { layers: [line, head] };
            } else {
                const ico = m.type === 'enemy' ? '💀' : '🚩';
                const marker = L.marker([m.lat, m.lng], { 
                    icon: L.divIcon({ html: `<div style="font-size:40px; text-shadow: 0 0 10px #000;">${ico}</div>`, className:'dummy', iconAnchor:[20,20] })
                }).addTo(map);

                const dist = Math.round(map.distance(m.from, [m.lat, m.lng]));
                const label = L.marker([m.lat, m.lng], {
                    icon: L.divIcon({ className: 'tactical-label', html: `${dist}м`, iconAnchor: [20, -25] })
                }).addTo(map);

                tactical[m.id] = { layers: [marker, label] };
            }
        });

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                user.lat = p.coords.latitude; user.lng = p.coords.longitude;
                socket.emit('gps_sync', { lat: user.lat, lng: user.lng });
            }, null, { enableHighAccuracy: true });
        }

        function setTool(t) { 
            tool = t; arrowStart = null;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-'+t).classList.add('active');
            document.getElementById('arrow-colors').style.display = (t==='arrow')?'block':'none';
        }
        function pickColor(c) { activeColor = c; }
        function clearMap() { if(confirm("ОЧИСТИТЬ КАРТУ?")) socket.emit('clear'); }
        socket.on('clear_all', () => { Object.values(tactical).forEach(o => o.layers.forEach(l => map.removeLayer(l))); tactical = {}; });
    </script>
</body>
</html>
