<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION GEO | V4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@700&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #22c55e; font-family: 'Roboto Condensed', sans-serif; overflow: hidden; }

        /* ЭКРАН ВХОДА */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .radar {
            width: 200px; height: 200px; border: 1px solid #166534; border-radius: 50%;
            position: absolute; animation: pulse 2s infinite; pointer-events: none;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }

        .auth-input { 
            background: rgba(0,0,0,0.8); border: 1px solid #22c55e; color: #22c55e; 
            padding: 12px; margin-bottom: 10px; width: 260px; text-align: center; font-family: 'Orbitron'; outline: none;
        }
        .auth-btn { background: #166534; color: #fff; padding: 15px; width: 260px; font-weight: bold; cursor: pointer; border: none; }

        /* КАРТА И ОСИ */
        #map { height: 100vh; width: 100%; z-index: 1; position: absolute; }
        .grid-axis-x { position: fixed; top: 0; left: 60px; right: 0; height: 30px; background: rgba(0,0,0,0.9); z-index: 4000; pointer-events: none; border-bottom: 2px solid #22c55e; }
        .grid-axis-y { position: fixed; top: 30px; right: 0; bottom: 0; width: 35px; background: rgba(0,0,0,0.9); z-index: 4000; pointer-events: none; border-left: 2px solid #22c55e; }
        .axis-label { color: #22c55e; font-family: 'Orbitron'; font-size: 14px; position: absolute; font-weight: 900; }

        /* ТАКТИЧЕСКИЕ МЕТКИ */
        .dist-label-new { background: #fff !important; border: 2px solid #000 !important; padding: 2px 6px !important; border-radius: 2px; box-shadow: 2px 2px 0px #000; }
        .dist-text { color: #ff0000; font-weight: 900; font-size: 16px; }

        /* ПАНЕЛЬ */
        .side-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 60px; background: #0a0a0a; border-right: 1px solid #1e293b; z-index: 5000; display: flex; flex-direction: column; }
        .tool-btn { width: 60px; height: 55px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; font-size: 24px; cursor: pointer; }
        .tool-btn.active { background: #2563eb; color: white; }

        /* ЧАТ */
        #chat-box { position: fixed; left: 70px; bottom: 80px; width: 300px; height: 380px; background: rgba(0,0,0,0.95); border: 2px solid #2563eb; z-index: 6000; display: none; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 16px; line-height: 1.4; color: #fff; }
        .close-chat-btn { width: 50px; height: 50px; background: #ef4444; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="radar"></div>
        <h1 class="text-2xl font-bold mb-8 tracking-[0.3em] font-['Orbitron'] text-green-500">SCORP <span class="text-white">OS</span></h1>
        
        <input id="roomInput" type="text" placeholder="ID СЕТИ (ROOM)" class="auth-input">
        <input id="codeInput" type="password" placeholder="КОД (PASS)" class="auth-input">
        <input id="nameInput" type="text" placeholder="ПОЗЫВНОЙ (CALLSIGN)" class="auth-input">
        
        <button onclick="startSystem()" class="auth-btn font-['Orbitron'] tracking-widest mt-4">ESTABLISH CONNECTION</button>
    </div>

    <div id="main-ui" style="display:none">
        <div id="axis-x" class="grid-axis-x"></div>
        <div id="axis-y" class="grid-axis-y"></div>

        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️</div>
            <div onclick="centerMe()" class="tool-btn text-green-500">🎯</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️</div>
            <div onclick="toggleChat()" class="tool-btn">💬</div>
            <div onclick="undo()" class="tool-btn text-yellow-500">↩️</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>
            <div class="mt-auto">
                <div onclick="changeMap('sat')" class="tool-btn text-[10px] font-bold">SAT</div>
                <div onclick="location.reload()" class="tool-btn text-red-600">🚪</div>
            </div>
        </div>

        <div id="chat-box">
            <div class="flex justify-between items-center bg-blue-900 h-12">
                <span class="ml-3 font-bold text-sm tracking-tighter">RADIO CHANNEL [LIVE]</span>
                <div onclick="toggleChat()" class="close-chat-btn">×</div>
            </div>
            <div id="chat-messages"></div>
            <div class="p-3 border-t border-blue-900 flex bg-black">
                <input id="msgInput" type="text" class="flex-1 bg-transparent text-green-400 outline-none text-lg" placeholder="Type here...">
                <button onclick="sendMsg()" class="text-blue-500 font-bold ml-3 text-lg">SEND</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, myInfo = { room: '', name: '', code: '', lat: 0, lng: 0 };
        let tactical = {}, tool = 'move', arrowFrom = null;
        let layers = {}, gridLayer = null;

        const STEP = 20 * 0.000009;

        function startSystem() {
            myInfo.room = document.getElementById('roomInput').value.toUpperCase().trim();
            myInfo.code = document.getElementById('codeInput').value.trim();
            myInfo.name = document.getElementById('nameInput').value.toUpperCase().trim();

            if(myInfo.room && myInfo.name) {
                socket.emit('join_room', myInfo);
            } else {
                alert("FILL ALL FIELDS!");
            }
        }

        socket.on('login_success', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            layers.map = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21 });
            layers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21 });
            
            map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 21 }).setView([43.40, 39.95], 18);
            layers.sat.addTo(map);
            
            gridLayer = L.layerGroup().addTo(map);
            map.on('move zoom', updateGrid);
            map.on('click', onMapClick);
            updateGrid();
            startGps();
        }

        function updateGrid() {
            gridLayer.clearLayers();
            const b = map.getBounds();
            const axX = document.getElementById('axis-x'), axY = document.getElementById('axis-y');
            axX.innerHTML = ''; axY.innerHTML = '';

            for (let x = Math.floor(b.getWest()/STEP)*STEP; x <= b.getEast(); x += STEP) {
                L.polyline([[b.getSouth(), x], [b.getNorth(), x]], {color:'#22c55e', weight:1, opacity:0.15}).addTo(gridLayer);
                const p = map.latLngToContainerPoint([b.getNorth(), x + STEP/2]);
                if(p.x > 60) {
                    const el = document.createElement('div'); el.className = 'axis-label';
                    el.style.left = (p.x - 77) + 'px'; el.style.top = '5px';
                    el.innerText = String.fromCharCode(65 + (Math.abs(Math.round(x/STEP))%26));
                    axX.appendChild(el);
                }
            }
            for (let y = Math.floor(b.getSouth()/STEP)*STEP; y <= b.getNorth(); y += STEP) {
                L.polyline([[y, b.getWest()], [y, b.getEast()]], {color:'#22c55e', weight:1, opacity:0.15}).addTo(gridLayer);
                const p = map.latLngToContainerPoint([y + STEP/2, b.getEast()]);
                const el = document.createElement('div'); el.className = 'axis-label';
                el.style.top = (p.y - 45) + 'px'; el.style.right = '5px';
                el.innerText = Math.abs(Math.round(y/STEP)) % 100;
                axY.appendChild(el);
            }
        }

        function onMapClick(e) {
            if(tool === 'move') return;
            const id = 'id' + Date.now();
            if(tool === 'arrow') {
                if(!arrowFrom) {
                    arrowFrom = e.latlng;
                    L.circleMarker(e.latlng, { radius: 5, color: 'blue' }).addTo(map).fadeOut = true;
                } else {
                    socket.emit('new_obj', { id, type: 'arrow', start: arrowFrom, end: e.latlng });
                    arrowFrom = null;
                }
            } else {
                socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng });
            }
        }

        socket.on('draw', m => {
            if(m.type === 'arrow') {
                const line = L.polyline([m.start, m.end], { color: '#2563eb', weight: 4 }).addTo(map);
                const dist = Math.round(map.distance(m.start, m.end));
                const label = L.marker(m.end, { icon: L.divIcon({ className: 'dist-label-new', html: `<span class="dist-text">${dist}м</span>`, iconAnchor: [20, -10] }) }).addTo(map);
                tactical[m.id] = { layers: [line, label] };
            } else {
                const ico = m.type === 'enemy' ? '💀' : '🚩';
                tactical[m.id] = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:30px">${ico}</div>`, className: 'dummy', iconAnchor:[15,15] }) }).addTo(map);
            }
        });

        function toggleChat() { const c = document.getElementById('chat-box'); c.style.display = (c.style.display === 'flex') ? 'none' : 'flex'; }
        function sendMsg() { 
            const i = document.getElementById('msgInput'); 
            if(i.value) { socket.emit('chat_msg', { name: myInfo.name, text: i.value }); i.value = ''; } 
        }
        socket.on('msg', m => { 
            const d = document.createElement('div'); d.className = "mb-2 border-b border-gray-800 pb-1";
            d.innerHTML = `<b class="text-blue-400 text-xs">${m.name}:</b><br><span class="text-white">${m.text}</span>`; 
            document.getElementById('chat-messages').appendChild(d);
            document.getElementById('chat-messages').scrollTop = 9999;
        });

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                myInfo.lat = p.coords.latitude; myInfo.lng = p.coords.longitude;
                if(!myMarker) {
                    myMarker = L.circleMarker([myInfo.lat, myInfo.lng], { color: '#2563eb', radius: 10, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip(myInfo.name, { permanent: true, direction: 'top', className: 'bg-blue-600 text-white font-bold' });
                    map.setView([myInfo.lat, myInfo.lng], 19);
                } else myMarker.setLatLng([myInfo.lat, myInfo.lng]);
                socket.emit('gps_sync', { lat: myInfo.lat, lng: myInfo.lng });
            }, null, { enableHighAccuracy: true });
        }

        function setTool(t) { tool = t; arrowFrom = null; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); }
        function changeMap(t) { map.eachLayer(l => { if(l instanceof L.TileLayer) map.removeLayer(l); }); layers[t].addTo(map); }
        function centerMe() { if(myInfo.lat) map.setView([myInfo.lat, myInfo.lng], 19); }
        function undo() { socket.emit('undo'); }
        function clearMap() { if(confirm("DELETE EVERYTHING?")) socket.emit('clear'); }
        socket.on('del_obj', id => { if(tactical[id]) { if(tactical[id].layers) tactical[id].layers.forEach(l => map.removeLayer(l)); else map.removeLayer(tactical[id]); delete tactical[id]; } });
    </script>
</body>
</html>
