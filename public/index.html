<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION TACTICAL V7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Condensed:wght@700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #22c55e; font-family: 'Roboto Condensed', sans-serif; overflow: hidden; }

        /* РАДАР НА ВХОДЕ */
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .entry-radar { width: 280px; height: 120px; border: 2px solid #22c55e; position: relative; margin-bottom: 20px; overflow: hidden; background: radial-gradient(circle, #062b06 0%, #000 70%); }
        .radar-sweep { position: absolute; width: 100%; height: 3px; background: #22c55e; box-shadow: 0 0 15px #22c55e; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* ИНТЕРФЕЙС И КНОПКИ */
        .side-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 65px; background: #0a0a0a; border-right: 2px solid #22c55e; z-index: 5000; display: flex; flex-direction: column; }
        .tool-btn { width: 65px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #222; cursor: pointer; font-size: 20px; }
        .tool-btn span { font-size: 10px; font-weight: bold; margin-top: 2px; }
        .tool-btn.active { background: #166534; box-shadow: inset 0 0 10px #22c55e; }

        /* СЕТКА ПОВЕРХ */
        #grid-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
        .grid-v, .grid-h { position: absolute; background: rgba(34, 197, 94, 0.4); }
        .grid-v { width: 1px; top: 0; bottom: 0; }
        .grid-h { height: 1px; left: 0; right: 0; }
        .grid-label { position: absolute; color: #22c55e; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px #000; pointer-events: none; }

        /* ТАКТИЧЕСКИЕ МЕТКИ */
        .tactical-label { 
            background: rgba(255,255,255,0.95) !important; 
            border: 2px solid #000 !important; 
            color: #ff0000 !important; 
            font-weight: 900 !important; 
            padding: 1px 5px !important;
            border-radius: 3px;
            font-size: 16px !important;
        }

        #map { height: 100vh; width: 100%; z-index: 1; background: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-family:'Orbitron'; color:white; font-size:24px; margin-bottom:15px;">SCORPION <span style="color:#22c55e">V7</span></h1>
        <div class="entry-radar"><div class="radar-sweep"></div></div>
        <input id="roomIn" type="text" placeholder="ID КОМАНДЫ" style="background:#000; border:1px solid #22c55e; color:#22c55e; padding:12px; margin-bottom:10px; width:260px; text-align:center;">
        <input id="nameIn" type="text" placeholder="ПОЗЫВНОЙ" style="background:#000; border:1px solid #22c55e; color:#22c55e; padding:12px; margin-bottom:10px; width:260px; text-align:center;">
        <button onclick="connect()" style="background:#166534; color:white; padding:15px; width:260px; font-weight:bold; border:1px solid #22c55e;">ВХОД В СИСТЕМУ</button>
    </div>

    <div id="ui" style="display:none">
        <div id="grid-layer"></div>

        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️<span>РУКА</span></div>
            <div onclick="centerMe()" class="tool-btn text-blue-400">🎯<span>ГДЕ Я</span></div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀<span>ВРАГ</span></div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩<span>ЦЕЛЬ</span></div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️<span>УДАР</span></div>
            
            <div style="margin-top:auto"></div>
            
            <div onclick="setLayer('sat')" id="layer-sat" class="tool-btn">🛰️<span>SAT</span></div>
            <div onclick="setLayer('map')" id="layer-map" class="tool-btn active">🗺️<span>MAP</span></div>
            
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️<span>ОЧИСТИТЬ</span></div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, userMarker, tool = 'move', userPos = { lat:0, lng:0 };
        let tacticalLayers = [];
        
        const layers = {
            map: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };

        function connect() {
            const name = document.getElementById('nameIn').value.toUpperCase();
            const room = document.getElementById('roomIn').value.toUpperCase();
            if(room && name) {
                userPos.name = name;
                socket.emit('join_room', { room, name });
            }
        }

        socket.on('login_success', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.40, 39.95], 18);
            layers.map.addTo(map);

            map.on('move zoom', updateGrid);
            map.on('click', onMapClick);
            
            // Синий маркер игрока
            userMarker = L.marker([0,0], {
                icon: L.divIcon({
                    html: `<div style="background:#2563eb; color:white; padding:2px 8px; border-radius:5px; border:2px solid white; font-weight:bold; white-space:nowrap;">ХАН</div>`,
                    className: '', iconAnchor: [20, 10]
                })
            }).addTo(map);

            updateGrid();
            startGps();
        }

        function setLayer(type) {
            map.removeLayer(layers.map);
            map.removeLayer(layers.sat);
            layers[type].addTo(map);
            document.getElementById('layer-sat').classList.toggle('active', type==='sat');
            document.getElementById('layer-map').classList.toggle('active', type==='map');
        }

        function updateGrid() {
            const container = document.getElementById('grid-layer');
            container.innerHTML = '';
            
            // СКРЫВАЕМ СЕТКУ ПРИ ОТДАЛЕНИИ (меньше 16 зума)
            if (map.getZoom() < 16) return;

            const b = map.getBounds();
            const STEP = 0.0005; // Фиксированный шаг для стабильности

            for (let x = Math.floor(b.getWest()/STEP)*STEP; x <= b.getEast(); x += STEP) {
                let p = map.latLngToContainerPoint([b.getNorth(), x]);
                let l = document.createElement('div'); l.className = 'grid-v';
                l.style.left = p.x + 'px'; container.appendChild(l);
            }
            for (let y = Math.floor(b.getSouth()/STEP)*STEP; y <= b.getNorth(); y += STEP) {
                let p = map.latLngToContainerPoint([y, b.getWest()]);
                let l = document.createElement('div'); l.className = 'grid-h';
                l.style.top = p.y + 'px'; container.appendChild(l);
            }
        }

        function centerMe() {
            if (userPos.lat !== 0) {
                map.flyTo([userPos.lat, userPos.lng], 19);
            } else {
                alert("Ожидание GPS...");
            }
        }

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                userPos.lat = p.coords.latitude;
                userPos.lng = p.coords.longitude;
                userMarker.setLatLng([userPos.lat, userPos.lng]);
                socket.emit('gps_sync', { lat: userPos.lat, lng: userPos.lng });
            }, null, { enableHighAccuracy: true });
        }

        function onMapClick(e) {
            if(tool === 'move') return;
            const id = 'id' + Date.now();
            socket.emit('new_obj', { id, type:tool, lat:e.latlng.lat, lng:e.latlng.lng, from:[userPos.lat, userPos.lng] });
        }

        socket.on('draw', m => {
            const ico = m.type === 'enemy' ? '💀' : '🚩';
            const marker = L.marker([m.lat, m.lng], { 
                icon: L.divIcon({ html: `<div style="font-size:30px">${ico}</div>`, className:'dummy', iconAnchor:[15,15] })
            }).addTo(map);

            const dist = Math.round(map.distance(m.from, [m.lat, m.lng]));
            const label = L.marker([m.lat, m.lng], {
                icon: L.divIcon({ className: 'tactical-label', html: `${dist}м`, iconAnchor: [20, -20] })
            }).addTo(map);

            tacticalLayers.push(marker, label);
        });

        function setTool(t) {
            tool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-'+t).classList.add('active');
        }

        function clearMap() {
            if(confirm("УДАЛИТЬ ВСЕ МЕТКИ?")) socket.emit('clear');
        }

        socket.on('clear_all', () => {
            tacticalLayers.forEach(l => map.removeLayer(l));
            tacticalLayers = [];
        });
    </script>
</body>
</html>
