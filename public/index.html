<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCORPION TACTICAL V22 — СЕТКА | ЧАТ | ИНСТРУМЕНТЫ</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #0a0c0a; overflow: hidden; font-family: 'Courier New', monospace; }
        #map { position: absolute; inset: 0; z-index: 1; background: #1a1e1a; visibility: hidden; }
        /* ЭКРАН ВХОДА — ТОЛЬКО 3 ПОЛЯ */
        #auth-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(circle at 20% 30%, #0b1f0b, #010101);
            display: flex; align-items: center; justify-content: center;
        }
        .tactical-border {
            background: rgba(0,0,0,0.85); padding: 2rem; border: 1px solid #2ecc71;
            box-shadow: 0 0 25px rgba(46,204,113,0.3); width: 90%; max-width: 340px;
            text-align: center;
        }
        .team-name { font-size: 1.8rem; font-weight: 900; color: #d4ff00; margin-bottom: 1.5rem; }
        .auth-input {
            width: 100%; background: #030803; border: 1.5px solid #2ecc71; color: #b3ffcf;
            padding: 12px; margin-bottom: 14px; text-align: center; font-family: monospace;
        }
        .auth-btn { width: 100%; background: #1f5f2f; color: white; padding: 14px; font-weight: bold; cursor: pointer; }
        /* БОКОВАЯ ПАНЕЛЬ */
        .side-panel {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: rgba(0,0,0,0.96); border-right: 2px solid #2ecc71;
            z-index: 5000; display: none; flex-direction: column; overflow-y: auto;
        }
        .tool-btn {
            width: 100%; min-height: 60px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-bottom: 1px solid #1f3a1f;
            color: #2ecc71; cursor: pointer; font-size: 9px; font-weight: bold;
        }
        .tool-btn b { font-size: 20px; margin-bottom: 3px; }
        .tool-btn.active { background: #14532d; color: #fff; border-left: 3px solid #adff2f; }
        /* СЕТКА: русские буквы сверху, цифры справа */
        .grid-labels-container {
            position: fixed; inset: 0; pointer-events: none; z-index: 950;
        }
        .grid-top-label {
            position: absolute; font-size: 12px; font-weight: 900;
            background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 3px;
            color: #ccffaa; border-bottom: 1px solid #5eff3b;
            transform: translate(-50%, -50%); white-space: nowrap;
        }
        .grid-right-label {
            position: absolute; font-size: 12px; font-weight: 900;
            background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 3px;
            color: #ffd966; border-left: 1px solid #ffb347;
            transform: translate(0, -50%); white-space: nowrap;
        }
        /* ЧАТ */
        #chat-win {
            position: fixed; bottom: 12px; left: 92px; right: 12px; height: 160px;
            background: rgba(0,0,0,0.95); border: 1px solid #2ecc71;
            z-index: 6000; display: none; flex-direction: column;
        }
        #chat-m { font-size: 11px; font-family: monospace; overflow-y: auto; padding: 6px; }
        .chat-message { margin-bottom: 4px; border-bottom: 1px solid #1e3a1e; padding: 4px 0; }
        .chat-name { font-weight: 900; margin-right: 8px; }
        #chatI { background: #0a0f0a; color: #c8ffb0; border: 1px solid #2e7d32; padding: 8px; }
        /* Маркер бойца */
        .player-marker-wrapper { display: flex; flex-direction: column; align-items: center; }
        .player-callsign { font-weight: 900; font-size: 13px; text-shadow: 1px 1px 0 #000; background: transparent; white-space: nowrap; margin-bottom: 2px; }
        .player-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; background: currentColor; }
        @media (max-width: 640px) { .side-panel { width: 70px; } .tool-btn { min-height: 52px; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="tactical-border">
        <div class="team-name">SCORPION</div>
        <input type="text" id="teamNameInput" class="auth-input" placeholder="КОМАНДА" maxlength="10">
        <input type="text" id="playerNameInput" class="auth-input" placeholder="ПОЗЫВНОЙ" maxlength="10">
        <input type="password" id="passwordInput" class="auth-input" placeholder="ПАРОЛЬ">
        <button onclick="login()" class="auth-btn">⚡ ВОЙТИ ⚡</button>
    </div>
</div>

<div class="side-panel" id="ui-panel">
    <div onclick="setTool('move')" id="b-move" class="tool-btn active"><b>🖐️</b><span>Рука</span></div>
    <div onclick="centerOnMe()" id="b-iam" class="tool-btn"><b>🎯</b><span>Я тут</span></div>
    <div onclick="setTool('enemy')" id="b-enemy" class="tool-btn"><b>💀</b><span>Враг</span></div>
    <div onclick="setTool('target')" id="b-target" class="tool-btn"><b>🚩</b><span>Цель</span></div>
    <div onclick="setTool('arrow')" id="b-arrow" class="tool-btn"><b>➡️</b><span>Удар</span></div>
    <div onclick="setTool('ruler')" id="b-ruler" class="tool-btn"><b>📏</b><span>Мерка</span></div>
    <div onclick="setTool('eraser')" id="b-eraser" class="tool-btn"><b>🧼</b><span>Стерка</span></div>
    <div onclick="deleteMyObjects()" class="tool-btn" style="color:#ffaa66;"><b>🗑️</b><span>Уд. мои</span></div>
    <div onclick="toggleChat()" class="tool-btn"><b>💬</b><span>Связь</span></div>
    <div onclick="setMapLayer('sat')" class="tool-btn"><b>🛰️</b><span>Спутник</span></div>
    <div onclick="setMapLayer('map')" class="tool-btn"><b>🗺️</b><span>Карта</span></div>
    <div onclick="forceExit()" class="tool-btn text-red-500"><b>🚪</b><span>Выход</span></div>
</div>

<div id="map"></div>
<div id="chat-win">
    <div id="chat-m" class="flex-1 overflow-y-auto"></div>
    <div class="flex p-1 bg-zinc-950 border-t border-green-800">
        <input id="chatI" class="flex-1 p-2 text-xs outline-none bg-black text-green-300" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" class="bg-green-800 px-3 ml-1 text-white font-bold">📡</button>
    </div>
</div>

<script>
    const socket = io({ transports: ['websocket', 'polling'] });
    let map, activeTool = 'move', currentUserName = '', currentTeam = '', currentUserColor = '#2ecc71';
    let playersMarkers = {};
    let tacticalLayers = {};
    let myObjectIds = new Set();
    let rulerTempPoints = [];
    let lastKnownCoords = { lat: 55.7558, lng: 37.6176 };
    let watchId = null, currentTileLayer = null;
    
    // Параметры сетки 20 метров
    const METER_TO_DEG = 1 / 111320;
    const GRID_STEP_METERS = 20;
    const GRID_STEP_DEG = GRID_STEP_METERS * METER_TO_DEG;
    const RUSSIAN_LETTERS = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split('');
    
    function getColumnLetter(idx) { return RUSSIAN_LETTERS[Math.abs(idx) % RUSSIAN_LETTERS.length]; }
    function getRowNumber(idx) { return Math.abs(idx) % 100; }
    function getRandomColor() { return `hsl(${Math.floor(Math.random() * 360)}, 80%, 60%)`; }
    
    function createPlayerIcon(name, colorHex) {
        const html = `<div class="player-marker-wrapper"><div class="player-callsign" style="color: ${colorHex};">${name}</div><div class="player-dot" style="background: ${colorHex};"></div></div>`;
        return L.divIcon({ html, iconSize: [90, 44], iconAnchor: [45, 34], className: 'player-clear-icon' });
    }
    
    // Стрелка с наконечником
    function drawArrowWithHead(start, end, color = '#ff5555') {
        const group = L.layerGroup();
        L.polyline([start, end], { color, weight: 4, opacity: 0.95 }).addTo(group);
        const angle = Math.atan2(end.lat - start.lat, end.lng - start.lng);
        const arrowSize = 0.00008;
        const leftAngle = angle + Math.PI * 0.8;
        const rightAngle = angle - Math.PI * 0.8;
        const leftTip = { lat: end.lat + Math.sin(leftAngle) * arrowSize, lng: end.lng + Math.cos(leftAngle) * arrowSize };
        const rightTip = { lat: end.lat + Math.sin(rightAngle) * arrowSize, lng: end.lng + Math.cos(rightAngle) * arrowSize };
        L.polygon([end, leftTip, rightTip], { color, weight: 2, fillColor: color, fillOpacity: 0.8 }).addTo(group);
        return group;
    }
    
    // СЕТКА (буквы сверху, цифры справа)
    function updateGrid() {
        if (!map) return;
        let container = document.getElementById('grid-labels-container');
        if (!container) { container = document.createElement('div'); container.id = 'grid-labels-container'; document.body.appendChild(container); }
        container.innerHTML = '';
        const zoom = map.getZoom();
        if (zoom < 16 || zoom > 21) return;
        const bounds = map.getBounds();
        const west = bounds.getWest(), east = bounds.getEast(), south = bounds.getSouth(), north = bounds.getNorth();
        const startCol = Math.floor(west / GRID_STEP_DEG);
        const endCol = Math.ceil(east / GRID_STEP_DEG);
        const startRow = Math.floor(south / GRID_STEP_DEG);
        const endRow = Math.ceil(north / GRID_STEP_DEG);
        
        for (let col = startCol; col <= endCol; col++) {
            const centerLng = (col + 0.5) * GRID_STEP_DEG;
            const pt = map.latLngToContainerPoint([north, centerLng]);
            if (pt.x < -50 || pt.x > window.innerWidth + 50) continue;
            const div = document.createElement('div');
            div.className = 'grid-top-label';
            div.style.left = pt.x + 'px';
            div.style.top = (pt.y - 8) + 'px';
            div.innerText = getColumnLetter(col);
            container.appendChild(div);
        }
        for (let row = startRow; row <= endRow; row++) {
            const centerLat = (row + 0.5) * GRID_STEP_DEG;
            const pt = map.latLngToContainerPoint([centerLat, east]);
            if (pt.y < 20 || pt.y > window.innerHeight - 20) continue;
            const div = document.createElement('div');
            div.className = 'grid-right-label';
            div.style.right = '12px';
            div.style.top = pt.y + 'px';
            div.innerText = getRowNumber(row);
            container.appendChild(div);
        }
        drawGridLines(west, east, south, north);
    }
    
    function drawGridLines(west, east, south, north) {
        if (window._gridLineLayer) map.removeLayer(window._gridLineLayer);
        const lineGroup = L.layerGroup();
        const startLng = Math.floor(west / GRID_STEP_DEG) * GRID_STEP_DEG;
        const endLng = startLng + Math.ceil((east - startLng) / GRID_STEP_DEG) * GRID_STEP_DEG;
        const startLat = Math.floor(south / GRID_STEP_DEG) * GRID_STEP_DEG;
        const endLat = startLat + Math.ceil((north - startLat) / GRID_STEP_DEG) * GRID_STEP_DEG;
        for (let lng = startLng; lng <= endLng; lng += GRID_STEP_DEG) {
            lineGroup.addLayer(L.polyline([[startLat, lng], [endLat, lng]], { color: '#40cc70', weight: 1, opacity: 0.3 }));
        }
        for (let lat = startLat; lat <= endLat; lat += GRID_STEP_DEG) {
            lineGroup.addLayer(L.polyline([[lat, startLng], [lat, endLng]], { color: '#40cc70', weight: 1, opacity: 0.3 }));
        }
        lineGroup.addTo(map);
        window._gridLineLayer = lineGroup;
    }
    
    // АВТОРИЗАЦИЯ (только команда, позывной, пароль)
    function login() {
        const team = document.getElementById('teamNameInput').value.trim().toUpperCase().slice(0,10);
        const player = document.getElementById('playerNameInput').value.trim().toUpperCase().slice(0,10);
        const pass = document.getElementById('passwordInput').value;
        if (!team || !player || !pass) { alert("Заполните все поля"); return; }
        currentTeam = team;
        currentUserName = player;
        // комната = название команды (все в одной комнате по названию команды)
        const room = team;
        socket.emit('join_room', { room, name: player, team, pass });
    }
    
    socket.on('login_success', (data) => {
        currentUserColor = data.color || getRandomColor();
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('map').style.visibility = 'visible';
        document.getElementById('ui-panel').style.display = 'flex';
        initMap();
        startGeo();
    });
    
    socket.on('login_failed', (err) => alert("Ошибка: " + (err?.reason || "неверный пароль или позывной занят")));
    
    function initMap() {
        if (map) return;
        map = L.map('map', { zoomControl: true, attributionControl: false, maxZoom: 22 }).setView([lastKnownCoords.lat, lastKnownCoords.lng], 18);
        currentTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);
        map.on('click', onMapClick);
        map.on('moveend zoomend', () => updateGrid());
        updateGrid();
        setTimeout(() => { map.invalidateSize(); updateGrid(); }, 200);
    }
    
    function startGeo() {
        if (!navigator.geolocation) return;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                lastKnownCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                socket.emit('gps_sync', { lat: lastKnownCoords.lat, lng: lastKnownCoords.lng, name: currentUserName });
                updateMyMarker(lastKnownCoords.lat, lastKnownCoords.lng);
                updateGrid();
            },
            (err) => console.warn("GPS ошибка", err),
            { enableHighAccuracy: true, maximumAge: 3000 }
        );
    }
    
    function updateMyMarker(lat, lng) {
        if (!map) return;
        if (!playersMarkers[currentUserName]) {
            playersMarkers[currentUserName] = L.marker([lat, lng], { icon: createPlayerIcon(currentUserName, currentUserColor), zIndexOffset: 1000 }).addTo(map);
        } else {
            playersMarkers[currentUserName].setLatLng([lat, lng]);
        }
    }
    
    // КНОПКА "Я ТУТ" - центрирует карту на моём местоположении
    function centerOnMe() {
        if (lastKnownCoords && map) {
            map.setView([lastKnownCoords.lat, lastKnownCoords.lng], map.getZoom());
            map.openPopup("📍 Вы здесь", [lastKnownCoords.lat, lastKnownCoords.lng], { autoClose: 1500 });
        } else {
            alert("Местоположение не определено");
        }
    }
    
    function updateRemotePlayer(name, lat, lng, color) {
        if (!map || name === currentUserName) return;
        if (!playersMarkers[name]) {
            playersMarkers[name] = L.marker([lat, lng], { icon: createPlayerIcon(name, color) }).addTo(map);
        } else {
            playersMarkers[name].setLatLng([lat, lng]);
            playersMarkers[name].setIcon(createPlayerIcon(name, color));
        }
    }
    
    function getTacticalIcon(type) {
        const sym = type === 'enemy' ? '💀' : (type === 'target' ? '🚩' : '📍');
        return L.divIcon({ html: `<div style="font-size:34px; filter:drop-shadow(2px 2px 0 black);">${sym}</div>`, iconSize: [34,34], iconAnchor: [17,30] });
    }
    
    function onMapClick(e) {
        if (!map) return;
        const { lat, lng } = e.latlng;
        if (activeTool === 'enemy' || activeTool === 'target') {
            const id = `${activeTool}_${Date.now()}_${Math.random()}`;
            socket.emit('new_obj', { id, type: activeTool, lat, lng, creator: currentUserName });
        } else if (activeTool === 'arrow' || activeTool === 'ruler') {
            rulerTempPoints.push({ lat, lng });
            if (rulerTempPoints.length === 2) {
                const id = `${activeTool}_${Date.now()}`;
                socket.emit('new_obj', { id, type: activeTool, start: rulerTempPoints[0], end: rulerTempPoints[1], creator: currentUserName });
                rulerTempPoints = [];
            } else {
                map.openPopup(`👉 Выберите вторую точку для ${activeTool === 'arrow' ? 'УДАРА' : 'ЛИНЕЙКИ'}`, [lat, lng], { autoClose: 1 });
            }
        } else if (activeTool === 'eraser') {
            map.openPopup("🧹 Режим стирания: кликните по объекту", [lat, lng], { autoClose: 1 });
        }
    }
    
    // ПРИЕМ ОБЪЕКТОВ
    socket.on('draw', (obj) => {
        if (!map) return;
        if (tacticalLayers[obj.id]) tacticalLayers[obj.id].forEach(l => map.removeLayer(l));
        let layers = [];
        if (obj.type === 'ruler') {
            const line = L.polyline([obj.start, obj.end], { color: '#ffcc55', weight: 4 });
            layers.push(line);
            const dist = map.distance(L.latLng(obj.start), L.latLng(obj.end));
            const txt = dist < 1000 ? `${Math.round(dist)} м` : `${(dist/1000).toFixed(1)} км`;
            const mid = { lat: (obj.start.lat+obj.end.lat)/2, lng: (obj.start.lng+obj.end.lng)/2 };
            const label = L.marker([mid.lat, mid.lng], { icon: L.divIcon({ html: `<div style="background:#000000bb; color:#ffee88; padding:4px 10px; border-radius:20px; font-weight:900;">📏 ${txt}</div>`, iconSize: [80,28] }) });
            layers.push(label);
        } 
        else if (obj.type === 'arrow') {
            const arrowGroup = drawArrowWithHead(obj.start, obj.end, '#ff6666');
            layers.push(arrowGroup);
            const strikeLabel = L.marker([obj.end.lat, obj.end.lng], { icon: L.divIcon({ html: `<div style="background:#5a1e1e; color:#ffb4b4; padding:2px 8px; border-radius:16px;">⚡ УДАР</div>`, iconAnchor: [0,20] }) });
            layers.push(strikeLabel);
        }
        else {
            const marker = L.marker([obj.lat, obj.lng], { icon: getTacticalIcon(obj.type) }).addTo(map);
            marker.on('click', () => { if (activeTool === 'eraser') socket.emit('delete_obj', obj.id); });
            if (obj.type === 'iam' && obj.name) marker.bindTooltip(`📍 ${obj.name}`);
            else if (obj.type === 'enemy') marker.bindTooltip('💀 ВРАГ');
            else if (obj.type === 'target') marker.bindTooltip('🎯 ЦЕЛЬ');
            layers.push(marker);
        }
        tacticalLayers[obj.id] = layers;
        if (obj.creator === currentUserName) myObjectIds.add(obj.id);
    });
    
    socket.on('remove_obj', (id) => {
        if (tacticalLayers[id]) { tacticalLayers[id].forEach(l => map?.removeLayer(l)); delete tacticalLayers[id]; myObjectIds.delete(id); }
    });
    
    function deleteMyObjects() {
        myObjectIds.forEach(id => { socket.emit('delete_obj', id); });
        myObjectIds.clear();
    }
    
    socket.on('player_move', (data) => {
        if (data.name !== currentUserName) updateRemotePlayer(data.name, data.lat, data.lng, data.color || getRandomColor());
    });
    socket.on('player_joined', (data) => {
        if (data.name !== currentUserName) updateRemotePlayer(data.name, lastKnownCoords.lat, lastKnownCoords.lng, data.color);
    });
    socket.on('existing_players', (players) => {
        players.forEach(p => { if(p.name !== currentUserName) updateRemotePlayer(p.name, lastKnownCoords.lat, lastKnownCoords.lng, p.color); });
    });
    
    // ЧАТ — корректная обработка объекта
    socket.on('receive_msg', (data) => {
        const chatDiv = document.getElementById('chat-m');
        let userName = '', msgText = '', msgColor = '#b9ffb9';
        if (typeof data === 'string') {
            const match = data.match(/^([^:]+):\s*(.+)$/);
            if (match) { userName = match[1]; msgText = match[2]; }
            else { msgText = data; }
        } else if (typeof data === 'object' && data.name && data.text) {
            userName = data.name;
            msgText = data.text;
            msgColor = data.color || '#b9ffb9';
        } else {
            msgText = String(data);
        }
        if (userName && playersMarkers[userName]) {
            const iconHtml = playersMarkers[userName].options.icon?.options?.html || '';
            const colorMatch = iconHtml.match(/color:\s*([^;]+)/);
            if (colorMatch) msgColor = colorMatch[1];
        } else if (userName === currentUserName) msgColor = currentUserColor;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message';
        if (userName) {
            msgDiv.innerHTML = `<span class="chat-name" style="color:${msgColor};">${userName}:</span> <span style="color:#dddddd;">${msgText}</span>`;
        } else {
            msgDiv.innerHTML = `<span style="color:#aaa;">${msgText}</span>`;
        }
        chatDiv.appendChild(msgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
    
    function sendMsg() {
        const input = document.getElementById('chatI');
        const text = input.value.trim();
        if (text) {
            socket.emit('chat_msg', { name: currentUserName, text: text, color: currentUserColor });
            input.value = '';
        }
    }
    
    function setTool(t) {
        activeTool = t;
        rulerTempPoints = [];
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        const btn = document.getElementById(`b-${t}`);
        if (btn) btn.classList.add('active');
        if (map) map.closePopup();
    }
    
    function setMapLayer(type) {
        if (currentTileLayer) map.removeLayer(currentTileLayer);
        const url = type === 'sat' ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        currentTileLayer = L.tileLayer(url, { maxZoom: 22 }).addTo(map);
        updateGrid();
    }
    
    function toggleChat() { const w = document.getElementById('chat-win'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; }
    function forceExit() { if(watchId) navigator.geolocation.clearWatch(watchId); socket.disconnect(); location.reload(); }
    
    window.addEventListener('resize', () => setTimeout(() => updateGrid(), 100));
    window.setTool = setTool; window.setMapLayer = setMapLayer; window.toggleChat = toggleChat;
    window.sendMsg = sendMsg; window.forceExit = forceExit; window.login = login;
    window.deleteMyObjects = deleteMyObjects; window.centerOnMe = centerOnMe;
</script>
</body>
</html>
