<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCORPION TACTICAL V19.2 — ПРОФИЛЬ СТРАЙКБОЛ | ЦВЕТНЫЕ БОЙЦЫ</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #000000;
            overflow: hidden;
            font-family: 'Courier New', 'Roboto Mono', monospace;
            color: #e0e0e0;
        }
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #0a0a0a;
            visibility: hidden;
        }
        /* АВТОРИЗАЦИЯ — ЧЁРНЫЙ СТИЛЬ */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .auth-input {
            width: 290px;
            background: #000000 !important;
            border: 2px solid #16a34a !important;
            color: #16ff6e !important;
            padding: 14px 18px;
            margin-bottom: 14px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 0px;
            outline: none;
            font-family: monospace;
        }
        .auth-input::placeholder {
            color: #3e7a4a;
        }
        .auth-btn {
            width: 290px;
            background: #16a34a;
            color: #000;
            padding: 16px;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            font-size: 1.25rem;
            letter-spacing: 2px;
            cursor: pointer;
            font-family: monospace;
        }
        /* БОКОВАЯ ПАНЕЛЬ */
        .side-panel {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: rgba(0, 0, 0, 0.96);
            border-right: 2px solid #16a34a;
            z-index: 5000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }
        .tool-btn {
            width: 100%;
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1f2a1b;
            color: #16a34a;
            cursor: pointer;
            transition: 0.1s;
            font-size: 10px;
            font-weight: bold;
        }
        .tool-btn b {
            font-size: 22px;
            margin-bottom: 4px;
        }
        .tool-btn.active {
            background: #14532d;
            color: #f0fff0;
            border-left: 3px solid #adff2f;
        }
        /* КООРДИНАТНАЯ СЕТКА */
        #grid-cont {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 950;
            display: none;
        }
        .g-t {
            position: absolute;
            color: #aaffcc;
            font-size: 13px;
            font-weight: 900;
            text-shadow: 1px 1px 0px #000, -1px -1px 0px #000;
            background: rgba(0,0,0,0.5);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            white-space: nowrap;
        }
        /* ЧАТ ОКНО */
        #chat-win {
            position: fixed;
            bottom: 12px;
            left: 92px;
            right: 12px;
            height: 150px;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid #16a34a;
            z-index: 6000;
            display: none;
            flex-direction: column;
            border-radius: 0;
            backdrop-filter: blur(4px);
        }
        #chat-m {
            font-size: 11px;
            font-family: monospace;
            color: #b9ffb9;
        }
        #chatI {
            background: #0c0c0c !important;
            color: #b0ffb0 !important;
            border: 1px solid #2e7d32;
            padding: 10px;
            font-size: 12px;
        }
        @media (max-width: 640px) {
            .side-panel { width: 70px; }
            .tool-btn { min-height: 58px; font-size: 8px; }
            .tool-btn b { font-size: 18px; }
            .g-t { font-size: 9px; }
        }
        /* СТИЛЬ ДЛЯ МАРКЕРА БОЙЦА: КРУЖОК ЗАКРАШЕН, ИМЯ СВЕРХУ БЕЗ ФОНА, ОДНИМ ЦВЕТОМ */
        .player-marker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
        }
        .player-callsign {
            font-weight: 900;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 #000, 0 0 4px black;
            background: transparent !important;
            padding: 0 2px;
            white-space: nowrap;
            margin-bottom: 2px;
        }
        .player-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.9);
            background: currentColor;
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="text-green-500 font-black text-4xl mb-6 tracking-widest">SCORPION</div>
    <div class="text-green-700 text-xs mb-4 italic">TACTICAL GRID | AIRSOFT PRO</div>
    <input id="roomIn" type="text" placeholder="КОД КОМНАТЫ" class="auth-input" value="SIR">
    <input id="nameIn" type="text" placeholder="ПОЗЫВНОЙ" class="auth-input">
    <input id="passIn" type="password" placeholder="ПАРОЛЬ" class="auth-input">
    <button onclick="login()" class="auth-btn mt-2">⚡ АКТИВАЦИЯ ⚡</button>
    <div class="text-[10px] text-green-800 mt-8 text-center px-4">ЗАЩИЩЕННЫЙ КАНАЛ | ЦВЕТОРАЗДЕЛЕНИЕ БОЙЦОВ</div>
</div>

<div id="grid-cont"></div>

<div class="side-panel" id="ui-panel">
    <div onclick="setTool('move')" id="b-move" class="tool-btn active"><b>🖐️</b><span>Рука</span></div>
    <div onclick="setTool('iam')" id="b-iam" class="tool-btn"><b>🎯</b><span>Я тут</span></div>
    <div onclick="setTool('enemy')" id="b-enemy" class="tool-btn"><b>💀</b><span>Враг</span></div>
    <div onclick="setTool('target')" id="b-target" class="tool-btn"><b>🚩</b><span>Цель</span></div>
    <div onclick="setTool('arrow')" id="b-arrow" class="tool-btn"><b>➡️</b><span>Удар</span></div>
    <div onclick="setTool('ruler')" id="b-ruler" class="tool-btn"><b>📏</b><span>Мерка</span></div>
    <div onclick="setTool('eraser')" id="b-eraser" class="tool-btn"><b>🧼</b><span>Стерка</span></div>
    <div onclick="toggleChat()" class="tool-btn"><b>💬</b><span>Связь</span></div>
    <div onclick="setMapLayer('sat')" class="tool-btn"><b>🛰️</b><span>Спутник</span></div>
    <div onclick="setMapLayer('map')" class="tool-btn"><b>🗺️</b><span>Карта</span></div>
    <div onclick="forceExit()" class="tool-btn text-red-500"><b>🚪</b><span>Выход</span></div>
</div>

<div id="map"></div>

<div id="chat-win">
    <div id="chat-m" class="flex-1 overflow-y-auto p-2 text-green-400 text-[11px] font-mono leading-relaxed"></div>
    <div class="flex p-1 bg-zinc-950 border-t border-green-800">
        <input id="chatI" class="flex-1 p-2 text-xs outline-none bg-black text-green-300" placeholder="Радиосвязь..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" class="bg-green-800 px-4 ml-1 text-white font-bold text-sm">📡</button>
    </div>
</div>

<script>
    // ---------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------------------
    const socket = io({ transports: ['websocket', 'polling'] });
    let map = null;
    let activeTool = 'move';
    let currentUserName = '';
    let currentUserColor = '#16a34a';
    let currentRoomId = '';
    
    // База игроков и тактических объектов
    let playersMarkers = {};      // key: позывной, value: L.marker
    let tacticalLayers = {};
    let rulerTempPoints = [];
    
    let lastKnownCoords = { lat: 55.751244, lng: 37.618423 };
    let watchId = null;
    let currentTileLayer = null;
    
    // Генерация яркого случайного цвета (но не слишком тёмного, без белого/чёрного)
    function getRandomPlayerColor() {
        const hue = Math.floor(Math.random() * 360);
        // насыщенность 70-90%, светлота 55-75% для ярких тонов, читаемых на карте
        return `hsl(${hue}, 80%, 65%)`;
    }
    
    // Функция создания иконки бойца с прозрачным фоном для позывного и цветным кругом
    // ПОЗЫВНОЙ БЕЗ ФОНА, сверху, цвет текста = цвет кружка. КРУЖОК ЗАКРАШЕН тем же цветом.
    function createPlayerIcon(name, colorHex) {
        // Для удобства используем DivIcon с HTML/CSS — фон имени полностью прозрачный, текст окрашен в цвет
        // Кружок закрашенный, белая обводка.
        const html = `
            <div class="player-marker-wrapper" style="display: flex; flex-direction: column; align-items: center;">
                <div class="player-callsign" style="color: ${colorHex}; background: transparent !important; font-weight: 900; font-size: 13px; text-shadow: 1px 1px 0px black, 0 0 3px black; letter-spacing: 0.5px; white-space: nowrap; margin-bottom: 2px;">${name}</div>
                <div class="player-dot" style="width: 16px; height: 16px; border-radius: 50%; background: ${colorHex}; border: 2px solid white; box-shadow: 0 0 4px black;"></div>
            </div>
        `;
        return L.divIcon({
            html: html,
            iconSize: [80, 40],
            iconAnchor: [40, 30],
            popupAnchor: [0, -28],
            className: 'custom-player-icon' // чистый класс без фона
        });
    }
    
    // ---------------------- АВТОРИЗАЦИЯ ----------------------
    function login() {
        const room = document.getElementById('roomIn').value.trim().toUpperCase();
        const rawName = document.getElementById('nameIn').value.trim().toUpperCase();
        const pass = document.getElementById('passIn').value;
        if (!room) { alert("Укажите код комнаты!"); return; }
        if (!rawName || rawName.length < 2) { alert("Введите позывной (минимум 2 символа)"); return; }
        if (!pass) { alert("Требуется пароль"); return; }
        currentUserName = rawName;
        currentRoomId = room;
        socket.emit('join_room', { room, name: currentUserName, pass });
    }
    
    socket.on('login_success', (data) => {
        // Цвет присваивается сервером или генерируется уникально. Сервер должен присылать color.
        // Если сервер присылает color — используем его, иначе генерируем сами, но для синхронизации важно, чтобы у каждого игрока был уникальный цвет.
        currentUserColor = data.color || getRandomPlayerColor();
        document.getElementById('auth-screen').style.display = 'none';
        const mapDiv = document.getElementById('map');
        mapDiv.style.visibility = 'visible';
        document.getElementById('ui-panel').style.display = 'flex';
        document.getElementById('grid-cont').style.display = 'block';
        initMapSystem();
        startGeoWatching();
    });
    
    socket.on('login_failed', (err) => {
        alert("ОШИБКА ДОСТУПА: " + (err?.reason || "Неверный пароль"));
    });
    
    // ---------------------- КАРТА ----------------------
    function initMapSystem() {
        if (map) return;
        map = L.map('map', { zoomControl: true, attributionControl: false, maxZoom: 22 }).setView([lastKnownCoords.lat, lastKnownCoords.lng], 18);
        currentTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);
        map.on('click', onMapClick);
        map.on('moveend zoomend', () => updateGridOverlay());
        map.on('zoomend', updateGridOverlay);
        updateGridOverlay();
        setTimeout(() => { if(map) map.invalidateSize(); updateGridOverlay(); }, 150);
    }
    
    // Геолокация
    function startGeoWatching() {
        if (!navigator.geolocation) return;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                const newLat = pos.coords.latitude;
                const newLng = pos.coords.longitude;
                lastKnownCoords = { lat: newLat, lng: newLng };
                socket.emit('gps_sync', { lat: newLat, lng: newLng, name: currentUserName });
                updateMyMarkerOnMap(newLat, newLng);
                if (map && map.getCenter().distanceTo(L.latLng(lastKnownCoords.lat, lastKnownCoords.lng)) > 150) {
                    map.setView([newLat, newLng], map.getZoom());
                }
                updateGridOverlay();
            },
            (err) => console.warn("GPS error", err),
            { enableHighAccuracy: true, maximumAge: 3000, timeout: 8000 }
        );
    }
    
    function updateMyMarkerOnMap(lat, lng) {
        if (!map) return;
        const key = currentUserName;
        // собственный маркер используем с текущим цветом
        if (!playersMarkers[key]) {
            const icon = createPlayerIcon(currentUserName, currentUserColor);
            const marker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
            playersMarkers[key] = marker;
        } else {
            playersMarkers[key].setLatLng([lat, lng]);
            // обновляем иконку если цвет поменялся? (но цвет фиксирован)
            const oldIcon = playersMarkers[key].options.icon;
            if (oldIcon && oldIcon.options.html) {
                const newIcon = createPlayerIcon(currentUserName, currentUserColor);
                playersMarkers[key].setIcon(newIcon);
            }
        }
    }
    
    // Отрисовка/обновление маркеров других игроков
    function updateRemotePlayer(name, lat, lng, color) {
        if (!map) return;
        if (name === currentUserName) return;
        if (!playersMarkers[name]) {
            const icon = createPlayerIcon(name, color);
            const marker = L.marker([lat, lng], { icon }).addTo(map);
            playersMarkers[name] = marker;
        } else {
            playersMarkers[name].setLatLng([lat, lng]);
            // обновляем цвет иконки, если цвет изменился
            const newIcon = createPlayerIcon(name, color);
            playersMarkers[name].setIcon(newIcon);
        }
    }
    
    // Тактические иконки (враг/цель/метка)
    function createTacticalIcon(type) {
        let symbol = '🎯';
        if (type === 'enemy') symbol = '💀';
        else if (type === 'target') symbol = '🚩';
        else if (type === 'iam') symbol = '📍';
        const bg = type === 'enemy' ? 'rgba(80,0,0,0.8)' : 'rgba(0,0,0,0.7)';
        return L.divIcon({
            html: `<div style="font-size:34px; filter: drop-shadow(2px 2px 0px black); text-align:center;">${symbol}</div>`,
            iconSize: [34, 34],
            iconAnchor: [17, 30],
            className: 'tac-icon'
        });
    }
    
    // Клик по карте в зависимости от инструмента
    function onMapClick(e) {
        if (!map || !activeTool) return;
        const { lat, lng } = e.latlng;
        if (activeTool === 'enemy' || activeTool === 'target') {
            const newId = `${activeTool}_${Date.now()}_${Math.random()}`;
            socket.emit('new_obj', { id: newId, type: activeTool, lat, lng });
        } 
        else if (activeTool === 'iam') {
            const newId = `marker_${Date.now()}`;
            socket.emit('new_obj', { id: newId, type: 'iam', lat, lng, name: currentUserName });
        }
        else if (activeTool === 'ruler' || activeTool === 'arrow') {
            rulerTempPoints.push({ lat, lng });
            if (rulerTempPoints.length === 2) {
                const lineId = `${activeTool}_line_${Date.now()}`;
                socket.emit('new_obj', { id: lineId, type: activeTool, start: rulerTempPoints[0], end: rulerTempPoints[1] });
                rulerTempPoints = [];
            } else {
                map.openPopup(`📏 Вторая точка для ${activeTool === 'arrow' ? 'вектора удара' : 'линейки'}`, [lat, lng], { autoClose: 1 });
            }
        }
        else if (activeTool === 'eraser') {
            map.openPopup("🧹 Режим стирания: кликните по врагу/цели", [lat, lng], { autoClose: 1 });
        }
    }
    
    // Получение тактических объектов
    socket.on('draw', (obj) => {
        if (!map) return;
        if (tacticalLayers[obj.id]) {
            tacticalLayers[obj.id].forEach(layer => map.removeLayer(layer));
        }
        const layersToAdd = [];
        if (obj.type === 'ruler' || obj.type === 'arrow') {
            const lineColor = obj.type === 'arrow' ? '#ff5555' : '#ffcc44';
            const weight = obj.type === 'arrow' ? 5 : 4;
            const polyline = L.polyline([obj.start, obj.end], { color: lineColor, weight, opacity: 0.9 }).addTo(map);
            layersToAdd.push(polyline);
            if (obj.type === 'ruler') {
                const distanceMeters = map.distance(L.latLng(obj.start), L.latLng(obj.end));
                const distText = distanceMeters < 1000 ? `${Math.round(distanceMeters)} м` : `${(distanceMeters / 1000).toFixed(1)} км`;
                const mid = { lat: (obj.start.lat + obj.end.lat)/2, lng: (obj.start.lng + obj.end.lng)/2 };
                const label = L.marker([mid.lat, mid.lng], {
                    icon: L.divIcon({ html: `<div style="background:#000c; color:#ffd966; padding:2px 7px; border-radius:20px; font-weight:bold; font-size:12px;">📏 ${distText}</div>`, iconSize: [70, 24] })
                }).addTo(map);
                layersToAdd.push(label);
            } else if (obj.type === 'arrow') {
                const arrowIcon = L.marker([obj.end.lat, obj.end.lng], {
                    icon: L.divIcon({ html: `<div style="background:#330000; color:#ff8888; padding:2px 5px; font-weight:bold;">⚡ УДАР</div>`, iconAnchor: [0, 20] })
                }).addTo(map);
                layersToAdd.push(arrowIcon);
            }
        } else {
            const marker = L.marker([obj.lat, obj.lng], { icon: createTacticalIcon(obj.type) }).addTo(map);
            marker.on('click', (ev) => {
                if (activeTool === 'eraser') {
                    socket.emit('delete_obj', obj.id);
                    L.DomEvent.stopPropagation(ev);
                }
            });
            if (obj.type === 'iam' && obj.name) marker.bindTooltip(`${obj.name} отметка`, { sticky: true });
            else if (obj.type === 'enemy') marker.bindTooltip('💀 НЕПРИЯТЕЛЬ', { sticky: true });
            else if (obj.type === 'target') marker.bindTooltip('🚩 ЦЕЛЬ', { sticky: true });
            layersToAdd.push(marker);
        }
        tacticalLayers[obj.id] = layersToAdd;
    });
    
    socket.on('remove_obj', (id) => {
        if (tacticalLayers[id]) {
            tacticalLayers[id].forEach(layer => map?.removeLayer(layer));
            delete tacticalLayers[id];
        }
    });
    
    // Обновление позиций других игроков с цветом (сервер присылает color)
    socket.on('player_move', (data) => {
        if (!map) return;
        const { name, lat, lng, color } = data;
        // Для удаленных игроков используем цвет, присланный сервером (гарантированно уникальный)
        if (name !== currentUserName) {
            updateRemotePlayer(name, lat, lng, color || getRandomPlayerColor());
        }
    });
    
    // ЧАТ
    socket.on('receive_msg', (msg) => {
        const chatDiv = document.getElementById('chat-m');
        chatDiv.innerHTML += `<div class="border-b border-green-800 py-1">📡 ${msg}</div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
    
    // КООРДИНАТНАЯ СЕТКА (буквы/цифры) airsoft стиль
    function updateGridOverlay() {
        const container = document.getElementById('grid-cont');
        if (!container || !map) return;
        container.innerHTML = '';
        const zoom = map.getZoom();
        if (zoom < 16) return;
        const bounds = map.getBounds();
        const step = 0.0002;
        const letters = "АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЩЭЮЯ";
        for (let lng = Math.floor(bounds.getWest() / step) * step; lng <= bounds.getEast(); lng += step) {
            const point = map.latLngToContainerPoint([bounds.getNorth(), lng]);
            if (point.x < 60 || point.x > window.innerWidth - 30) continue;
            const idx = Math.abs(Math.round(lng / step)) % letters.length;
            const char = letters[idx] || "?";
            const div = document.createElement('div');
            div.className = 'g-t';
            div.style.left = point.x + 'px';
            div.style.top = '14px';
            div.innerText = char;
            container.appendChild(div);
        }
        for (let lat = Math.floor(bounds.getSouth() / step) * step; lat <= bounds.getNorth(); lat += step) {
            const point = map.latLngToContainerPoint([lat, bounds.getWest()]);
            if (point.y < 30 || point.y > window.innerHeight - 30) continue;
            const num = Math.abs(Math.round(lat / step)) % 100;
            const div = document.createElement('div');
            div.className = 'g-t';
            div.style.right = '18px';
            div.style.top = point.y + 'px';
            div.innerText = num;
            container.appendChild(div);
        }
    }
    
    // Утилиты панели
    function setTool(toolName) {
        activeTool = toolName;
        rulerTempPoints = [];
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`b-${toolName}`);
        if (activeBtn) activeBtn.classList.add('active');
        if (map) map.closePopup();
    }
    
    function setMapLayer(type) {
        if (!map) return;
        if (currentTileLayer) map.removeLayer(currentTileLayer);
        let url = type === 'sat' 
            ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
            : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        currentTileLayer = L.tileLayer(url, { maxZoom: 22 }).addTo(map);
        updateGridOverlay();
