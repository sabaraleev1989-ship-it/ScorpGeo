<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCORPION TACTICAL — КВАДРАТНАЯ СЕТКА | СТРАЙКБОЛ</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: #0a0c0a;
            overflow: hidden;
            font-family: 'Courier New', 'Roboto Mono', 'Monaco', monospace;
        }
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #1a1e1a;
            visibility: hidden;
        }
        /* ТАКТИЧЕСКОЕ ОФОРМЛЕНИЕ ЭКРАНА ВХОДА */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: radial-gradient(circle at 20% 30%, #0b1f0b, #010101);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(34, 197, 94, 0.3);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 0 4px #1a3f1a;
        }
        .tactical-border {
            background: rgba(0, 0, 0, 0.75);
            padding: 2rem 2rem 2.5rem;
            border: 1px solid #2ecc71;
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.3);
            width: 90%;
            max-width: 360px;
            text-align: center;
        }
        .team-name {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #d4ff00;
            text-shadow: 0 0 8px #2e8b57, 0 0 2px #000;
            margin-bottom: 1.5rem;
            word-break: break-word;
            font-family: monospace;
            background: #00000066;
            padding: 6px 12px;
            border-left: 4px solid #2ecc71;
        }
        .auth-input {
            width: 100%;
            background: #030803 !important;
            border: 1.5px solid #2ecc71 !important;
            color: #b3ffcf !important;
            padding: 14px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 0px;
            outline: none;
            font-family: monospace;
        }
        .auth-input::placeholder {
            color: #3f724a;
            font-weight: normal;
        }
        .auth-btn {
            width: 100%;
            background: #1f5f2f;
            color: #f0ffe0;
            padding: 16px;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            font-size: 1.25rem;
            letter-spacing: 3px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.2s;
            margin-top: 8px;
            border-bottom: 2px solid #8bc34a;
        }
        .auth-btn:active {
            background: #0b3b1a;
            transform: scale(0.97);
        }
        /* БОКОВАЯ ПАНЕЛЬ */
        .side-panel {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: rgba(0, 0, 0, 0.95);
            border-right: 2px solid #2ecc71;
            z-index: 5000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }
        .tool-btn {
            width: 100%;
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1f3a1f;
            color: #2ecc71;
            cursor: pointer;
            transition: 0.08s linear;
            font-size: 10px;
            font-weight: bold;
            font-family: monospace;
        }
        .tool-btn b { font-size: 22px; margin-bottom: 4px; }
        .tool-btn.active { background: #14532d; color: #f0fff0; border-left: 3px solid #adff2f; }
        /* СЕТКА: пустые квадраты, буквы сверху, цифры справа */
        .grid-labels-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 950;
        }
        .grid-top-label {
            position: absolute;
            font-size: 12px;
            font-weight: 900;
            font-family: monospace;
            text-shadow: 1px 1px 0 #000;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 2px;
            color: #ccffaa;
            border-bottom: 1px solid #5eff3b;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            z-index: 960;
            letter-spacing: 1px;
        }
        .grid-right-label {
            position: absolute;
            font-size: 12px;
            font-weight: 900;
            font-family: monospace;
            text-shadow: 1px 1px 0 #000;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 2px;
            color: #ffd966;
            border-left: 1px solid #ffb347;
            white-space: nowrap;
            transform: translate(0, -50%);
            z-index: 960;
        }
        /* Чат */
        #chat-win {
            position: fixed;
            bottom: 12px;
            left: 92px;
            right: 12px;
            height: 150px;
            background: rgba(0, 0, 0, 0.94);
            border: 1px solid #2ecc71;
            z-index: 6000;
            display: none;
            flex-direction: column;
            border-radius: 0;
        }
        #chat-m { font-size: 11px; font-family: monospace; color: #bef5b0; overflow-y: auto; padding: 8px; }
        #chatI { background: #0a0f0a; color: #c8ffb0; border: 1px solid #2e7d32; padding: 10px; }
        /* Маркер бойца: цветной круг + имя цветное */
        .player-marker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 1px 2px black);
        }
        .player-callsign {
            font-weight: 900;
            font-size: 13px;
            font-family: monospace;
            text-shadow: 1px 1px 0 #000;
            background: transparent;
            white-space: nowrap;
            margin-bottom: 2px;
        }
        .player-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
            background: currentColor;
            box-shadow: 0 0 5px black;
        }
        @media (max-width: 640px) {
            .side-panel { width: 70px; }
            .tool-btn { min-height: 58px; font-size: 8px; }
            .tool-btn b { font-size: 18px; }
            .grid-top-label, .grid-right-label { font-size: 8px; padding: 1px 4px; }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="tactical-border">
        <div class="team-name" id="teamNameDisplay">БОЕВАЯ ГРУППА</div>
        <input type="text" id="teamNameInput" class="auth-input" placeholder="НАЗВАНИЕ КОМАНДЫ (до 10 знаков)" maxlength="10">
        <input type="text" id="roomCodeInput" class="auth-input" placeholder="КОД КОМНАТЫ (до 10 знаков)" maxlength="10">
        <input type="text" id="playerNameInput" class="auth-input" placeholder="ПОЗЫВНОЙ (до 10 знаков)" maxlength="10">
        <input type="password" id="passwordInput" class="auth-input" placeholder="ПАРОЛЬ">
        <button onclick="login()" class="auth-btn">⚡ ВОЙТИ В СЕТЬ ⚡</button>
        <div class="text-[9px] text-green-700 mt-4">ЗАЩИЩЕННЫЙ КАНАЛ • СЕТКА 20x20м</div>
    </div>
</div>

<div class="side-panel" id="ui-panel">
    <div onclick="setTool('move')" id="b-move" class="tool-btn active"><b>🖐️</b><span>Рука</span></div>
    <div onclick="setTool('iam')" id="b-iam" class="tool-btn"><b>🎯</b><span>Я тут</span></div>
    <div onclick="setTool('enemy')" id="b-enemy" class="tool-btn"><b>💀</b><span>Враг</span></div>
    <div onclick="setTool('target')" id="b-target" class="tool-btn"><b>🚩</b><span>Цель</span></div>
    <div onclick="setTool('arrow')" id="b-arrow" class="tool-btn"><b>➡️</b><span>Удар</span></div>
    <div onclick="setTool('ruler')" id="b-ruler" class="tool-btn"><b>📏</b><span>Мерка</span></div>
    <div onclick="setTool('eraser')" id="b-eraser" class="tool-btn"><b>🧼</b><span>Стерка</span></div>
    <div onclick="toggleChat()" class="tool-btn"><b>💬</b><span>Связь</span></div>
    <div onclick="setMapLayer('sat')" class="tool-btn"><b>🛰️</b><span>Спутник</span></div>
    <div onclick="setMapLayer('map')" class="tool-btn"><b>🗺️</b><span>Карта</span></div>
    <div onclick="forceExit()" class="tool-btn text-red-500"><b>🚪</b><span>Выход</span></div>
</div>

<div id="map"></div>
<div id="chat-win">
    <div id="chat-m" class="flex-1 overflow-y-auto p-2 text-green-400 text-xs"></div>
    <div class="flex p-1 bg-zinc-950 border-t border-green-800">
        <input id="chatI" class="flex-1 p-2 text-xs outline-none bg-black text-green-300" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" class="bg-green-800 px-3 ml-1 text-white font-bold">📡</button>
    </div>
</div>

<script>
    const socket = io({ transports: ['websocket', 'polling'] });
    let map, activeTool = 'move', currentUserName = '', currentTeam = '', currentRoom = '', currentUserColor = '#2ecc71';
    let playersMarkers = {};
    let tacticalLayers = {};
    let rulerTempPoints = [];
    let lastKnownCoords = { lat: 55.7558, lng: 37.6176 };
    let watchId = null, currentTileLayer = null;
    
    // Параметры сетки 20 метров (шаг 20 м в градусах)
    const METER_TO_DEG = 1 / 111320;
    const GRID_STEP_METERS = 20;
    const GRID_STEP_DEG = GRID_STEP_METERS * METER_TO_DEG;
    const RUSSIAN_LETTERS = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split('');
    
    function getColumnLetter(idx) {
        const normalIdx = Math.abs(idx) % RUSSIAN_LETTERS.length;
        return RUSSIAN_LETTERS[normalIdx];
    }
    
    function getRowNumber(idx) {
        return Math.abs(idx) % 100;
    }
    
    // Генерация яркого цвета игрока
    function getRandomColor() {
        return `hsl(${Math.floor(Math.random() * 360)}, 85%, 60%)`;
    }
    
    // Иконка бойца: позывной цветной над кружком, без фона
    function createPlayerIcon(name, colorHex) {
        const html = `
            <div class="player-marker-wrapper">
                <div class="player-callsign" style="color: ${colorHex};">${name}</div>
                <div class="player-dot" style="background: ${colorHex};"></div>
            </div>
        `;
        return L.divIcon({ html, iconSize: [90, 44], iconAnchor: [45, 34], className: 'player-clear-icon' });
    }
    
    // ========== СЕТКА: ТОЛЬКО БУКВЫ СВЕРХУ (над колонками) И ЦИФРЫ СПРАВА (от строк) ==========
    function updateGrid() {
        if (!map) return;
        const containerId = 'grid-labels-container';
        let container = document.getElementById(containerId);
        if (!container) {
            container = document.createElement('div');
            container.id = containerId;
            container.className = 'grid-labels-container';
            document.body.appendChild(container);
        }
        container.innerHTML = '';
        
        const zoom = map.getZoom();
        // Сетка исчезает при зуме меньше 16 и больше 21 (избегаем каши)
        if (zoom < 16 || zoom > 21) return;
        
        const bounds = map.getBounds();
        const west = bounds.getWest();
        const east = bounds.getEast();
        const south = bounds.getSouth();
        const north = bounds.getNorth();
        
        // Определяем диапазон колонок (по долготе) и строк (по широте) для отображения подписей
        const startCol = Math.floor(west / GRID_STEP_DEG);
        const endCol = Math.ceil(east / GRID_STEP_DEG);
        const startRow = Math.floor(south / GRID_STEP_DEG);
        const endRow = Math.ceil(north / GRID_STEP_DEG);
        
        // 1. БУКВЫ СВЕРХУ (над каждым столбцом) — располагаем по центру верхней границы квадрата
        for (let col = startCol; col <= endCol; col++) {
            const centerLng = (col + 0.5) * GRID_STEP_DEG;
            // верхняя точка колонки: широта северной границы + небольшой отступ, но чтобы было сверху квадрата
            const topLat = north;
            const screenPoint = map.latLngToContainerPoint([topLat, centerLng]);
            if (screenPoint.x < 0 || screenPoint.x > window.innerWidth + 100) continue;
            const letter = getColumnLetter(col);
            const labelDiv = document.createElement('div');
            labelDiv.className = 'grid-top-label';
            labelDiv.style.left = screenPoint.x + 'px';
            labelDiv.style.top = (screenPoint.y - 8) + 'px';
            labelDiv.innerText = letter;
            container.appendChild(labelDiv);
        }
        
        // 2. ЦИФРЫ СПРАВА (справа от каждой строки) — y по центру клетки, привязка к правому краю экрана
        for (let row = startRow; row <= endRow; row++) {
            const centerLat = (row + 0.5) * GRID_STEP_DEG;
            const rightLng = east;
            const screenPoint = map.latLngToContainerPoint([centerLat, rightLng]);
            if (screenPoint.y < 20 || screenPoint.y > window.innerHeight - 20) continue;
            const rowNum = getRowNumber(row);
            const labelDiv = document.createElement('div');
            labelDiv.className = 'grid-right-label';
            labelDiv.style.right = '12px';
            labelDiv.style.top = screenPoint.y + 'px';
            labelDiv.innerText = rowNum.toString();
            container.appendChild(labelDiv);
        }
        
        // При желании так же рисуем линии сетки (тонкие, пустые квадраты) — для удобства, чтобы квадраты визуально были пустыми
        drawEmptyGridLines(west, east, south, north);
    }
    
    function drawEmptyGridLines(west, east, south, north) {
        if (window._gridLineLayer) {
            map.removeLayer(window._gridLineLayer);
        }
        const lineGroup = L.layerGroup();
        const startLng = Math.floor(west / GRID_STEP_DEG) * GRID_STEP_DEG;
        const endLng = startLng + Math.ceil((east - startLng) / GRID_STEP_DEG) * GRID_STEP_DEG;
        const startLat = Math.floor(south / GRID_STEP_DEG) * GRID_STEP_DEG;
        const endLat = startLat + Math.ceil((north - startLat) / GRID_STEP_DEG) * GRID_STEP_DEG;
        
        for (let lng = startLng; lng <= endLng; lng += GRID_STEP_DEG) {
            const line = L.polyline([[startLat, lng], [endLat, lng]], { color: '#40cc70', weight: 1.2, opacity: 0.35, interactive: false });
            lineGroup.addLayer(line);
        }
        for (let lat = startLat; lat <= endLat; lat += GRID_STEP_DEG) {
            const line = L.polyline([[lat, startLng], [lat, endLng]], { color: '#40cc70', weight: 1.2, opacity: 0.35, interactive: false });
            lineGroup.addLayer(line);
        }
        lineGroup.addTo(map);
        window._gridLineLayer = lineGroup;
    }
    
    // АВТОРИЗАЦИЯ
    function login() {
        const team = document.getElementById('teamNameInput').value.trim().toUpperCase().slice(0,10);
        const room = document.getElementById('roomCodeInput').value.trim().toUpperCase().slice(0,10);
        const player = document.getElementById('playerNameInput').value.trim().toUpperCase().slice(0,10);
        const pass = document.getElementById('passwordInput').value;
        if (!team) { alert("Введите название команды (до 10 знаков)"); return; }
        if (!room) { alert("Введите код комнаты"); return; }
        if (!player) { alert("Введите позывной"); return; }
        if (!pass) { alert("Введите пароль"); return; }
        currentTeam = team;
        currentUserName = player;
        currentRoom = room;
        document.getElementById('teamNameDisplay').innerText = team;
        socket.emit('join_room', { room, name: player, team: team, pass });
    }
    
    socket.on('login_success', (data) => {
        currentUserColor = data.color || getRandomColor();
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('map').style.visibility = 'visible';
        document.getElementById('ui-panel').style.display = 'flex';
        initMap();
        startGeolocation();
    });
    
    socket.on('login_failed', (err) => alert("Ошибка входа: " + (err?.reason || "неверный пароль или комната занята")));
    
    function initMap() {
        if (map) return;
        map = L.map('map', { zoomControl: true, attributionControl: false, maxZoom: 22 }).setView([lastKnownCoords.lat, lastKnownCoords.lng], 18);
        currentTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);
        map.on('click', onMapClick);
        map.on('moveend zoomend', () => updateGrid());
        map.on('zoomend', () => updateGrid());
        updateGrid();
        setTimeout(() => { map.invalidateSize(); updateGrid(); }, 200);
    }
    
    function startGeolocation() {
        if (!navigator.geolocation) return;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                lastKnownCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                socket.emit('gps_sync', { lat: lastKnownCoords.lat, lng: lastKnownCoords.lng, name: currentUserName });
                updateMyMarker(lastKnownCoords.lat, lastKnownCoords.lng);
                if (map && map.getCenter().distanceTo(L.latLng(lastKnownCoords)) > 180) {
                    map.setView([lastKnownCoords.lat, lastKnownCoords.lng], map.getZoom());
                }
                updateGrid();
            },
            (err) => console.warn("GPS error", err),
            { enableHighAccuracy: true, maximumAge: 3000, timeout: 8000 }
        );
    }
    
    function updateMyMarker(lat, lng) {
        if (!map) return;
        if (!playersMarkers[currentUserName]) {
            playersMarkers[currentUserName] = L.marker([lat, lng], { icon: createPlayerIcon(currentUserName, currentUserColor), zIndexOffset: 1000 }).addTo(map);
        } else {
            playersMarkers[currentUserName].setLatLng([lat, lng]);
        }
    }
    
    function updateRemotePlayer(name, lat, lng, color) {
        if (!map || name === currentUserName) return;
        if (!playersMarkers[name]) {
            playersMarkers[name] = L.marker([lat, lng], { icon: createPlayerIcon(name, color) }).addTo(map);
        } else {
            playersMarkers[name].setLatLng([lat, lng]);
            playersMarkers[name].setIcon(createPlayerIcon(name, color));
        }
    }
    
    // Тактические иконки
    function getTacticalIcon(type) {
        let symbol = type === 'enemy' ? '💀' : (type === 'target' ? '🚩' : '📍');
        return L.divIcon({ html: `<div style="font-size:34px; filter:drop-shadow(2px 2px 0 black);">${symbol}</div>`, iconSize: [34,34], iconAnchor: [17,30] });
    }
    
    function onMapClick(e) {
        if (!map) return;
        const { lat, lng } = e.latlng;
        if (activeTool === 'enemy' || activeTool === 'target') {
            socket.emit('new_obj', { id: `${activeTool}_${Date.now()}_${Math.random()}`, type: activeTool, lat, lng });
        } else if (activeTool === 'iam') {
            socket.emit('new_obj', { id: `mark_${Date.now()}`, type: 'iam', lat, lng, name: currentUserName });
        } else if (activeTool === 'ruler' || activeTool === 'arrow') {
            rulerTempPoints.push({ lat, lng });
            if (rulerTempPoints.length === 2) {
                socket.emit('new_obj', { id: `${activeTool}_${Date.now()}`, type: activeTool, start: rulerTempPoints[0], end: rulerTempPoints[1] });
                rulerTempPoints = [];
            } else {
                map.openPopup(`👉 Выберите вторую точку для ${activeTool === 'arrow' ? 'УДАРА' : 'ЛИНЕЙКИ'}`, [lat, lng], { autoClose: 1 });
            }
        } else if (activeTool === 'eraser') {
            map.openPopup("🧹 Стерка: кликните по метке, врагу, цели или линии", [lat, lng], { autoClose: 1 });
        }
    }
    
    socket.on('draw', (obj) => {
        if (!map) return;
        if (tacticalLayers[obj.id]) {
            tacticalLayers[obj.id].forEach(l => map.removeLayer(l));
        }
        const layers = [];
        if (obj.type === 'ruler' || obj.type === 'arrow') {
            const color = obj.type === 'arrow' ? '#ff6666' : '#ffcc55';
            const weight = obj.type === 'arrow' ? 5 : 4;
            const line = L.polyline([obj.start, obj.end], { color, weight, opacity: 0.9 }).addTo(map);
            layers.push(line);
            if (obj.type === 'ruler') {
                const dist = map.distance(L.latLng(obj.start), L.latLng(obj.end));
                const distanceText = dist < 1000 ? `${Math.round(dist)} м` : `${(dist/1000).toFixed(1)} км`;
                const mid = { lat: (obj.start.lat+obj.end.lat)/2, lng: (obj.start.lng+obj.end.lng)/2 };
                const label = L.marker([mid.lat, mid.lng], {
                    icon: L.divIcon({ html: `<div style="background:#000000bb; color:#ffee88; padding:4px 10px; border-radius:30px; font-weight:900; font-size:13px; border:1px solid #ffcc44;">📏 ${distanceText}</div>`, iconSize: [90, 30] })
                }).addTo(map);
                layers.push(label);
            } else if (obj.type === 'arrow') {
                const strikeLabel = L.marker([obj.end.lat, obj.end.lng], {
                    icon: L.divIcon({ html: `<div style="background:#5a1e1e; color:#ffaaaa; padding:3px 8px; font-weight:bold; border-radius:20px;">⚡ УДАР</div>`, iconAnchor: [0, 20] })
                }).addTo(map);
                layers.push(strikeLabel);
            }
        } else {
            const marker = L.marker([obj.lat, obj.lng], { icon: getTacticalIcon(obj.type) }).addTo(map);
            marker.on('click', () => { if (activeTool === 'eraser') socket.emit('delete_obj', obj.id); });
            if (obj.type === 'iam' && obj.name) marker.bindTooltip(`📍 ${obj.name}`, { sticky: true });
            else if (obj.type === 'enemy') marker.bindTooltip('💀 ВРАГ', { sticky: true });
            else if (obj.type === 'target') marker.bindTooltip('🎯 ЦЕЛЬ', { sticky: true });
            layers.push(marker);
        }
        tacticalLayers[obj.id] = layers;
    });
    
    socket.on('remove_obj', (id) => {
        if (tacticalLayers[id]) {
            tacticalLayers[id].forEach(layer => map?.removeLayer(layer));
            delete tacticalLayers[id];
        }
    });
    
    socket.on('player_move', (data) => {
        if (data.name !== currentUserName) updateRemotePlayer(data.name, data.lat, data.lng, data.color || getRandomColor());
    });
    
    socket.on('receive_msg', (msg) => {
        const chatDiv = document.getElementById('chat-m');
        chatDiv.innerHTML += `<div class="border-b border-green-700 py-1">📡 ${msg}</div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
    
    function setTool(t) {
        activeTool = t;
        rulerTempPoints = [];
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`b-${t}`)?.classList.add('active');
        if (map) map.closePopup();
    }
    
    function setMapLayer(type) {
        if (!map) return;
        if (currentTileLayer) map.removeLayer(currentTileLayer);
        const url = type === 'sat' ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        currentTileLayer = L.tileLayer(url, { maxZoom: 22 }).addTo(map);
        updateGrid();
    }
    
    function toggleChat() { const w = document.getElementById('chat-win'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; }
    function sendMsg() { const i = document.getElementById('chatI'); if(i.value) { socket.emit('chat_msg', `[${currentTeam}] ${currentUserName}: ${i.value}`); i.value = ''; } }
    function forceExit() { if(watchId) navigator.geolocation.clearWatch(watchId); socket.disconnect(); location.reload(); }
    
    window.addEventListener('resize', () => setTimeout(() => updateGrid(), 100));
    window.setTool = setTool; window.setMapLayer = setMapLayer; window.toggleChat = toggleChat; window.sendMsg = sendMsg; window.forceExit = forceExit; window.login = login;
</script>
