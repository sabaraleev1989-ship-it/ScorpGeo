<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 4.0 | STABLE RADIO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background: #020617; font-family: 'Roboto Condensed', sans-serif; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .leaflet-control-attribution { display: none !important; }

        /* Панель */
        .gt-panel { background: #0f172a; border-right: 2px solid #1e293b; z-index: 5000; width: 64px; }
        .gt-btn { width: 64px; height: 58px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; color: #64748b; position: relative; cursor: pointer; }
        .gt-btn.active { background: #2563eb; color: white; }
        
        /* Счетчик сообщений */
        #badge { position: absolute; top: 8px; right: 8px; background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: bold; display: none; align-items: center; justify-content: center; border: 2px solid #0f172a; z-index: 10; }

        /* Всплывающее сообщение (Пуш) */
        #push-notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; display: flex; flex-direction: column; gap: 5px; }
        .push-msg { background: rgba(37, 99, 235, 0.95); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); animation: fadeInOut 3s forwards; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(-20px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); } }

        /* Окно радиоканала */
        #chat-window { position: fixed; bottom: 85px; left: 75px; width: 320px; height: 400px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; z-index: 9000; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .chat-header { padding: 12px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; border-radius: 10px 10px 0 0; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #020617; }
        .msg-line { font-size: 14px; color: #cbd5e1; line-height: 1.4; word-break: break-all; }
        .msg-line b { color: #3b82f6; text-transform: uppercase; margin-right: 5px; }

        /* Инпуты */
        .chat-input-area { padding: 10px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 8px; }
        #chat-in { flex: 1; background: #000; border: 1px solid #475569; border-radius: 6px; padding: 8px; color: white; outline: none; }
        #chat-in:focus { border-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="push-notif"></div>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-950 p-6">
        <div class="bg-slate-900 border-2 border-slate-700 w-full max-w-sm rounded-xl p-8 space-y-6">
            <h1 class="text-3xl font-black text-center text-white italic tracking-tighter">SCORP<span class="text-blue-500">GEO</span></h1>
            <input id="roomID" type="text" placeholder="ID СЕТИ" class="w-full bg-black border border-slate-600 p-4 rounded text-white text-center uppercase outline-none">
            <input id="callsign" type="text" placeholder="ПОЗЫВНОЙ" class="w-full bg-black border border-slate-600 p-4 rounded text-white text-center uppercase outline-none">
            <button onclick="connect()" class="w-full bg-blue-600 text-white font-bold py-4 rounded uppercase">Подключиться</button>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header text-white font-bold text-sm">
            <span>📡 РАДИОКАНАЛ</span>
            <button onclick="toggleChat()" class="text-slate-400 hover:text-white text-xl">×</button>
        </div>
        <div id="chat-msgs"></div>
        <div class="chat-input-area">
            <input id="chat-in" type="text" placeholder="Введите сообщение..." autocomplete="off">
            <button onclick="sendMsg()" class="bg-blue-600 px-4 py-2 rounded text-white font-bold">➔</button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed left-0 top-0 bottom-0 gt-panel flex flex-col">
            <button onclick="setMode('move')" id="btn-move" class="gt-btn active">🖐️</button>
            <button onclick="setMode('enemy')" id="btn-enemy" class="gt-btn">💀</button>
            <button onclick="setMode('point')" id="btn-point" class="gt-btn">🚩</button>
            <button onclick="setMode('arrow')" id="btn-arrow" class="gt-btn">➡️</button>
            
            <button onclick="toggleChat()" class="gt-btn">
                💬
                <div id="badge">0</div>
            </button>
            
            <button onclick="undo()" class="gt-btn">↩️</button>
            <button onclick="clearAll()" class="gt-btn text-red-500">🗑️</button>
            
            <div class="mt-auto">
                <button onclick="switchMap('sat')" class="gt-btn text-[10px] font-bold">SAT</button>
                <button onclick="switchMap('light')" class="gt-btn text-[10px] font-bold text-blue-400">MAP</button>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myInfo = { roomID: '', callsign: '', lat: 0, lng: 0 };
        let isChatOpen = false, unreadCount = 0;

        function connect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            if(myInfo.roomID && myInfo.callsign) socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            const light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
            map = L.map('map', { zoomControl: false, attributionControl: false, layers: [light] }).setView([43.58, 39.72], 15);
            // Остальная логика отрисовки (как в версии 3.9) остается тут...
        }

        // --- ЛОГИКА РАДИОКАНАЛА ---

        function toggleChat() {
            const win = document.getElementById('chat-window');
            isChatOpen = !isChatOpen;
            win.style.display = isChatOpen ? 'flex' : 'none';
            
            if(isChatOpen) {
                unreadCount = 0;
                updateBadge();
                // Автофокус на ввод при открытии
                setTimeout(() => document.getElementById('chat-in').focus(), 100);
            }
        }

        function sendMsg() {
            const input = document.getElementById('chat-in');
            const text = input.value.trim();
            if(text) {
                socket.emit('chat_msg', { user: myInfo.callsign, text: text });
                input.value = '';
            }
        }

        // Слушаем клавишу Enter
        document.getElementById('chat-in').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMsg();
        });

        socket.on('receive_msg', (data) => {
            // 1. Добавляем в историю чата (всегда)
            addMessageToBox(data.user, data.text);

            // 2. Если чат закрыт — показываем пуш и обновляем счетчик
            if(!isChatOpen) {
                showPush(data.user, data.text);
                unreadCount++;
                updateBadge();
            }
        });

        function addMessageToBox(user, text) {
            const box = document.getElementById('chat-msgs');
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.innerHTML = `<b>${user}:</b> ${text}`;
            box.appendChild(div);
            // Прокрутка вниз
            box.scrollTop = box.scrollHeight;
        }

        function showPush(user, text) {
            const container = document.getElementById('push-notif');
            const div = document.createElement('div');
            div.className = 'push-msg';
            div.innerHTML = `[${user}]: ${text}`;
            container.appendChild(div);
            // Удаляем через 3 секунды
            setTimeout(() => div.remove(), 3000);
        }

        function updateBadge() {
            const b = document.getElementById('badge');
            if(unreadCount > 0) {
                b.innerText = unreadCount;
                b.style.display = 'flex';
            } else {
                b.style.display = 'none';
            }
        }

        // --- ОСТАЛЬНЫЕ ФУНКЦИИ (Mode, GPS и т.д. из 3.9) ---
        // ... (скопируй логику setMode, draw_marker и GPS из прошлой версии для работы карты)
    </script>
</body>
</html>
