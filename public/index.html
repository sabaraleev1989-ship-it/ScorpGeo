<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.0 | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: monospace; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(6, 182, 212, 0.3); }
        .user-label { background: #00f2ff; color: black; padding: 1px 4px; border-radius: 3px; font-weight: bold; font-size: 10px; border: 1px solid white; }
        .team-label { background: #f43f5e; color: white; padding: 1px 4px; border-radius: 3px; font-weight: bold; font-size: 10px; border: 1px solid white; }
        #notifications { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 2000; pointer-events: none; }
        .notif { background: rgba(6, 182, 212, 0.9); color: black; padding: 8px 20px; border-radius: 20px; margin-bottom: 5px; font-weight: bold; font-size: 12px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="notifications"></div>

    <div id="auth-screen" class="fixed inset-0 z-[5000] flex items-center justify-center bg-[#05070a] p-6">
        <div class="glass w-full max-w-sm rounded-3xl p-8 space-y-4 text-center">
            <h1 class="text-3xl font-bold text-cyan-400">scorpGeo 3.0</h1>
            <input id="roomID" type="text" placeholder="ID КАНАЛА" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center uppercase">
            <input id="password" type="password" placeholder="КОД ДОСТУПА" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center">
            <input id="callsign" type="text" placeholder="ПОЗЫВНОЙ" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center uppercase">
            <button onclick="saveAndConnect()" class="w-full bg-cyan-500 text-black font-bold py-4 rounded-xl">ВСТУПИТЬ В БОЙ</button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed top-4 left-4 right-4 z-[1000] glass p-2 rounded-2xl flex justify-between items-center">
            <div class="pl-2">
                <div id="display-room" class="text-cyan-400 font-bold text-[10px]">КАНАЛ: --</div>
                <div id="distance-info" class="text-[9px] text-white opacity-70 italic">Нажми на бойца для замера</div>
            </div>
            <button onclick="logout()" class="text-[9px] text-red-400 px-2 py-1">ВЫХОД</button>
        </div>

        <div class="fixed left-4 bottom-10 z-[1000] flex flex-col gap-2">
            <button onclick="setBaseLayer('sat')" class="glass p-2 rounded-lg text-[10px] text-white border-cyan-500">🛰️ СПУТНИК</button>
            <button onclick="setBaseLayer('map')" class="glass p-2 rounded-lg text-[10px] text-white">🗺️ СХЕМА</button>
        </div>

        <div class="fixed right-4 top-24 z-[1000] flex flex-col gap-3">
            <button onclick="setMode('enemy')" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg">💀</button>
            <button onclick="setMode('point')" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg">🚩</button>
            <button onclick="setMode('caution')" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg">⚠️</button>
            <button onclick="setMode('move')" id="move-btn" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg border-cyan-500 bg-cyan-500/20">🖐️</button>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, markers = {}, tacticalMarkers = [];
        let satLayer, streetLayer;
        let myInfo = { roomID: '', callsign: '', password: '', lat: 0, lng: 0 };
        let currentMode = 'move';

        window.onload = () => {
            const saved = localStorage.getItem('scorpGeo_Auth');
            if (saved) {
                myInfo = JSON.parse(saved);
                socket.emit('join_room', myInfo);
            }
        };

        function saveAndConnect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            myInfo.password = document.getElementById('password').value;
            if(!myInfo.roomID || !myInfo.password || !myInfo.callsign) return alert("Заполни всё!");
            socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            localStorage.setItem('scorpGeo_Auth', JSON.stringify(myInfo));
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('display-room').innerText = "КАНАЛ: " + myInfo.roomID;
            initMap();
        });

        function initMap() {
            if (map) return;
            
            satLayer = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] });
            streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });

            map = L.map('map', { zoomControl: false, layers: [satLayer] }).setView([43.5855, 39.7231], 13);

            map.on('click', (e) => {
                if (currentMode === 'move') return;
                socket.emit('new_map_marker', { type: currentMode, lat: e.latlng.lat, lng: e.latlng.lng, owner: myInfo.callsign });
                setMode('move');
            });
            startGps();
        }

        function setBaseLayer(type) {
            if(type === 'sat') { map.addLayer(satLayer); map.removeLayer(streetLayer); }
            else { map.addLayer(streetLayer); map.removeLayer(satLayer); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tactic-btn').forEach(b => b.style.background = "");
            event.currentTarget.style.background = "rgba(6, 182, 212, 0.3)";
        }

        function notify(text) {
            const div = document.createElement('div');
            div.className = 'notif';
            div.innerText = text;
            document.getElementById('notifications').appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        function startGps() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                myInfo.lat = latitude; myInfo.lng = longitude;
                if (!myMarker) {
                    myMarker = L.circleMarker([latitude, longitude], { color: '#00f2ff', radius: 6, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip("ВЫ", { permanent: true, direction: 'top', className: 'user-label' });
                    map.setView([latitude, longitude], 17);
                } else { myMarker.setLatLng([latitude, longitude]); }
                socket.emit('update_gps', { lat: latitude, lng: longitude });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('presence_update', (users) => {
            Object.keys(users).forEach(id => {
                if (id === socket.id) return;
                const u = users[id];
                if (!u.lat) return;
                if (!markers[id]) {
                    notify(`БОЕЦ ${u.callsign} В СЕТИ`);
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#f43f5e', radius: 6, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(u.callsign, { permanent: true, direction: 'top', className: 'team-label' });
                    markers[id].on('click', () => showNav(u));
                } else { markers[id].setLatLng([u.lat, u.lng]); }
            });
        });

        function showNav(target) {
            const d = map.distance([myInfo.lat, myInfo.lng], [target.lat, target.lng]);
            document.getElementById('distance-info').innerText = `ДО ${target.callsign}: ${Math.round(d)}м`;
            if(confirm(`До ${target.callsign}: ${Math.round(d)}м. Проложить маршрут в навигаторе?`)) {
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${target.lat},${target.lng}&travelmode=walking`);
            }
        }

        socket.on('draw_marker', (m) => {
            const icons = { enemy: '💀', point: '🚩', caution: '⚠️' };
            const marker = L.marker([m.lat, m.lng], {
                icon: L.divIcon({ html: `<div style="font-size:24px;">${icons[m.type]}</div>`, className: 'dummy', iconSize: [30, 30] })
            }).addTo(map);
            marker.on('click', () => showNav({callsign: 'МЕТКИ', lat: m.lat, lng: m.lng}));
            tacticalMarkers.push(marker);
        });

        function logout() { localStorage.removeItem('scorpGeo_Auth'); location.reload(); }
    </script>
</body>
</html>
