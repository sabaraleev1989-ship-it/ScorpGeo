<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION GEO | FIX FINAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Condensed:wght@700&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #22c55e; font-family: 'Roboto Condensed', sans-serif; overflow: hidden; }

        /* ВХОД */
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-input { background: #111; border: 1px solid #22c55e; color: #22c55e; padding: 15px; margin-bottom: 10px; width: 280px; text-align: center; outline: none; font-family: 'Orbitron'; }
        .auth-btn { background: #166534; color: #fff; padding: 18px; width: 280px; font-weight: bold; cursor: pointer; border: none; font-family: 'Orbitron'; }

        /* КАРТА */
        #map { height: 100vh; width: 100%; z-index: 1; position: absolute; }
        .grid-axis-x { position: fixed; top: 0; left: 60px; right: 0; height: 30px; background: rgba(0,0,0,0.8); z-index: 1000; pointer-events: none; border-bottom: 2px solid #22c55e; }
        .grid-axis-y { position: fixed; top: 30px; right: 0; bottom: 0; width: 35px; background: rgba(0,0,0,0.8); z-index: 1000; pointer-events: none; border-left: 2px solid #22c55e; }
        .axis-label { color: #22c55e; font-family: 'Orbitron'; font-size: 14px; position: absolute; font-weight: bold; }

        /* МЕТКА ДИСТАНЦИИ (Белый бокс, красные цифры) */
        .dist-box { background: white !important; border: 2px solid black !important; padding: 2px 6px !important; border-radius: 3px; display: flex; }
        .dist-val { color: #ff0000; font-weight: 900; font-size: 16px; white-space: nowrap; }

        /* ПАНЕЛЬ */
        .side-panel { position: fixed; left: 0; top: 0; bottom: 0; width: 60px; background: #0a0a0a; border-right: 1px solid #1e293b; z-index: 5000; display: flex; flex-direction: column; }
        .tool-btn { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; font-size: 26px; cursor: pointer; }
        .tool-btn.active { background: #2563eb; color: white; }

        /* ЧАТ */
        #chat-box { position: fixed; left: 70px; bottom: 80px; width: 300px; height: 400px; background: rgba(0,0,0,0.95); border: 2px solid #2563eb; z-index: 6000; display: none; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 16px; color: #fff; }
        .close-chat { width: 60px; height: 50px; background: #ef4444; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }

        /* ПУЛЬСАЦИЯ ЛИНИИ */
        .leaflet-ant-path { stroke-dasharray: 10, 10; animation: leaflet-ant-path-animation 5s linear infinite; }
        @keyframes leaflet-ant-path-animation { from { stroke-dashoffset: 100%; } to { stroke-dashoffset: 0%; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 class="text-3xl font-bold mb-8 tracking-tighter font-['Orbitron']">SCORPION <span class="text-green-500">V.4</span></h1>
        <input id="roomIn" type="text" placeholder="NET ID" class="auth-input">
        <input id="passIn" type="password" placeholder="CODE" class="auth-input">
        <input id="nameIn" type="text" placeholder="CALLSIGN" class="auth-input">
        <button onclick="connect()" class="auth-btn">CONNECT TO SYSTEM</button>
    </div>

    <div id="ui" style="display:none">
        <div id="axis-x" class="grid-axis-x"></div>
        <div id="axis-y" class="grid-axis-y"></div>

        <div class="side-panel">
            <div onclick="setTool('move')" id="t-move" class="tool-btn active">🖐️</div>
            <div onclick="centerMe()" class="tool-btn text-green-500">🎯</div>
            <div onclick="setTool('enemy')" id="t-enemy" class="tool-btn">💀</div>
            <div onclick="setTool('point')" id="t-point" class="tool-btn">🚩</div>
            <div onclick="setTool('arrow')" id="t-arrow" class="tool-btn">➡️</div>
            <div onclick="toggleChat()" class="tool-btn">💬</div>
            <div onclick="undo()" class="tool-btn text-yellow-500">↩️</div>
            <div onclick="clearMap()" class="tool-btn text-red-500">🗑️</div>
            <div class="mt-auto">
                <div onclick="location.reload()" class="tool-btn text-red-600">🚪</div>
            </div>
        </div>

        <div id="chat-box">
            <div class="flex justify-between items-center bg-blue-900 h-12">
                <span class="ml-3 font-bold">SECURE RADIO</span>
                <div onclick="toggleChat()" class="close-chat">×</div>
            </div>
            <div id="chat-messages"></div>
            <div class="p-2 bg-black flex border-t border-blue-900">
                <input id="msgInput" type="text" class="flex-1 bg-transparent text-green-400 outline-none p-2" placeholder="Message...">
                <button onclick="sendMsg()" class="text-blue-500 font-bold px-2">SEND</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, user = { room: '', name: '', lat: 0, lng: 0 };
        let tactical = {}, tool = 'move', arrowStart = null;
        const STEP = 20 * 0.000009;

        function connect() {
            user.room = document.getElementById('roomIn').value.toUpperCase().trim();
            user.name = document.getElementById('nameIn').value.toUpperCase().trim();
            if(user.room && user.name) {
                socket.emit('join_room', { room: user.room, name: user.name, code: document.getElementById('passIn').value });
            }
        }

        socket.on('login_success', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 21 }).setView([43.40, 39.95], 18);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21 }).addTo(map);
            
            map.on('move zoom', updateGrid);
            map.on('click', onMapClick);
            updateGrid();
            startGps();
        }

        function updateGrid() {
            const b = map.getBounds();
            const axX = document.getElementById('axis-x'), axY = document.getElementById('axis-y');
            axX.innerHTML = ''; axY.innerHTML = '';

            for (let x = Math.floor(b.getWest()/STEP)*STEP; x <= b.getEast(); x += STEP) {
                const p = map.latLngToContainerPoint([b.getNorth(), x + STEP/2]);
                if(p.x > 60) {
                    const el = document.createElement('div'); el.className = 'axis-label';
                    el.style.left = (p.x - 77) + 'px'; el.style.top = '5px';
                    el.innerText = String.fromCharCode(65 + (Math.abs(Math.round(x/STEP))%26));
                    axX.appendChild(el);
                }
            }
            for (let y = Math.floor(b.getSouth()/STEP)*STEP; y <= b.getNorth(); y += STEP) {
                const p = map.latLngToContainerPoint([y + STEP/2, b.getEast()]);
                const el = document.createElement('div'); el.className = 'axis-label';
                el.style.top = (p.y - 45) + 'px'; el.style.right = '5px';
                el.innerText = Math.abs(Math.round(y/STEP)) % 100;
                axY.appendChild(el);
            }
        }

        function onMapClick(e) {
            if(tool === 'move') return;
            const id = 'id' + Date.now();
            
            if(tool === 'point' || tool === 'enemy') {
                // ДЛЯ ФЛАГОВ: Шлем еще и координаты игрока для пульсирующей линии
                socket.emit('new_obj', { id, type: tool, lat: e.latlng.lat, lng: e.latlng.lng, from: [user.lat, user.lng] });
            } else if(tool === 'arrow') {
                if(!arrowStart) {
                    arrowStart = e.latlng;
                    L.circleMarker(e.latlng, {radius:4, color:'yellow'}).addTo(map).fadeOut = true;
                } else {
                    socket.emit('new_obj', { id, type: 'arrow', start: arrowStart, end: e.latlng });
                    arrowStart = null;
                }
            }
        }

        socket.on('draw', m => {
            if(m.type === 'arrow') {
                // СТРЕЛКА: Сплошная линия БЕЗ дистанции
                const line = L.polyline([m.start, m.end], { color: '#2563eb', weight: 5 }).addTo(map);
                // Наконечник (простой маркер в конце)
                const head = L.circleMarker(m.end, { radius: 2, color: 'white', fillOpacity: 1 }).addTo(map);
                tactical[m.id] = { layers: [line, head] };
            } else {
                // ФЛАГ/ВРАГ: Пульсирующая линия + дистанция
                const ico = m.type === 'enemy' ? '💀' : '🚩';
                const mainMarker = L.marker([m.lat, m.lng], { 
                    icon: L.divIcon({ html: `<div style="font-size:30px">${ico}</div>`, className: 'dummy', iconAnchor:[15,15] }) 
                }).addTo(map);

                // Дистанция (белый бокс, красные цифры)
                const dist = Math.round(map.distance(m.from, [m.lat, m.lng]));
                const distLabel = L.marker([m.lat, m.lng], {
                    icon: L.divIcon({ className: 'dist-box', html: `<span class="dist-val">${dist}м</span>`, iconAnchor:[20, -20] })
                }).addTo(map);

                // Пульсирующая пунктирная линия
                const pulseLine = L.polyline([m.from, [m.lat, m.lng]], { 
                    color: '#22c55e', weight: 2, dashArray: '10, 10', className: 'leaflet-ant-path' 
                }).addTo(map);

                tactical[m.id] = { layers: [mainMarker, distLabel, pulseLine] };
            }
        });

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                user.lat = p.coords.latitude; user.lng = p.coords.longitude;
                if(!myMarker) {
                    myMarker = L.circleMarker([user.lat, user.lng], { color: '#2563eb', radius: 10, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip(user.name, { permanent: true, className: 'bg-blue-600 text-white' });
                    map.setView([user.lat, user.lng], 19);
                } else myMarker.setLatLng([user.lat, user.lng]);
                socket.emit('gps_sync', { lat: user.lat, lng: user.lng });
            }, null, { enableHighAccuracy: true });
        }

        function toggleChat() { const c = document.getElementById('chat-box'); c.style.display = (c.style.display === 'flex') ? 'none' : 'flex'; }
        function sendMsg() { 
            const i = document.getElementById('msgInput'); 
            if(i.value) { socket.emit('chat_msg', { name: user.name, text: i.value }); i.value = ''; } 
        }
        socket.on('msg', m => { 
            const d = document.createElement('div'); d.className = "mb-2 border-b border-gray-800 pb-1";
            d.innerHTML = `<b class="text-blue-400 text-xs">${m.name}:</b><br><span class="text-white text-lg">${m.text}</span>`; 
            document.getElementById('chat-messages').appendChild(d);
            document.getElementById('chat-messages').scrollTop = 9999;
        });

        function setTool(t) { tool = t; arrowStart = null; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); }
        function centerMe() { if(user.lat) map.setView([user.lat, user.lng], 19); }
        function undo() { socket.emit('undo'); }
        function clearMap() { if(confirm("DELETE TACTICAL DATA?")) socket.emit('clear'); }
        socket.on('del_obj', id => { if(tactical[id]) { tactical[id].layers.forEach(l => map.removeLayer(l)); delete tactical[id]; } });
    </script>
</body>
</html>
