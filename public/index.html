<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.0 | TACTICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: monospace; margin: 0; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(6, 182, 212, 0.3); }
        .user-label { background: #00f2ff; color: black; padding: 1px 4px; border-radius: 3px; font-weight: bold; font-size: 10px; border: 1px solid white; }
        .team-label { background: #f43f5e; color: white; padding: 1px 4px; border-radius: 3px; font-weight: bold; font-size: 10px; border: 1px solid white; }
        .tactic-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .tactic-btn:active { transform: scale(0.9); background: #06b6d4; color: black; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[5000] flex items-center justify-center bg-[#05070a] p-6">
        <div class="glass w-full max-w-sm rounded-3xl p-8 space-y-4 text-center">
            <h1 class="text-3xl font-bold text-cyan-400">scorpGeo 3.0</h1>
            <input id="roomID" type="text" placeholder="ID КАНАЛА" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center uppercase">
            <input id="password" type="password" placeholder="КОД ДОСТУПА" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center">
            <input id="callsign" type="text" placeholder="ПОЗЫВНОЙ" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center uppercase">
            <button onclick="saveAndConnect()" class="w-full bg-cyan-500 text-black font-bold py-4 rounded-xl">ВСТУПИТЬ В БОЙ</button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed top-4 left-4 right-4 z-[1000] glass p-2 rounded-2xl flex justify-between items-center">
            <div class="pl-2">
                <div id="display-room" class="text-cyan-400 font-bold text-[10px]">--</div>
                <div id="distance-info" class="text-[9px] text-white opacity-70">Ожидание GPS...</div>
            </div>
            <button onclick="clearMarkers()" class="bg-red-500/20 text-red-400 text-[9px] px-2 py-1 rounded border border-red-500/30">СБРОС МЕТОК</button>
        </div>

        <div class="fixed right-4 top-24 z-[1000] flex flex-col gap-3">
            <button onclick="setMode('enemy')" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg">💀</button>
            <button onclick="setMode('point')" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg">🚩</button>
            <button onclick="setMode('caution')" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg">⚠️</button>
            <button onclick="setMode('move')" class="tactic-btn glass w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-lg border-cyan-500 bg-cyan-500/20">🖐️</button>
        </div>

        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, markers = {}, tacticalMarkers = [];
        let myInfo = { roomID: '', callsign: '', password: '', lat: null, lng: null };
        let currentMode = 'move';

        window.onload = () => {
            const saved = localStorage.getItem('scorpGeo_Auth');
            if (saved) {
                myInfo = JSON.parse(saved);
                socket.emit('join_room', myInfo);
            }
        };

        function saveAndConnect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            myInfo.password = document.getElementById('password').value;
            if(!myInfo.roomID || !myInfo.password || !myInfo.callsign) return alert("Заполни всё!");
            socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            localStorage.setItem('scorpGeo_Auth', JSON.stringify(myInfo));
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('display-room').innerText = "КАНАЛ: " + myInfo.roomID;
            initMap();
        });

        socket.on('error_msg', (msg) => alert(msg));

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([43.5855, 39.7231], 13);
            L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
            }).addTo(map);

            // Клик по карте для установки метки
            map.on('click', (e) => {
                if (currentMode === 'move') return;
                
                const markerData = {
                    type: currentMode,
                    lat: e.latlng.lat,
                    lng: e.latlng.lng,
                    owner: myInfo.callsign
                };
                socket.emit('new_map_marker', markerData);
                setMode('move'); // Возвращаемся в режим перемещения
            });

            startGps();
        }

        function setMode(mode) {
            currentMode = mode;
            // Визуальный эффект выбора
            document.querySelectorAll('.tactic-btn').forEach(btn => btn.style.borderColor = 'rgba(255,255,255,0.1)');
            event.currentTarget.style.borderColor = '#06b6d4';
        }

        function startGps() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                myInfo.lat = latitude; myInfo.lng = longitude;
                if (!myMarker) {
                    myMarker = L.circleMarker([latitude, longitude], { color: '#00f2ff', radius: 5, fillOpacity: 1 }).addTo(map);
                    myMarker.bindTooltip(myInfo.callsign, { permanent: true, direction: 'top', className: 'user-label' });
                    map.setView([latitude, longitude], 17);
                } else {
                    myMarker.setLatLng([latitude, longitude]);
                }
                socket.emit('update_gps', { lat: latitude, lng: longitude });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('init_markers', (data) => {
            data.forEach(m => drawTacticalMarker(m));
        });

        socket.on('draw_marker', (m) => drawTacticalMarker(m));

        function drawTacticalMarker(m) {
            const icons = { enemy: '💀', point: '🚩', caution: '⚠️' };
            const marker = L.marker([m.lat, m.lng], {
                icon: L.divIcon({
                    html: `<div style="font-size:24px;">${icons[m.type]}</div>`,
                    className: 'dummy',
                    iconSize: [30, 30]
                })
            }).addTo(map);
            marker.bindPopup(`Метка: ${m.type}<br>От: ${m.owner}`);
            tacticalMarkers.push(marker);
        }

        socket.on('markers_cleared', () => {
            tacticalMarkers.forEach(m => map.removeLayer(m));
            tacticalMarkers = [];
        });

        function clearMarkers() {
            if(confirm("Очистить все метки на карте для всей группы?")) {
                socket.emit('clear_all_markers');
            }
        }

        socket.on('presence_update', (users) => {
            Object.keys(users).forEach(id => {
                if (id === socket.id) return;
                const u = users[id];
                if (!u.lat) return;
                if (!markers[id]) {
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#f43f5e', radius: 5, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(u.callsign, { permanent: true, direction: 'top', className: 'team-label' });
                } else {
                    markers[id].setLatLng([u.lat, u.lng]);
                }
                const d = map.distance([myInfo.lat, myInfo.lng], [u.lat, u.lng]);
                document.getElementById('distance-info').innerText = `ДО ${u.callsign}: ${Math.round(d)}м`;
            });
        });
    </script>
</body>
</html>
