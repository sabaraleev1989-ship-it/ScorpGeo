<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>scorpGeo 3.7 | COMMAND CENTER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background: #020617; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #242424; }
        
        /* Боковая панель */
        .gt-panel { background: #0f172a; border-right: 2px solid #1e293b; z-index: 5000; width: 60px; }
        .gt-btn { width: 60px; height: 55px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1e293b; color: #64748b; cursor: pointer; position: relative; }
        .gt-btn.active { background: #3b82f6; color: white; }
        
        /* Выбор цвета */
        .color-dot { width: 12px; height: 12px; border-radius: 2px; margin: 2px; border: 1px solid white; }

        /* Чат */
        #chat-window { position: fixed; bottom: 80px; left: 70px; width: 300px; height: 400px; background: #111827; border: 2px solid #374151; border-radius: 8px; z-index: 9000; display: none; flex-direction: column; box-shadow: 0 20px 25px rgba(0,0,0,0.5); }
        .chat-msg { padding: 6px 12px; border-bottom: 1px solid #1f2937; color: #f8fafc; font-size: 14px; font-family: monospace; }
        .chat-msg b { color: #3b82f6; text-transform: uppercase; margin-right: 5px; }

        /* Метки и Дистанция */
        .dist-label { background: #ffff00; color: #000; padding: 2px 6px; border-radius: 3px; font-weight: 900; font-size: 13px; border: 1px solid #000; white-space: nowrap; margin-left: 35px; }
        .user-label { background: #3b82f6; color: white; padding: 2px 6px; border-radius: 3px; font-weight: bold; border: 1px solid white; }
        
        .nav-line { stroke: #ffff00; stroke-dasharray: 8, 8; animation: dash 10s linear infinite; opacity: 1; }
        @keyframes dash { to { stroke-dashoffset: -500; } }

        /* Вход */
        .auth-input { background: #000 !important; border: 1px solid #334155 !important; color: white !important; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black p-6">
        <div class="bg-slate-900 border-2 border-blue-900 w-full max-w-sm rounded-lg p-8 space-y-6">
            <h1 class="text-3xl font-black text-center text-white italic tracking-tighter">SCORP<span class="text-blue-500">GEO</span></h1>
            <div class="space-y-3">
                <input id="roomID" type="text" placeholder="ID СЕТИ" class="auth-input w-full p-4 rounded uppercase">
                <input id="callsign" type="text" placeholder="ПОЗЫВНОЙ" class="auth-input w-full p-4 rounded uppercase">
            </div>
            <button onclick="connect()" class="w-full bg-blue-700 text-white font-bold py-4 rounded uppercase hover:bg-blue-600 transition-all">Установить связь</button>
        </div>
    </div>

    <div id="chat-window">
        <div class="p-3 bg-slate-800 flex justify-between items-center border-b border-slate-700">
            <span class="font-bold text-sm text-blue-400 tracking-widest">РАДИОКАНАЛ</span>
            <button onclick="toggleChat()" class="text-white">✖</button>
        </div>
        <div id="chat-content" class="flex-1 overflow-y-auto p-2 bg-black/30"></div>
        <div class="p-2 bg-slate-800 border-t border-slate-700 flex gap-2">
            <input id="chat-input" type="text" class="flex-1 bg-black text-white p-2 text-sm outline-none border border-slate-600 rounded" placeholder="Сообщение...">
            <button onclick="sendMsg()" class="bg-blue-600 px-4 rounded text-white font-bold">></button>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="fixed left-0 top-0 bottom-0 gt-panel flex flex-col">
            <button onclick="setMode('move')" id="btn-move" class="gt-btn active" title="Обзор">🖐️</button>
            <button onclick="setMode('enemy')" id="btn-enemy" class="gt-btn" title="Враг">💀</button>
            <button onclick="setMode('point')" id="btn-point" class="gt-btn" title="Точка">🚩</button>
            <button onclick="setMode('arrow')" id="btn-arrow" class="gt-btn" title="Стрелка">➡️</button>
            
            <div class="h-1 bg-slate-800 w-full"></div>
            
            <div class="flex flex-wrap justify-center p-1 py-3 gap-1">
                <button onclick="setColor('#2563eb')" class="color-dot bg-blue-600"></button>
                <button onclick="setColor('#ef4444')" class="color-dot bg-red-600"></button>
                <button onclick="setColor('#22c55e')" class="color-dot bg-green-600"></button>
            </div>

            <div class="h-1 bg-slate-800 w-full"></div>
            
            <button onclick="toggleChat()" class="gt-btn">💬 <div id="badge" class="absolute top-1 right-1 bg-red-600 text-[10px] w-4 h-4 rounded-full hidden flex items-center justify-center text-white">0</div></button>
            <button onclick="undo()" class="gt-btn" title="Отмена">↩️</button>
            <button onclick="clearAll()" class="gt-btn text-red-500" title="Очистить">🗑️</button>
            
            <div class="mt-auto">
                <button onclick="switchMap('sat')" class="gt-btn text-[10px] font-bold">SAT</button>
                <button onclick="switchMap('light')" class="gt-btn text-[10px] font-bold">MAP</button>
                <button onclick="logout()" class="gt-btn text-red-500 text-xs">EXIT</button>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const socket = io();
        let map, myMarker, markers = {}, tactical = {}, navLines = {}, distLabels = {};
        let myInfo = { roomID: '', callsign: '', lat: 0, lng: 0 };
        let currentMode = 'move', activeColor = '#2563eb', arrowStart = null, unread = 0;
        let layers = {};

        function connect() {
            myInfo.roomID = document.getElementById('roomID').value.toUpperCase();
            myInfo.callsign = document.getElementById('callsign').value.toUpperCase();
            if(myInfo.roomID && myInfo.callsign) socket.emit('join_room', myInfo);
        }

        socket.on('login_success', () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            initMap();
        });

        function initMap() {
            // Карты в стиле MAPS.ME / Светлые
            layers.light = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');
            layers.sat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']});
            
            map = L.map('map', { zoomControl: false, layers: [layers.light] }).setView([43.58, 39.72], 15);
            map.on('click', onMapClick);
            startGps();
        }

        function setMode(m) {
            currentMode = (currentMode === m) ? 'move' : m;
            arrowStart = null;
            document.querySelectorAll('.gt-btn').forEach(b => b.classList.remove('active'));
            if(currentMode !== 'move') document.getElementById('btn-'+currentMode).classList.add('active');
            else document.getElementById('btn-move').classList.add('active');
        }

        function setColor(c) { activeColor = c; }

        function onMapClick(e) {
            if (currentMode === 'move') return;
            const id = 'item_' + Date.now();
            if (currentMode === 'arrow') {
                if (!arrowStart) {
                    arrowStart = e.latlng;
                    return;
                }
                socket.emit('new_map_marker', { id, type: 'arrow', start: arrowStart, end: e.latlng, color: activeColor, owner: myInfo.callsign });
                arrowStart = null;
            } else {
                socket.emit('new_map_marker', { id, type: currentMode, lat: e.latlng.lat, lng: e.latlng.lng, color: activeColor, owner: myInfo.callsign });
            }
        }

        socket.on('draw_marker', (m) => {
            let obj, pos;
            if (m.type === 'arrow') {
                const line = L.polyline([m.start, m.end], { color: m.color, weight: 6 }).addTo(map);
                const sDot = L.rectangle(getBounding(m.start), {color: m.color, fillOpacity:1}).addTo(map);
                const eDot = L.rectangle(getBounding(m.end), {color: m.color, fillOpacity:1}).addTo(map);
                const head = L.polyline(getHead(m.start, m.end), { color: m.color, weight: 6 }).addTo(map);
                obj = { layers: [line, sDot, eDot, head], latlng: m.end };
                pos = m.end;
            } else {
                const icon = m.type === 'enemy' ? '💀' : '🚩';
                obj = L.marker([m.lat, m.lng], { icon: L.divIcon({ html: `<div style="font-size:30px; filter: drop-shadow(0 0 2px white);">${icon}</div>`, className: 'dummy' }) }).addTo(map);
                pos = { lat: m.lat, lng: m.lng };
            }
            tactical[m.id] = obj;
            
            // Дистанция (Ярко-желтая)
            distLabels[m.id] = L.marker(pos, { icon: L.divIcon({ className: 'dist-label', html: '---' }) }).addTo(map);
            
            const trigger = obj.on ? obj : obj.layers[0];
            trigger.on('click', () => toggleNav(m.id, pos));
            updateAllDist();
        });

        function getBounding(latlng) {
            const size = 0.0001;
            return [[latlng.lat - size, latlng.lng - size], [latlng.lat + size, latlng.lng + size]];
        }

        function getHead(s, e) {
            const d = Math.atan2(e.lng - s.lng, e.lat - s.lat);
            const h = 0.0005;
            return [[e.lat - h * Math.cos(d - 0.5), e.lng - h * Math.sin(d - 0.5)], [e.lat, e.lng], [e.lat - h * Math.cos(d + 0.5), e.lng - h * Math.sin(d + 0.5)]];
        }

        function toggleNav(id, pos) {
            if (navLines[id]) { map.removeLayer(navLines[id]); delete navLines[id]; }
            else { navLines[id] = L.polyline([[myInfo.lat, myInfo.lng], pos], { className: 'nav-line' }).addTo(map); }
        }

        function updateAllDist() {
            Object.keys(distLabels).forEach(id => {
                const pos = tactical[id].getLatLng ? tactical[id].getLatLng() : tactical[id].latlng;
                const d = Math.round(map.distance([myInfo.lat, myInfo.lng], pos));
                distLabels[id].setIcon(L.divIcon({ className: 'dist-label', html: d + 'м' }));
                if(navLines[id]) navLines[id].setLatLngs([[myInfo.lat, myInfo.lng], pos]);
            });
        }

        function startGps() {
            navigator.geolocation.watchPosition(p => {
                myInfo.lat = p.coords.latitude; myInfo.lng = p.coords.longitude;
                if (!myMarker) {
                    myMarker = L.circleMarker([myInfo.lat, myInfo.lng], { color: '#3b82f6', radius: 8, fillOpacity: 1, weight: 3 }).addTo(map);
                    myMarker.bindTooltip(myInfo.callsign, { permanent: true, direction: 'top', className: 'user-label' });
                    map.setView([myInfo.lat, myInfo.lng], 17);
                } else myMarker.setLatLng([myInfo.lat, myInfo.lng]);
                updateAllDist();
                socket.emit('update_gps', { lat: myInfo.lat, lng: myInfo.lng });
            }, null, { enableHighAccuracy: true });
        }

        socket.on('presence_update', (us) => {
            Object.keys(us).forEach(id => {
                if (id === socket.id) return;
                const u = us[id];
                if (!markers[id]) {
                    markers[id] = L.circleMarker([u.lat, u.lng], { color: '#ef4444', radius: 8, fillOpacity: 1 }).addTo(map);
                    markers[id].bindTooltip(u.callsign, { permanent: true, direction: 'top', className: 'user-label' });
                } else markers[id].setLatLng([u.lat, u.lng]);
            });
        });

        // ЧАТ
        function toggleChat() { 
            const win = document.getElementById('chat-window');
            const isOpen = win.style.display === 'flex';
            win.style.display = isOpen ? 'none' : 'flex';
            if(!isOpen) { unread = 0; updateBadge(); }
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(input.value.trim()) {
                socket.emit('chat_msg', { user: myInfo.callsign, text: input.value });
                input.value = '';
            }
        }

        socket.on('receive_msg', (d) => {
            const cont = document.getElementById('chat-content');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<b>${d.user}:</b> ${d.text}`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
            
            if(document.getElementById('chat-window').style.display !== 'flex') {
                unread++;
                updateBadge();
            }
        });

        function updateBadge() {
            const b = document.getElementById('badge');
            b.innerText = unread;
            b.style.display = unread > 0 ? 'flex' : 'none';
        }

        function switchMap(t) {
            map.removeLayer(layers.light); map.removeLayer(layers.sat);
            map.addLayer(layers[t]);
        }

        function undo() { socket.emit('undo_last'); }
        function clearAll() { if(confirm("Удалить всё?")) socket.emit('clear_all'); }

        socket.on('item_deleted', (id) => {
            if(tactical[id]) {
                const o = tactical[id];
                if(o.layers) o.layers.forEach(l => map.removeLayer(l)); else map.removeLayer(o);
                map.removeLayer(distLabels[id]);
                if(navLines[id]) map.removeLayer(navLines[id]);
                delete tactical[id];
            }
        });
        socket.on('all_cleared', () => location.reload());

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
